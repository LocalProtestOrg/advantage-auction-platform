<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Event - Advantage.Bid</title>
<meta name="description" content="Estate sales, tag sales, and in-person auctions on Advantage.Bid." />
<link rel="canonical" href="https://bid.advantage.bid/event.html" />
<!-- Static share fallback (replaced per-event server-side by shareMeta) -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Advantage.Bid" />
<meta property="og:title" content="Marketplace Event - Advantage.Bid" />
<meta property="og:description" content="Estate sales, tag sales, and in-person auctions on Advantage.Bid." />
<meta property="og:url" content="https://bid.advantage.bid/event.html" />
<meta property="og:image" content="https://bid.advantage.bid/img/social-card.png" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Marketplace Event - Advantage.Bid" />
<meta name="twitter:description" content="Estate sales, tag sales, and in-person auctions on Advantage.Bid." />
<meta name="twitter:image" content="https://bid.advantage.bid/img/social-card.png" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
  /* Shared Advantage "Living Map" design tokens — identical to auction-view.html */
  :root{ --ink:#0B1B2B; --paper:#FBFAF7; --surface:#fff; --muted:#637488; --hair:#ECE8E0; --accent:#2F6BFF; --live:#B5273B; --coming:#1FB6A6; --ease:cubic-bezier(.22,.7,.2,1); }
  *{box-sizing:border-box} body{margin:0;background:var(--paper);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  .wrap{max-width:920px;margin:0 auto;padding:18px 20px 64px}
  .back{color:var(--muted);font-weight:600;font-size:14px}
  .hero{margin-top:12px;border-radius:20px;overflow:hidden;aspect-ratio:16/9;max-height:420px;background:#eef0f3 center/cover no-repeat;box-shadow:0 18px 44px rgba(8,16,28,.14)}
  .hero.none{background:linear-gradient(135deg,#243b6b,#7a274a)}
  .cat{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin:16px 0 2px}
  h1{font-family:"Fraunces","Georgia",serif;font-weight:600;font-size:clamp(26px,4vw,40px);line-height:1.06;letter-spacing:-.01em;margin:2px 0 6px}
  h2{font-family:"Fraunces","Georgia",serif;font-weight:600;font-size:20px;margin:26px 0 10px}
  .orgrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;color:#3a4a5c;font-size:14px;margin-bottom:14px}
  .badge{font-size:11px;font-weight:800;border-radius:999px;padding:3px 9px}
  .badge.community{background:#eef2f6;color:#475569}.badge.verified{background:rgba(22,163,74,.12);color:#15803d}.badge.imported{background:#fef3c7;color:#92610a}.badge.advantage{background:rgba(181,39,59,.1);color:var(--live)}
  .meta{display:flex;flex-direction:column;gap:10px;background:var(--surface);border:1px solid var(--hair);border-radius:16px;padding:16px 18px;margin:16px 0}
  .meta .r{display:flex;gap:10px;font-size:14.5px;align-items:flex-start}.meta .r b{color:var(--ink)}.meta .ic{width:20px;flex:0 0 auto;text-align:center}
  .notice{background:#eef4fb;border:1px solid #d5e3f4;color:#274864;border-radius:14px;padding:14px 16px;font-size:14.5px;line-height:1.5;margin:6px 0 2px}
  .notice b{color:#1c3450}
  .desc{font-size:16px;line-height:1.7;color:#2c3a4b;white-space:pre-wrap;margin:8px 0 8px}
  #eventMap{height:280px;border-radius:16px;overflow:hidden;border:1px solid var(--hair);margin:8px 0 6px}
  .cta{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  .btn{border-radius:12px;padding:12px 22px;font-weight:800;font-size:15px;display:inline-block}
  .btn.primary{background:var(--live);color:#fff;box-shadow:0 8px 20px rgba(181,39,59,.26)}.btn.primary:hover{filter:brightness(1.06);text-decoration:none}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--hair)}.btn.ghost:hover{border-color:var(--accent);color:var(--accent);text-decoration:none}
  .attrib{font-size:12.5px;color:var(--muted);margin-top:22px;border-top:1px solid var(--hair);padding-top:12px}
  .loading,.err{padding:60px 16px;text-align:center;color:var(--muted)}
  footer{border-top:1px solid var(--hair);color:var(--muted);font-size:13px;text-align:center;padding:26px 16px}
  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/events.html">← All events</a>
  <div id="content"><div class="loading">Loading…</div></div>
</div>
<footer>© Advantage.Bid — the estate & liquidation marketplace</footer>

<script src="/widgets/shared/buyer-nav.js"></script>
<script src="/widgets/shared/gallery.js"></script>
<script src="/widgets/shared/pin-map.js"></script>
<script>
(function () {
  var content = document.getElementById('content');
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); }
  function prettify(s) { return String(s || '').replace(/_/g, ' ').replace(/\b\w/g, function (m) { return m.toUpperCase(); }); }
  function fmtRange(a, b) {
    if (!a) return '';
    try {
      var da = new Date(a), o = { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' };
      var s = da.toLocaleString('en-US', o);
      if (b) { var db = new Date(b); s += ' – ' + db.toLocaleString('en-US', { weekday: 'short', hour: 'numeric', minute: '2-digit' }); }
      return s;
    } catch (e) { return ''; }
  }
  function badgeClass(b) { b = (b || '').toLowerCase(); return b.indexOf('verified') >= 0 ? 'verified' : b.indexOf('imported') >= 0 ? 'imported' : b.indexOf('advantage') >= 0 ? 'advantage' : 'community'; }

  var slug = new URLSearchParams(location.search).get('slug');
  if (!slug) { content.innerHTML = '<div class="err">No event specified.</div>'; return; }

  fetch('/api/public/events/' + encodeURIComponent(slug)).then(function (r) { return r.json(); }).then(function (res) {
    if (!res || !res.data) { content.innerHTML = '<div class="err">This event isn’t available.</div>'; return; }
    var e = res.data, org = e.organization;
    document.title = e.title + ' - Advantage.Bid';

    // Cover-first gallery order
    var imgs = (e.images || []).slice().sort(function (a, b) { return (b.is_cover ? 1 : 0) - (a.is_cover ? 1 : 0); });
    var typeLabel = e.event_type ? prettify(e.event_type) : (e.category ? prettify(e.category) : '');
    var area = [e.city, e.state].filter(Boolean).join(', ') + (e.zip ? ' ' + e.zip : '');
    var revealed = !e.address_hidden;
    var addressLine = revealed ? [e.venue_name, e.address, area].filter(Boolean).join(' · ') : [e.venue_name, area].filter(Boolean).join(' · ');
    var directionsQ = revealed ? (e.lat != null && e.lng != null ? (e.lat + ',' + e.lng) : [e.address, e.city, e.state, e.zip].filter(Boolean).join(' ')) : '';

    content.innerHTML =
      '<div class="hero' + (e.cover_image_url ? '' : ' none') + '"' + (e.cover_image_url ? ' style="background-image:url(\'' + esc(e.cover_image_url) + '\')"' : '') + '></div>'
      + (typeLabel ? '<div class="cat">' + esc(typeLabel) + '</div>' : '')
      + '<h1>' + esc(e.title) + '</h1>'
      + '<div class="orgrow"><span class="badge ' + badgeClass(e.organizer_badge) + '">' + esc(e.organizer_badge || 'Community Organizer') + '</span>'
      + (org ? '<span>by <b>' + esc(org.name) + '</b></span>' + (org.website_url ? ' · <a href="' + esc(org.website_url) + '" target="_blank" rel="noopener">Website</a>' : '') : '') + '</div>'

      + '<div class="meta">'
      + '<div class="r"><span class="ic">📅</span><span><b>' + esc(fmtRange(e.start_at, e.end_at)) + '</b></span></div>'
      + (addressLine ? '<div class="r"><span class="ic">📍</span><span>' + esc(addressLine) + '</span></div>' : '')
      + (e.contact_email ? '<div class="r"><span class="ic">✉️</span><span><a href="mailto:' + esc(e.contact_email) + '">' + esc(e.contact_email) + '</a></span></div>' : '')
      + '</div>'

      + (!revealed && e.reveal_notice ? '<div class="notice"><b>Address:</b> ' + esc(e.reveal_notice) + '</div>' : '')
      + (e.description ? '<h2>About</h2><div class="desc">' + esc(e.description) + '</div>' : '')
      + (imgs.length ? '<h2>Photos</h2><div id="eventGallery"></div>' : '')
      + (revealed && e.lat != null && e.lng != null ? '<h2>Location</h2><div id="eventMap"></div>' : '')

      + '<div class="cta">'
      + (e.external_url ? '<a class="btn primary" href="' + esc(e.external_url) + '" target="_blank" rel="noopener">Visit event page ↗</a>' : '')
      + (directionsQ ? '<a class="btn ghost" href="https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(directionsQ) + '" target="_blank" rel="noopener">Get directions</a>' : '')
      + (e.contact_email ? '<a class="btn ghost" href="mailto:' + esc(e.contact_email) + '">Contact organizer</a>' : '')
      + '</div>'
      + (e.attribution_source ? '<div class="attrib">Listing sourced from ' + esc(e.attribution_source) + '. Not hosted or endorsed by Advantage.</div>' : '');

    if (imgs.length && window.AdvantageGallery) AdvantageGallery.mount('#eventGallery', imgs, { alt: e.title });
    if (revealed && e.lat != null && e.lng != null && window.AdvantagePinMap) {
      AdvantagePinMap.mount('#eventMap', { lat: e.lat, lng: e.lng, label: e.title, zoom: 13 });
    }
  }).catch(function () { content.innerHTML = '<div class="err">Couldn’t load this event. Please try again.</div>'; });
})();
</script>
</body>
</html>
