# Privacy Policy

**Advantage Auction Company, LLC d/b/a Advantage.Bid**
**Effective Date:** June 15, 2026
**Last Updated:** June 15, 2026

## Introduction

Advantage Auction Company, LLC d/b/a Advantage.Bid ("Advantage Auction Company," "Advantage.Bid," "AAC," "we," "our," or "us") respects your privacy and is committed to protecting your personal information.

This Privacy Policy explains how we collect, use, disclose, store, and protect information when you visit, access, register for, bid on, purchase through, sell through, communicate with, or otherwise use Advantage.Bid and related services (collectively, the "Services").

By using the Services, you consent to the collection, use, and disclosure of information as described in this Privacy Policy.

---

# Information We Collect

We may collect information directly from you, automatically through your use of the Services, from sellers, payment processors, service providers, and other third parties.

## Information You Provide

When creating an account, registering to bid, making a purchase, selling property, contacting us, or otherwise using the Services, you may provide:

### Account Information

* Full name
* Username
* Email address
* Telephone number
* Mailing address
* Billing address
* Account credentials

### Identity Verification Information

Where necessary, we may collect:

* Government-issued identification
* Identity verification records
* Business information
* Tax-related documentation
* Seller verification information

### Payment Information

When making purchases or registering to bid, payment information may be collected and processed through third-party payment processors.

This may include:

* Credit card information
* Debit card information
* Payment authorization data
* Billing details

Advantage.Bid does not store complete payment card numbers on its servers. Payment information is processed by PCI-compliant payment providers, including Stripe and other authorized processors.

### Auction Activity

We collect information regarding:

* Auctions viewed
* Lots viewed
* Bids submitted
* Maximum bids entered
* Auction registrations
* Purchases
* Pickup confirmations
* Watchlists
* Saved searches
* Communications

### Communications

We collect information you provide when:

* Contacting support
* Sending inquiries
* Submitting forms
* Responding to surveys
* Communicating regarding transactions
* Participating in dispute resolution

---

# Information Automatically Collected

When using the Services, we may automatically collect:

* IP address
* Browser type
* Device type
* Operating system
* Referring website
* Pages visited
* Time spent on pages
* Auction activity
* Clickstream data
* Session information
* Log files
* Cookie identifiers

---

# Cookies and Similar Technologies

We use cookies and similar technologies to:

* Authenticate users
* Maintain login sessions
* Remember preferences
* Improve platform performance
* Measure traffic and usage
* Detect fraud
* Enhance security

You may disable cookies through your browser settings, although certain features of the Services may not function properly.

---

# How We Use Information

We use information for legitimate business purposes, including:

## Providing Services

* Creating and maintaining accounts
* Processing registrations
* Facilitating auctions
* Processing purchases
* Coordinating pickup and delivery
* Managing seller accounts
* Providing customer support

## Payment Processing

* Verifying payment methods
* Preventing fraud
* Processing payments
* Processing refunds
* Managing billing

## Communications

* Auction notifications
* Outbid notices
* Winning bid notifications
* Pickup instructions
* Invoice delivery
* Account notices
* Customer support responses
* Security notifications

## Platform Improvement

* Analytics
* Performance monitoring
* Product development
* User experience improvements
* Testing new features

## Security and Compliance

* Fraud detection
* Risk assessment
* Identity verification
* Enforcement of Terms of Service
* Compliance with legal obligations
* Protection of users and property

---

# Text Messages and Email Communications

By creating an account, registering for auctions, placing bids, making purchases, or otherwise interacting with the Services, you consent to receive transactional communications including:

* Auction registration confirmations
* Bid notifications
* Outbid alerts
* Winning bidder notifications
* Invoices
* Pickup instructions
* Account-related messages
* Security notifications

These communications are considered part of the Services.

Marketing communications may be unsubscribed from at any time using the provided unsubscribe mechanism.

---

# Information Shared with Sellers

When necessary to complete a transaction, we may provide sellers with information including:

* Name
* Email address
* Telephone number
* Pickup information
* Transaction information

Such information is shared only as reasonably necessary to facilitate auction transactions.

---

# Service Providers

We may share information with trusted service providers that help us operate the Services, including:

* Payment processors
* Cloud hosting providers
* Email providers
* SMS providers
* Customer support providers
* Analytics providers
* Fraud prevention providers
* Identity verification providers
* Legal and accounting service providers

These providers may only use information as necessary to perform services on our behalf.

---

# Stripe and Payment Processing

Payments processed through Advantage.Bid may be handled by Stripe and other third-party payment processors.

By making purchases or providing payment information, you acknowledge that payment information may be collected, stored, and processed by those providers according to their privacy policies and terms.

We encourage users to review Stripe's privacy practices before providing payment information.

---

# Legal Requirements and Law Enforcement

We may disclose information when we believe disclosure is necessary to:

* Comply with laws
* Respond to subpoenas
* Respond to court orders
* Respond to governmental requests
* Protect our rights
* Protect user safety
* Investigate fraud
* Investigate criminal activity
* Enforce agreements

---

# Business Transfers

If Advantage Auction Company is involved in a merger, acquisition, asset sale, financing transaction, restructuring, bankruptcy, or similar transaction, information may be transferred as part of that transaction.

---

# Data Retention

We retain information for as long as reasonably necessary to:

* Operate the Services
* Maintain transaction records
* Comply with legal obligations
* Resolve disputes
* Enforce agreements
* Protect against fraud

Retention periods may vary depending on the nature of the information and applicable legal requirements.

---

# Data Security

We implement commercially reasonable safeguards designed to protect personal information.

However, no system, website, network, database, transmission method, or storage platform can be guaranteed to be completely secure.

Users provide information at their own risk.

---

# Your Privacy Rights

Depending on your location and applicable law, you may have rights regarding your personal information, including:

* Access
* Correction
* Deletion
* Portability
* Restriction of processing
* Objection to certain processing activities

Requests may be submitted using the contact information below.

We may require identity verification before processing requests.

---

# Children's Privacy

The Services are not intended for individuals under eighteen (18) years of age.

We do not knowingly collect personal information from children.

If we become aware that personal information has been collected from a child, we will take reasonable steps to delete such information.

---

# Third-Party Websites

The Services may contain links to third-party websites.

We are not responsible for the privacy practices, policies, content, or security of third-party websites.

Users access third-party websites at their own risk.

---

# Do Not Track

Some browsers offer a "Do Not Track" feature.

Because there is no universally accepted standard for responding to such signals, Advantage.Bid does not currently respond to Do Not Track signals.

---

# Changes to This Privacy Policy

We may update this Privacy Policy periodically.

Changes become effective upon posting to the Services unless otherwise stated.

Continued use of the Services after changes are posted constitutes acceptance of the revised Privacy Policy.

---
