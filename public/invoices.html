<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Past Invoices - Advantage.Bid</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#0f172a}
    .wrap{max-width:900px;margin:0 auto;padding:1.25rem 1rem 4rem}
    h1{font-size:1.4rem;margin:0 0 .3rem}
    .sub{color:#64748b;font-size:.9rem;margin-bottom:1rem}
    .note{font-size:.8rem;color:#64748b;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:.5rem .75rem;margin-bottom:1rem}
    table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
    th,td{text-align:left;padding:.6rem .7rem;font-size:.85rem;border-bottom:1px solid #f1f5f9}
    th{background:#f8fafc;color:#475569;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em}
    tr:last-child td{border-bottom:none}
    .pill{display:inline-block;font-size:.7rem;font-weight:700;border-radius:999px;padding:2px 8px}
    .paid{background:#dcfce7;color:#166534}.issued{background:#fef9c3;color:#854d0e}.other{background:#f1f5f9;color:#475569}
    .processing{background:#dbeafe;color:#1e40af}.failed{background:#fee2e2;color:#991b1b}.refunded{background:#ede9fe;color:#5b21b6}
    .muted{color:#94a3b8}
    .empty{padding:2rem;text-align:center;color:#64748b;background:#fff;border:1px dashed #e2e8f0;border-radius:10px}
    a.lotlink{color:#2563eb;text-decoration:none;font-weight:600}
    .pdfbtn{font:inherit;font-size:.75rem;font-weight:700;color:#2563eb;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:4px 9px;cursor:pointer;white-space:nowrap}
    .pdfbtn:hover{background:#dbeafe}
    .pdfbtn:disabled{opacity:.55;cursor:default}
    .paybtn{font:inherit;font-size:.78rem;font-weight:800;color:#fff;background:#16a34a;border:none;border-radius:6px;padding:5px 13px;cursor:pointer;white-space:nowrap;margin-right:7px}
    .paybtn:hover{background:#15803d}
    .paybtn:disabled{opacity:.55;cursor:default}
    .payhint{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;border-radius:8px;padding:9px 13px;font-size:.85rem;font-weight:600;margin-bottom:12px}
    .inum{font-variant-numeric:tabular-nums;color:#475569;font-weight:600}
  </style>
</head>
<body>
  <script src="/widgets/shared/buyer-nav.js"></script>
  <div class="wrap">
    <h1>Past Invoices</h1>
    <div class="sub">One invoice per auction you purchased, with payment status.</div>
    <div class="note">Each invoice covers everything you won in that auction. Only applicable charges are shown. Advantage never stores your full card details.</div>
    <div id="status" class="sub"></div>
    <div id="content"></div>
  </div>
  <script>
    function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
    function usd(c){return c==null?'-':'$'+(Number(c)/100).toFixed(2)}
    function fdate(s){try{return new Date(s).toLocaleDateString()}catch(e){return '-'}}
    // #7 buyer-facing plain-language status (internal status → label + style).
    function statusLabel(st){st=(st||'').toLowerCase();
      if(st==='paid')return['Paid','paid'];
      if(st==='issued'||st==='unpaid'||st==='payment_required')return['Unpaid','issued'];
      if(st==='pending'||st==='processing')return['Payment Processing','processing'];
      if(st==='failed'||st==='payment_failed')return['Payment Failed','failed'];
      if(st==='refunded'||st==='partially_refunded')return['Refunded','refunded'];
      if(st==='void')return['Void','other'];
      return[(st||'-'),'other'];}
    function pill(st){const r=statusLabel(st);return '<span class="pill '+r[1]+'">'+esc(r[0])+'</span>'}

    // Pay an unpaid COMBINED invoice in ONE payment for the whole auction. Uses the
    // combined on-session charge endpoint → payment.html; the webhook's null-lot branch
    // then settles the combined header + every per-lot invoice at once.
    async function payInvoice(combinedInvoiceId, btn){
      const token=localStorage.getItem('token');
      if(!token){location.href='/login.html?next='+encodeURIComponent('/invoices.html');return;}
      const old=btn.textContent; btn.disabled=true; btn.textContent='Starting…';
      try{
        const [cfg,intentRes]=await Promise.all([
          fetch('/api/payments/config').then(r=>r.json()).catch(()=>({})),
          fetch('/api/payments/charge-combined',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token,'Idempotency-Key':'pay-combined-'+combinedInvoiceId},body:JSON.stringify({combined_invoice_id:combinedInvoiceId})}).then(r=>r.json())
        ]);
        if(!intentRes.success)throw new Error(intentRes.message||'Payment could not be started.');
        const qs=new URLSearchParams({client_secret:intentRes.data.client_secret,amount:intentRes.data.amount_cents});
        if(cfg.publishableKey)qs.set('pk',cfg.publishableKey);
        location.href='/payment.html?'+qs.toString();
      }catch(e){alert(e.message||'Could not start payment. Please try again.');btn.disabled=false;btn.textContent=old;}
    }

    // Authenticated combined-invoice PDF download: the endpoint requires a Bearer
    // token, so fetch the bytes as a blob and trigger a client-side download.
    async function downloadInvoice(id, number, btn){
      const token=localStorage.getItem('token');
      if(!token){location.href='/login.html?next='+encodeURIComponent('/invoices.html');return;}
      const old=btn.textContent; btn.disabled=true; btn.textContent='…';
      try{
        const r=await fetch('/api/invoices/combined/'+encodeURIComponent(id)+'/pdf',{headers:{Authorization:'Bearer '+token}});
        if(!r.ok)throw new Error('HTTP '+r.status);
        const blob=await r.blob();
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url; a.download='invoice-'+(number||id)+'.pdf';
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(()=>URL.revokeObjectURL(url),4000);
      }catch(e){alert('Could not download the invoice PDF. Please try again.');}
      finally{btn.disabled=false; btn.textContent=old;}
    }

    (async function(){
      const token=localStorage.getItem('token');
      if(!token){location.href='/login.html?next='+encodeURIComponent('/invoices.html');return;}
      const s=document.getElementById('status');const c=document.getElementById('content');
      s.textContent='Loading…';
      try{
        // #5: one invoice per AUCTION (combined) instead of per lot.
        const r=await fetch('/api/invoices/mine/combined',{headers:{Authorization:'Bearer '+token}});
        if(r.status===401){location.href='/login.html?next='+encodeURIComponent('/invoices.html');return;}
        const d=await r.json();const rows=(d&&d.invoices)||[];
        s.textContent='';
        if(!rows.length){c.innerHTML='<div class="empty">No invoices yet. Auctions you purchase and their payment status will appear here.</div>';return;}
        // Payable = combined invoice not yet settled (paid/void). One Pay Now settles the whole auction.
        const isPayable=i=>['issued','unpaid','payment_required','failed','payment_failed'].includes((i.status||'').toLowerCase());
        const unpaid=rows.filter(isPayable).length;
        const hint=unpaid?('<div class="payhint">You have '+unpaid+' unpaid '+(unpaid===1?'invoice':'invoices')+'. Click <strong>Pay&nbsp;Now</strong> to complete your payment securely.</div>'):'';
        c.innerHTML=hint+'<table><thead><tr><th>Auction</th><th>Purchase Date</th><th>Amount</th><th>Status</th><th>Download Combined Invoice</th></tr></thead><tbody>'+
          rows.map(i=>{
            const id=i.combined_invoice_id;
            const pay=isPayable(i)?'<button class="paybtn" data-pay-id="'+esc(id)+'">Pay Now</button>':'';
            return '<tr>'+
            '<td>'+esc(i.auction_title||'-')+'<div class="inum" style="font-size:.72rem">'+esc(i.invoice_number||'')+'</div></td>'+
            '<td>'+fdate(i.paid_at||i.created_at)+'</td>'+
            '<td>'+usd(i.total_cents)+'</td>'+
            '<td>'+pill(i.status)+'</td>'+
            '<td>'+pay+'<button class="pdfbtn" data-id="'+esc(id)+'" data-num="'+esc(i.invoice_number||'')+'">Download</button></td>'+
          '</tr>';}).join('')+'</tbody></table>';
        c.querySelectorAll('.pdfbtn').forEach(b=>b.addEventListener('click',()=>downloadInvoice(b.getAttribute('data-id'),b.getAttribute('data-num'),b)));
        c.querySelectorAll('.paybtn').forEach(b=>b.addEventListener('click',()=>payInvoice(b.getAttribute('data-pay-id'),b)));
      }catch(e){s.textContent='Could not load invoices. Please refresh.';}
    })();
  </script>
</body>
</html>
