<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Past Invoices - Advantage.Bid</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#0f172a}
    .wrap{max-width:900px;margin:0 auto;padding:1.25rem 1rem 4rem}
    h1{font-size:1.4rem;margin:0 0 .3rem}
    .sub{color:#64748b;font-size:.9rem;margin-bottom:1rem}
    .note{font-size:.8rem;color:#64748b;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:.5rem .75rem;margin-bottom:1rem}
    table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
    th,td{text-align:left;padding:.6rem .7rem;font-size:.85rem;border-bottom:1px solid #f1f5f9}
    th{background:#f8fafc;color:#475569;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em}
    tr:last-child td{border-bottom:none}
    .pill{display:inline-block;font-size:.7rem;font-weight:700;border-radius:999px;padding:2px 8px}
    .paid{background:#dcfce7;color:#166534}.issued{background:#fef9c3;color:#854d0e}.other{background:#f1f5f9;color:#475569}
    .processing{background:#dbeafe;color:#1e40af}.failed{background:#fee2e2;color:#991b1b}.refunded{background:#ede9fe;color:#5b21b6}
    .muted{color:#94a3b8}
    .empty{padding:2rem;text-align:center;color:#64748b;background:#fff;border:1px dashed #e2e8f0;border-radius:10px}
    a.lotlink{color:#2563eb;text-decoration:none;font-weight:600}
    .pdfbtn{font:inherit;font-size:.75rem;font-weight:700;color:#2563eb;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:4px 9px;cursor:pointer;white-space:nowrap}
    .pdfbtn:hover{background:#dbeafe}
    .pdfbtn:disabled{opacity:.55;cursor:default}
    .inum{font-variant-numeric:tabular-nums;color:#475569;font-weight:600}
  </style>
</head>
<body>
  <script src="/widgets/shared/buyer-nav.js"></script>
  <div class="wrap">
    <h1>Past Invoices</h1>
    <div class="sub">Your won lots and payment history.</div>
    <div class="note">Buyer premium, sales tax, and shipping appear as $0.00 until those features go live. Advantage never stores your full card details.</div>
    <div id="status" class="sub"></div>
    <div id="content"></div>
  </div>
  <script>
    function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
    function usd(c){return c==null?'-':'$'+(Number(c)/100).toFixed(2)}
    function fdate(s){try{return new Date(s).toLocaleDateString()}catch(e){return '-'}}
    // #7 buyer-facing plain-language status (internal status → label + style).
    function statusLabel(st){st=(st||'').toLowerCase();
      if(st==='paid')return['Paid','paid'];
      if(st==='issued'||st==='unpaid')return['Unpaid','issued'];
      if(st==='pending'||st==='processing')return['Payment Processing','processing'];
      if(st==='failed'||st==='payment_failed')return['Payment Failed','failed'];
      if(st==='refunded'||st==='partially_refunded')return['Refunded','refunded'];
      return[(st||'-'),'other'];}
    function pill(st){const r=statusLabel(st);return '<span class="pill '+r[1]+'">'+esc(r[0])+'</span>'}

    // Authenticated PDF download: the endpoint requires a Bearer token, so fetch
    // the bytes as a blob and trigger a client-side download (no token in URL).
    async function downloadInvoice(id, number, btn){
      const token=localStorage.getItem('token');
      if(!token){location.href='/login.html?next='+encodeURIComponent('/invoices.html');return;}
      const old=btn.textContent; btn.disabled=true; btn.textContent='…';
      try{
        const r=await fetch('/api/invoices/'+encodeURIComponent(id)+'/pdf',{headers:{Authorization:'Bearer '+token}});
        if(!r.ok)throw new Error('HTTP '+r.status);
        const blob=await r.blob();
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url; a.download='invoice-'+(number||id)+'.pdf';
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(()=>URL.revokeObjectURL(url),4000);
      }catch(e){alert('Could not download the invoice PDF. Please try again.');}
      finally{btn.disabled=false; btn.textContent=old;}
    }

    (async function(){
      const token=localStorage.getItem('token');
      if(!token){location.href='/login.html?next='+encodeURIComponent('/invoices.html');return;}
      const s=document.getElementById('status');const c=document.getElementById('content');
      s.textContent='Loading…';
      try{
        const r=await fetch('/api/invoices/mine',{headers:{Authorization:'Bearer '+token}});
        if(r.status===401){location.href='/login.html?next='+encodeURIComponent('/invoices.html');return;}
        const d=await r.json();const rows=(d&&d.invoices)||[];
        s.textContent='';
        if(!rows.length){c.innerHTML='<div class="empty">No invoices yet. Won lots and their payment status will appear here.</div>';return;}
        c.innerHTML='<table><thead><tr><th>Invoice</th><th>Date</th><th>Auction</th><th>Lot</th><th>Total</th><th>Status</th><th>Invoice PDF</th></tr></thead><tbody>'+
          rows.map(i=>'<tr>'+
            '<td><span class="inum">'+esc(i.invoice_number||'-')+'</span></td>'+
            '<td>'+fdate(i.invoice_date||i.created_at)+'</td>'+
            '<td>'+esc(i.auction_title||'-')+'</td>'+
            '<td>'+(i.lot_id?'<a class="lotlink" href="/lot.html?lotId='+encodeURIComponent(i.lot_id)+'">'+(i.lot_number!=null?'#'+esc(i.lot_number)+' ':'')+esc(i.lot_title||'Lot')+'</a>':esc(i.lot_title||'-'))+'</td>'+
            '<td>'+usd(i.total_cents!=null?i.total_cents:i.amount_cents)+'</td>'+
            '<td>'+pill(i.status)+'</td>'+
            '<td><button class="pdfbtn" data-id="'+esc(i.id)+'" data-num="'+esc(i.invoice_number||'')+'">Download</button></td>'+
          '</tr>').join('')+'</tbody></table>';
        c.querySelectorAll('.pdfbtn').forEach(b=>b.addEventListener('click',()=>downloadInvoice(b.getAttribute('data-id'),b.getAttribute('data-num'),b)));
      }catch(e){s.textContent='Could not load invoices. Please refresh.';}
    })();
  </script>
</body>
</html>
