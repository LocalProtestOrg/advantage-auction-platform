            ? `<button class="btn btn-sm" data-reject="${auctionId}" style="background:#fee2e2;border-color:#fca5a5;color:#991b1b">Reject</button>`
            : ''}
          <span class="admin-edit-status" style="font-size:0.78rem;color:#6b7280"></span>
        </div>
        <div class="bp-preview-panel" style="display:none;margin-top:0.85rem;padding:0.7rem 0.9rem;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;font-size:0.78rem"></div>
        <!-- OPS-4: audit log timeline, lazy-loaded on click -->
        <div class="audit-log-panel" style="display:none;margin-top:0.85rem;padding:0.7rem 0.9rem;background:#f9fafb;border-radius:6px;font-size:0.75rem"></div>
      `;
      container.dataset.built = '1';
      container.querySelector('[data-save]').onclick = () => saveAuctionEdit(card, auctionId);
      // Buyer Premium Phase 1: settlement PREVIEW (NOT ACTIVE - display only).
      const bpBtn = container.querySelector('[data-bp-preview]');
      if (bpBtn) bpBtn.onclick = () => {
        const panel = container.querySelector('.bp-preview-panel');
        panel.style.display = ''; panel.innerHTML = 'Loading preview…';
        const c = v => '$' + ((v || 0) / 100).toFixed(2);
        api('GET', `/api/admin/auctions/${auctionId}/settlement-preview`).then(d => {
          if (!d.success) { panel.innerHTML = 'Failed: ' + (d.message || ''); return; }
          const t = d.data.effective_terms_bps, p = d.data.preview, bp = b => (b / 100) + '%';
          panel.innerHTML =
            '<div style="font-weight:800;color:#92400e;margin-bottom:.3rem">SETTLEMENT PREVIEW - NOT ACTIVE</div>' +
            '<div style="color:#92400e;margin-bottom:.4rem">' + d.data.note + '</div>' +
            '<div>Effective terms: BP ' + bp(t.buyer_premium_bps) + ' (' + d.data.effective_terms_bps.source.buyer_premium + ') · AAC BP share ' + bp(t.aac_bp_share_bps) + ' · Seller BP share ' + bp(t.seller_bp_share_bps) + ' · AAC hammer commission ' + bp(t.aac_hammer_commission_bps) + '</div>' +
            '<div style="margin-top:.4rem">Hammer ' + c(p.hammer_cents) + ' · Buyer premium ' + c(p.buyer_premium_cents) + ' · Buyer total ' + c(p.buyer_total_preview_cents) + '</div>' +
            '<div>AAC BP share ' + c(p.aac_bp_share_cents) + ' · Seller BP share ' + c(p.seller_bp_share_cents) + ' · AAC hammer commission ' + c(p.aac_hammer_commission_cents) + '</div>' +
            '<div style="font-weight:700;margin-top:.3rem">Net seller (preview) ' + c(p.net_seller_preview_cents) + ' · AAC total (preview) ' + c(p.aac_total_preview_cents) + '</div>';
        }).catch(e => { panel.innerHTML = 'Failed: ' + e.message; });
      };
      container.querySelector('[data-cancel]').onclick = () => { container.style.display = 'none'; };
      container.querySelector('[data-audit]').onclick = () => toggleAuditLog(container, auctionId);
      // #4 featuring (marketplace_priority via /discovery) + seller reassignment.
      const featBtn = container.querySelector('[data-feature]');
      if (featBtn) featBtn.onclick = () => {
        const s = container.querySelector('.admin-edit-status');
        const v = parseInt((container.querySelector('#feat-' + auctionId) || {}).value, 10) || 0;
        s.textContent = 'Updating featured…'; s.style.color = '#6b7280';
        api('PATCH', `/api/admin/auctions/${auctionId}/discovery`, { priority: v })
          .then(d => { s.textContent = d.success ? '✓ Featured priority set' : ('Failed: ' + (d.message || '')); s.style.color = d.success ? '#16a34a' : '#dc2626'; })
          .catch(e => { s.textContent = 'Failed: ' + e.message; s.style.color = '#dc2626'; });
      };
      const reBtn = container.querySelector('[data-reassign]');
      if (reBtn) reBtn.onclick = () => {
        const s = container.querySelector('.admin-edit-status');
        const sid = (((container.querySelector('#seller-' + auctionId) || {}).value) || '').trim();
        if (!sid) { s.textContent = 'Enter a seller_profile id.'; s.style.color = '#dc2626'; return; }
        s.textContent = 'Reassigning…'; s.style.color = '#6b7280';
        api('PATCH', `/api/admin/auctions/${auctionId}/seller`, { seller_id: sid })
          .then(d => { s.textContent = d.success ? '✓ Seller reassigned' : ('Failed: ' + (d.message || '')); s.style.color = d.success ? '#16a34a' : '#dc2626'; })
          .catch(e => { s.textContent = 'Failed: ' + e.message; s.style.color = '#dc2626'; });
      };
      // GOV-RET: only present on submitted/under_review auctions per the
      // server-side guard. Inline prompt keeps the UI lightweight - a modal
      // component would be overkill for a single-field collection.
      const rtdBtn = container.querySelector('[data-return-to-draft]');
      if (rtdBtn) rtdBtn.onclick = () => returnToDraft(card, auctionId);
      const rejBtn = container.querySelector('[data-reject]');
      if (rejBtn) rejBtn.onclick = () => rejectAuction(card, auctionId, a.title);
    }).catch(err => {
      container.innerHTML = '<div style="font-size:0.78rem;color:#dc2626">Failed: ' + err.message + '</div>';
    });
  }

  function saveAuctionEdit(card, auctionId) {
    const container = card.querySelector('.admin-edit-form-container');
    const statusEl  = container.querySelector('.admin-edit-status');
    statusEl.textContent = 'Saving…';
    statusEl.style.color = '#6b7280';

    const updates = {};
    container.querySelectorAll('[data-f]').forEach(input => {
      const field = input.dataset.f;
      if (input.type === 'checkbox') {
        updates[field] = input.checked;
      } else if (input.type === 'datetime-local') {
        // empty → null; non-empty → ISO with 'Z'
        updates[field] = input.value ? new Date(input.value).toISOString() : null;
      } else {
        const v = input.value.trim();
        updates[field] = v.length ? v : null;
      }
    });

    // ADMIN-CTRL Phase 1A: increment_ladder is JSON. Only include it when the
    // (enabled) textarea is non-empty + valid JSON; blank means "leave unchanged"
    // so we never accidentally null an active ladder.
    const ladderEl = container.querySelector('#ladder-' + auctionId);
    if (ladderEl && !ladderEl.disabled) {
      const raw = ladderEl.value.trim();
      if (raw) {
        try { updates.increment_ladder = JSON.parse(raw); }
        catch (e) { statusEl.textContent = 'Increment ladder must be valid JSON'; statusEl.style.color = '#dc2626'; return; }
      }
    }

    api('PATCH', `/api/admin/auctions/${auctionId}`, updates).then(data => {
      if (!data.success) {
        statusEl.textContent = 'Failed: ' + (data.message || 'unknown');
        statusEl.style.color = '#dc2626';
        return;
      }
      statusEl.textContent = '✓ Saved';
      statusEl.style.color = '#16a34a';
      // Refresh the list to reflect updated values
      setTimeout(() => { loadedTabs.delete('auctions'); loadAuctions(); }, 800);
    }).catch(err => {
      statusEl.textContent = 'Failed: ' + err.message;
      statusEl.style.color = '#dc2626';
    });
  }

  // GOV-RET: send a submitted/under_review auction back to the seller for
  // revisions. Reason is required server-side; we collect it via prompt to
  // keep the UI surface minimal. The server reopens seller editing via
  // state='draft', persists the reason to revision_note, and queues a
  // seller-facing notification - no client-side state to reconcile, so
  // reloadAuctions() after success is the only refresh step.
  function returnToDraft(card, auctionId) {
    const reason = prompt(
      'Why is this auction being returned to draft?\n\n' +
      'Be specific - the seller will see this verbatim and use it to revise.'
    );
    if (reason === null) return; // operator cancelled
    const trimmed = reason.trim();
    if (!trimmed) {
      alert('A revision reason is required.');
      return;
    }
    const container = card.querySelector('.admin-edit-form-container');
    const statusEl  = container ? container.querySelector('.admin-edit-status') : null;
    if (statusEl) {
      statusEl.textContent = 'Returning to draft…';
      statusEl.style.color = '#6b7280';
    }
    api('POST', `/api/admin/auctions/${auctionId}/return-to-draft`, { reason: trimmed }).then(data => {
      if (!data.success) {
        if (statusEl) { statusEl.textContent = 'Failed: ' + (data.message || 'unknown'); statusEl.style.color = '#dc2626'; }
        else alert('Failed: ' + (data.message || 'unknown'));
        return;
      }
      if (statusEl) { statusEl.textContent = 'Returned to draft. Seller notified.'; statusEl.style.color = '#059669'; }
      // Force a fresh fetch so the auction state chip + button visibility update.
      setTimeout(() => { loadedTabs.delete('auctions'); loadAuctions(); }, 600);
    }).catch(err => {
      if (statusEl) { statusEl.textContent = 'Failed: ' + err.message; statusEl.style.color = '#dc2626'; }
      else alert('Failed: ' + err.message);
    });
  }

  // GOV-REJ: terminal rejection. Two-step confirmation because the action
  // is non-reversible from the moderation UI - once rejected, the seller
  // must create a new submission. Reason is required server-side and is
  // shown to the seller verbatim, so we collect it before the confirm.
  function rejectAuction(card, auctionId, title) {
    const reason = prompt(
      `Why is "${title || 'this auction'}" being rejected?\n\n` +
      'Be specific - the seller will see this verbatim. They cannot edit the rejected auction; they will need to start a new submission.'
    );
    if (reason === null) return;
    const trimmed = reason.trim();
    if (!trimmed) {
      alert('A rejection reason is required.');
      return;
    }
    if (!confirm(`Reject this auction?\n\nThis is terminal - the seller cannot edit a rejected auction.\n\nReason:\n${trimmed}`)) {
      return;
    }
    const container = card.querySelector('.admin-edit-form-container');
    const statusEl  = container ? container.querySelector('.admin-edit-status') : null;
    if (statusEl) {
      statusEl.textContent = 'Rejecting…';
      statusEl.style.color = '#6b7280';
    }
    api('POST', `/api/admin/auctions/${auctionId}/reject`, { reason: trimmed }).then(data => {
      if (!data.success) {
        if (statusEl) { statusEl.textContent = 'Failed: ' + (data.message || 'unknown'); statusEl.style.color = '#dc2626'; }
        else alert('Failed: ' + (data.message || 'unknown'));
        return;
      }
      if (statusEl) { statusEl.textContent = 'Rejected. Seller notified.'; statusEl.style.color = '#059669'; }
      setTimeout(() => { loadedTabs.delete('auctions'); loadAuctions(); }, 600);
    }).catch(err => {
      if (statusEl) { statusEl.textContent = 'Failed: ' + err.message; statusEl.style.color = '#dc2626'; }
      else alert('Failed: ' + err.message);
    });
  }

  // SMA-S1b: Suspend / Unsuspend handlers. Expose the existing, already-
  // enforced admin endpoints (POST /api/admin/sellers/:id/{suspend,unsuspend})
  // - suspension sets users.is_active=false, which the login path rejects.
  // Mirrors the Tier 1 mutation pattern (prompt optional reason → confirm →
  // POST → reload). The triggering button is disabled while in-flight to
  // avoid a double-submit; the endpoint also 409s on a redundant transition.
  // On success we reload the sellers list so the Suspended badge + the
  // Suspend/Unsuspend label flip; the resulting seller_suspended /
  // seller_unsuspended audit event is already visible via the Tier 2 History
  // button. No change to api() or any backend (reason omitted from the body
  // when blank - the endpoint treats a missing reason as null).
  function reloadSellersPreservingSearch() {
    const box = document.getElementById('seller-search');
    loadSellers(box ? box.value.trim() : '');
  }

  function suspendSeller(sellerProfileId, email, btn) {
    const who = email || 'this seller';
    const reason = prompt(
      `Reason for suspending ${who}? (optional)\n\n` +
      'The seller does not see this; it is recorded in the audit log for accountability.'
    );
    if (reason === null) return; // operator cancelled
    if (!confirm(
      `Suspend ${who}?\n\n` +
      'They will be unable to log in until unsuspended. This blocks all login for the account.'
    )) return;
    const trimmed = reason.trim();
    if (btn) { btn.disabled = true; btn.textContent = 'Suspending…'; }
    showMsg('sellers-status', 'Suspending ' + who + '…');
    api('POST', `/api/admin/sellers/${sellerProfileId}/suspend`, trimmed ? { reason: trimmed } : {}).then(data => {
      if (!data.success) {
        showMsg('sellers-status', 'Failed: ' + (data.message || 'unknown'), true);
        if (btn) { btn.disabled = false; btn.textContent = 'Suspend'; }
        return;
      }
      showMsg('sellers-status', '');
      reloadSellersPreservingSearch();
    }).catch(err => {
      showMsg('sellers-status', 'Failed: ' + err.message, true);
      if (btn) { btn.disabled = false; btn.textContent = 'Suspend'; }
    });
  }

  function unsuspendSeller(sellerProfileId, email, btn) {
    const who = email || 'this seller';
    const reason = prompt(
      `Reason for unsuspending ${who}? (optional)\n\n` +
      'Recorded in the audit log for accountability.'
    );
    if (reason === null) return; // operator cancelled
    const trimmed = reason.trim();
    if (btn) { btn.disabled = true; btn.textContent = 'Unsuspending…'; }
    showMsg('sellers-status', 'Unsuspending ' + who + '…');
    api('POST', `/api/admin/sellers/${sellerProfileId}/unsuspend`, trimmed ? { reason: trimmed } : {}).then(data => {
      if (!data.success) {
        showMsg('sellers-status', 'Failed: ' + (data.message || 'unknown'), true);
        if (btn) { btn.disabled = false; btn.textContent = 'Unsuspend'; }
        return;
      }
      showMsg('sellers-status', '');
      reloadSellersPreservingSearch();
    }).catch(err => {
      showMsg('sellers-status', 'Failed: ' + err.message, true);
      if (btn) { btn.disabled = false; btn.textContent = 'Unsuspend'; }
    });
  }

  function escAttr(v) {
    if (v == null) return '';
    return String(v).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function escText(v) {
    if (v == null) return '';
    return String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // OPS-4: audit log timeline panel inside the edit form. Toggleable.
  function toggleAuditLog(container, auctionId) {
    const panel = container.querySelector('.audit-log-panel');
    if (!panel) return;
    if (panel.style.display !== 'none') {
      panel.style.display = 'none';
      return;
    }
    panel.style.display = '';
    panel.innerHTML = '<div style="color:#6b7280">Loading audit log…</div>';
    api('GET', `/api/admin/audit-log?auction_id=${auctionId}&limit=50`).then(data => {
      if (!data.success) {
        panel.innerHTML = '<div style="color:#dc2626">Audit log fetch failed: ' + (data.message || 'unknown') + '</div>';
        return;
      }
      const entries = data.data || [];
      if (!entries.length) {
        panel.innerHTML = '<div style="color:#9ca3af;font-style:italic">No audit entries for this auction yet. Admin actions taken after this point will appear here.</div>';
        return;
      }
      const rows = entries.map(e => {
        const when    = new Date(e.created_at).toLocaleString();
        const actor   = e.actor_email || (e.actor_id ? '(unknown user)' : 'system');
        const metaHtml = prettyAdminMetadata(e.event_type, e.metadata);
        return `
          <div style="padding:0.4rem 0;border-bottom:1px solid #e5e7eb">
            <div style="font-weight:700;color:#111">${escText(e.event_type)}</div>
            <div style="color:#6b7280;font-size:0.72rem">${escText(when)} · ${escText(actor)}</div>
            ${metaHtml}
          </div>
        `;
      }).join('');
      panel.innerHTML = `<div style="font-weight:700;margin-bottom:0.5rem">Audit Log (${entries.length} ${entries.length === 1 ? 'entry' : 'entries'})</div>` + rows;
    }).catch(err => {
      panel.innerHTML = '<div style="color:#dc2626">Audit log error: ' + err.message + '</div>';
    });
  }

  // AUD-VIS (Tier 2): per-seller audit timeline. Structurally parallel to
  // toggleAuditLog, but filtered by entity_type=seller_profile&entity_id so it
  // returns the NULL-auction_id seller events (suspend / unsuspend /
  // capabilities) that the auction-scoped panel cannot surface. Reuses
  // prettyAdminMetadata + escText verbatim - same renderer, different filter
  // (see docs/admin-audit-visibility-tier2-plan.md §4.2). toggleAuditLog is
  // deliberately left untouched (no refactor).
  function toggleSellerAudit(container, sellerProfileId) {
    const panel = container.querySelector('.audit-log-panel');
    if (!panel) return;
    if (panel.style.display !== 'none') {
      panel.style.display = 'none';
      return;
    }
    panel.style.display = '';
    panel.innerHTML = '<div style="color:#6b7280">Loading audit log…</div>';
    const qs = `entity_type=seller_profile&entity_id=${encodeURIComponent(sellerProfileId)}&limit=50`;
    api('GET', `/api/admin/audit-log?${qs}`).then(data => {
      if (!data.success) {
        panel.innerHTML = '<div style="color:#dc2626">Audit log fetch failed: ' + (data.message || 'unknown') + '</div>';
        return;
      }
      const entries = data.data || [];
      if (!entries.length) {
        panel.innerHTML = '<div style="color:#9ca3af;font-style:italic">No recorded admin actions for this seller yet.</div>';
        return;
      }
      const rows = entries.map(e => {
        const when    = new Date(e.created_at).toLocaleString();
        const actor   = e.actor_email || (e.actor_id ? '(unknown user)' : 'system');
        const metaHtml = prettyAdminMetadata(e.event_type, e.metadata);
        return `
          <div style="padding:0.4rem 0;border-bottom:1px solid #e5e7eb">
            <div style="font-weight:700;color:#111">${escText(e.event_type)}</div>
            <div style="color:#6b7280;font-size:0.72rem">${escText(when)} · ${escText(actor)}</div>
            ${metaHtml}
          </div>
        `;
      }).join('');
      panel.innerHTML = `<div style="font-weight:700;margin-bottom:0.5rem">Audit Log (${entries.length} ${entries.length === 1 ? 'entry' : 'entries'})</div>` + rows;
    }).catch(err => {
      panel.innerHTML = '<div style="color:#dc2626">Audit log error: ' + err.message + '</div>';
    });
  }

  // AUD-EXP: pretty-print the high-signal fields in audit_log metadata so
  // operators don't have to mentally parse JSON. For event types we know
  // about, render specific labels. For unknown types, fall back to a
  // compact JSON dump so we never lose information.
  function prettyAdminMetadata(eventType, metadata) {
    if (!metadata || typeof metadata !== 'object') return '';
    if (eventType === 'auction_returned_to_draft' || eventType === 'auction_rejected') {
      const parts = [];
      if (metadata.from_state) parts.push(`<span style="color:#475569">from <strong>${escText(metadata.from_state)}</strong></span>`);
      if (metadata.reason)     parts.push(`<div style="margin-top:0.25rem;padding:0.35rem 0.55rem;background:#fff;border:1px solid #e5e7eb;border-radius:4px;color:#1f2937;white-space:pre-wrap">${escText(metadata.reason)}</div>`);
      return parts.length ? `<div style="margin-top:0.25rem;font-size:0.72rem">${parts.join('')}</div>` : '';
    }
    if (eventType === 'auction_updated' || eventType === 'auction_submitted') {
      const cf = metadata.changed_fields;
      if (!cf || Object.keys(cf).length === 0) return '';
      const items = Object.entries(cf).map(([k, v]) => {
        const from = v && v.from != null ? JSON.stringify(v.from) : '∅';
        const to   = v && v.to   != null ? JSON.stringify(v.to)   : '∅';
        return `<li><code style="background:#f1f5f9;padding:0 4px;border-radius:3px">${escText(k)}</code>: ${escText(from)} → ${escText(to)}</li>`;
      }).join('');
      return `<details style="margin-top:0.25rem"><summary style="font-size:0.72rem;color:#475569;cursor:pointer">${Object.keys(cf).length} field(s) changed</summary><ul style="margin:0.3rem 0 0 1rem;padding:0;font-size:0.72rem;color:#475569">${items}</ul></details>`;
    }
    if (eventType === 'lot_added' || eventType === 'lot_withdrawn' || eventType === 'lot_updated') {
      const lot = metadata.lot_number != null ? `Lot #${metadata.lot_number}` : null;
      const title = metadata.title || null;
      const actor = metadata.actor_role ? `(${metadata.actor_role})` : '';
      const parts = [lot, title, actor].filter(Boolean).join(' · ');
      return parts ? `<div style="margin-top:0.2rem;font-size:0.72rem;color:#475569">${escText(parts)}</div>` : '';
    }
    if (eventType === 'lot_auto_closed') {
      const cents = metadata.winning_amount_cents;
      const sold  = metadata.had_bid ? `sold at ${cents != null ? '$' + (cents / 100).toFixed(2) : 'n/a'}` : 'no bids - unsold';
      return `<div style="margin-top:0.2rem;font-size:0.72rem;color:#475569">${escText(sold)}</div>`;
    }
    // AUD-VIS (Tier 2): seller-scoped moderation events. Reason box mirrors the
    // auction_rejected style; capability diff mirrors the auction_updated
    // changed-fields style. Additive branches on this existing dispatcher.
    if (eventType === 'seller_suspended' || eventType === 'seller_unsuspended') {
      const inner = metadata.reason
        ? `<div style="margin-top:0.25rem;padding:0.35rem 0.55rem;background:#fff;border:1px solid #e5e7eb;border-radius:4px;color:#1f2937;white-space:pre-wrap">${escText(metadata.reason)}</div>`
        : `<span style="color:#9ca3af;font-style:italic">no reason recorded</span>`;
      return `<div style="margin-top:0.25rem;font-size:0.72rem">${inner}</div>`;
    }
    if (eventType === 'seller_capabilities_changed') {
      const keys   = Array.isArray(metadata.changed_keys) ? metadata.changed_keys : [];
      if (!keys.length) return '';
      const before = metadata.before || {};
      const after  = metadata.after  || {};
      const items = keys.map(k => {
        const from = before[k] != null ? JSON.stringify(before[k]) : '∅';
        const to   = after[k]  != null ? JSON.stringify(after[k])  : '∅';
        return `<li><code style="background:#f1f5f9;padding:0 4px;border-radius:3px">${escText(k)}</code>: ${escText(from)} → ${escText(to)}</li>`;
      }).join('');
      return `<details style="margin-top:0.25rem"><summary style="font-size:0.72rem;color:#475569;cursor:pointer">${keys.length} capability change(s)</summary><ul style="margin:0.3rem 0 0 1rem;padding:0;font-size:0.72rem;color:#475569">${items}</ul></details>`;
    }
    // SELLER-TYPE PHASE B: seller_type_changed - show before → after. Additive
    // branch on this dispatcher (mirrors the capabilities-diff style).
    if (eventType === 'seller_type_changed') {
      const from = metadata.before != null ? escText(String(metadata.before)) : '∅';
      const to   = metadata.after  != null ? escText(String(metadata.after))  : '∅';
      return `<div style="margin-top:0.25rem;font-size:0.72rem;color:#475569">type: `
           + `<code style="background:#f1f5f9;padding:0 4px;border-radius:3px">${from}</code> → `
           + `<code style="background:#f1f5f9;padding:0 4px;border-radius:3px">${to}</code></div>`;
    }
    // Seller-Type Rules Phase C: admin override of a schedule rule.
    if (eventType === 'schedule_rule_overridden') {
      const rule = (metadata.violations && metadata.violations[0] && metadata.violations[0].rule) || 'schedule rule';
      const parts = [`<span style="color:#475569">override of <strong>${escText(rule)}</strong></span>`];
      if (metadata.override_reason) {
        parts.push(`<div style="margin-top:0.25rem;padding:0.35rem 0.55rem;background:#fff;border:1px solid #e5e7eb;border-radius:4px;color:#1f2937;white-space:pre-wrap">${escText(metadata.override_reason)}</div>`);
      }
      return `<div style="margin-top:0.25rem;font-size:0.72rem">${parts.join('')}</div>`;
    }
    // AI Catalog Assistant Phase 2A: verification provenance recorded on a lot.
    if (eventType === 'lot_ai_verification_recorded') {
      const refined = metadata.refined ? 'refined from seller confirmations' : 'no refinement';
      return `<div style="margin-top:0.2rem;font-size:0.72rem;color:#475569">AI description verified · ${escText(refined)}</div>`;
    }
    // Unknown event type: compact JSON so operators still see what changed.
    const json = JSON.stringify(metadata);
    return `<div style="margin-top:0.2rem;font-size:0.7rem;color:#9ca3af;font-family:monospace;word-break:break-all">${escText(json)}</div>`;
  }

  function doCloseAuction(auctionId) {
    api('POST', `/api/admin/auctions/${auctionId}/close`).then(data => {
      if (!data.success) { alert(data.message || 'Close failed'); return; }
      loadedTabs.delete('auctions');
      loadAuctions();
    }).catch(err => alert(err.message));
  }

  // ── Sellers tab ───────────────────────────────────────────────────────────────

  // SELLER-TYPE PHASE B: client mirror of src/constants/sellerTypes.js (a static
  // HTML page can't require the module). Keep in sync with that file and the
  // migration 051 CHECK. Order: non-professional first, then professional.
  const SELLER_TYPE_OPTIONS = [
    ['private', 'Private'],
    ['business', 'Business'],
    ['other', 'Other'],
    ['auction_house', 'Auction House'],
    ['estate_sale_company', 'Estate Sale Company'],
    ['professional_liquidator', 'Professional Liquidator'],
  ];

  // SELLER-TYPE PHASE B (decision #4: admin-visible settings need an admin edit
  // path). Assign a seller's type via the existing admin endpoint, then reload
  // so the row + the cosmetic meta line reflect it. The seller_type_changed
  // audit event is reviewable via the History button on the same row (Tier 2).
  // Phase B enforces NO scheduling rule - this only writes the type + audits.
  function setSellerType(sellerProfileId, email, sel) {
    const newType = sel.value;
    const prev    = sel.dataset.prev || '';
    if (!newType || newType === prev) return;
    const label = sel.options[sel.selectedIndex] ? sel.options[sel.selectedIndex].textContent : newType;
    if (!confirm(
      `Change ${email || 'this seller'} to "${label}"?\n\n` +
      'Professional types (Auction House, Estate Sale Company, Professional Liquidator) ' +
      'will be exempt from the 48-hour pickup rule once scheduling enforcement is enabled.'
    )) {
      sel.value = prev; // revert the visible selection
      return;
    }
    sel.disabled = true;
    showMsg('sellers-status', 'Updating seller type for ' + (email || 'seller') + '…');
    api('POST', `/api/admin/sellers/${sellerProfileId}/seller-type`, { seller_type: newType }).then(data => {
      if (!data.success) {
        showMsg('sellers-status', 'Failed: ' + (data.message || 'unknown'), true);
        sel.value = prev; sel.disabled = false;
        return;
      }
      showMsg('sellers-status', '');
      reloadSellersPreservingSearch();
    }).catch(err => {
      showMsg('sellers-status', 'Failed: ' + err.message, true);
      sel.value = prev; sel.disabled = false;
    });
  }

  function loadSellers(search) {
    showMsg('sellers-status', 'Loading…');
    api('GET', '/api/admin/sellers?search=' + encodeURIComponent(search)).then(data => {
      showMsg('sellers-status', '');
      const list = document.getElementById('sellers-list');
      list.innerHTML = '';
      const sellers = data.data || [];
      if (!sellers.length) {
        list.appendChild(el('div', 'empty', search ? `No sellers match "${search}".` : 'No sellers found.'));
        return;
      }
      sellers.forEach(s => {
        const row = el('div', 'row-item');
        const main = el('div', 'row-main');
        main.appendChild(el('div', 'row-title', s.email));
        const caps = s.capabilities ? Object.keys(s.capabilities).filter(k => s.capabilities[k]) : [];
        const metaParts = [
          s.seller_type,
          s.auction_count + ' auction' + (s.auction_count === 1 ? '' : 's'),
          caps.length ? caps.join(', ') : null,
          'joined ' + fmtDate(s.user_created_at),
        ].filter(Boolean);
        main.appendChild(el('div', 'row-meta', metaParts.join(' · ')));
        row.appendChild(main);

        // SELLER-TYPE PHASE B: in-place seller_type editor (decision #4 -
        // admin-visible settings need an admin edit path). seller_type was
        // display-only in the meta line; this <select> makes the current value
        // visible AND editable. Closed set of 6 → a select is the right control
        // (vs. the free-text prompt used by suspend). On change → setSellerType.
        if (s.seller_profile_id) {
          const typeSel = document.createElement('select');
          typeSel.className = 'seller-type-select';
          typeSel.title = 'Seller type';
          typeSel.style.flexShrink = '0';
          typeSel.style.fontSize   = '0.75rem';
          typeSel.style.padding    = '0.25rem 0.4rem';
          typeSel.style.border     = '1px solid #d1d5db';
          typeSel.style.borderRadius = '6px';
          // Untyped (legacy NULL) sellers get a disabled placeholder so we never
          // misrepresent an unset seller as 'private' in the control.
          if (!s.seller_type) {
            const ph = document.createElement('option');
            ph.value = ''; ph.textContent = '(unset)'; ph.disabled = true; ph.selected = true;
            typeSel.appendChild(ph);
          }
          SELLER_TYPE_OPTIONS.forEach(([val, label]) => {
            const opt = document.createElement('option');
            opt.value = val; opt.textContent = label;
            if (s.seller_type === val) opt.selected = true;
            typeSel.appendChild(opt);
          });
          typeSel.dataset.prev = s.seller_type || '';
          typeSel.onchange = () => setSellerType(s.seller_profile_id, s.email, typeSel);
          row.appendChild(typeSel);
        }

        // SMA-S1a: surface suspension status from the is_active value the
        // sellers endpoint already returns (previously fetched but never
        // displayed). Pure display - a red pill, only when suspended.
        const isSuspended = s.is_active === false;
        if (isSuspended) {
          const badge = el('span', 'badge badge-rejected', 'Suspended');
          badge.style.flexShrink = '0';
          row.appendChild(badge);
        }

        // SMA-S1b: state-aware Suspend / Unsuspend action, exposing the
        // existing admin endpoints (see suspendSeller / unsuspendSeller). The
        // resulting audit event is reviewable via the Tier 2 History button
        // below - a see-status → act → review loop. Guarded on
        // seller_profile_id (the endpoint route param). Suspend is styled red
        // to match the Tier 1 reject action; Unsuspend stays neutral.
        if (s.seller_profile_id) {
          const actionBtn = el('button', 'btn btn-sm', isSuspended ? 'Unsuspend' : 'Suspend');
          actionBtn.style.flexShrink = '0';
          if (!isSuspended) {
            actionBtn.style.background  = '#fee2e2';
            actionBtn.style.borderColor = '#fca5a5';
            actionBtn.style.color       = '#991b1b';
          }
          actionBtn.onclick = () => isSuspended
            ? unsuspendSeller(s.seller_profile_id, s.email, actionBtn)
            : suspendSeller(s.seller_profile_id, s.email, actionBtn);
          row.appendChild(actionBtn);
        }

        // AUD-VIS (Tier 2): per-seller audit history. seller_suspended /
        // seller_unsuspended / seller_capabilities_changed are written with
        // entity_type='seller_profile', entity_id=seller_profiles.id, and
        // auction_id=NULL - so they never appear in Tier 1's auction-scoped
        // History. This row-level History button surfaces them via the SAME
        // GET /api/admin/audit-log endpoint (entity_type/entity_id filters,
        // already supported) and the SAME prettyAdminMetadata() renderer. The
        // panel is a full-width child; .row-item is flex-wrap:wrap, so it
        // wraps onto its own line below the seller's content. Read-only - no
        // change to any seller-management workflow.
        if (s.seller_profile_id) {
          const auditContainer = el('div', 'seller-audit-container');
          auditContainer.style.flexBasis = '100%';
          auditContainer.style.width     = '100%';
          const auditPanel = el('div', 'audit-log-panel');
          auditPanel.style.display      = 'none';
          auditPanel.style.marginTop    = '0.6rem';
          auditPanel.style.padding      = '0.7rem 0.9rem';
          auditPanel.style.background   = '#f9fafb';
          auditPanel.style.borderRadius = '6px';
          auditPanel.style.fontSize     = '0.75rem';
          auditContainer.appendChild(auditPanel);

          const historyBtn = el('button', 'btn btn-sm', 'History');
          historyBtn.style.flexShrink = '0';
          historyBtn.onclick = () => toggleSellerAudit(auditContainer, s.seller_profile_id);
          row.appendChild(historyBtn);
          row.appendChild(auditContainer);
        }

        list.appendChild(row);
      });
    }).catch(err => showMsg('sellers-status', err.message, true));
  }

  function searchSellers(e) {
    e.preventDefault();
    loadSellers(document.getElementById('seller-search').value.trim());
  }

  // ── Payouts tab ───────────────────────────────────────────────────────────────
  function loadPayouts(status, filterBtn) {
    if (filterBtn) {
      document.querySelectorAll('#payouts-filter .filter-btn').forEach(b => b.classList.remove('active'));
      filterBtn.classList.add('active');
    }
    showMsg('payouts-status', 'Loading…');
    api('GET', `/api/admin/payouts?status=${status}`).then(data => {
      showMsg('payouts-status', '');
      const list = document.getElementById('payouts-list');
      list.innerHTML = '';
      const payouts = data.data || [];
      if (!payouts.length) { list.appendChild(el('div', 'empty', 'No payouts found.')); return; }
      payouts.forEach(p => {
        const row = el('div', 'row-item');
        const main = el('div', 'row-main');
        main.appendChild(el('div', 'row-title', p.seller_email + ' - ' + (p.auction_title || 'Auction')));
        main.appendChild(el('div', 'row-meta', fmtDate(p.created_at) + ' · ' + (p.payout_method || 'unknown method') + ' · ' + p.payout_status));
        row.appendChild(main);

        const right = el('div');
        right.style.cssText = 'text-align:right;flex-shrink:0;';
        right.appendChild(el('div', 'row-amount', fmtMoney(p.seller_payout_cents)));
        right.appendChild(el('div', 'row-submeta', 'Gross ' + fmtMoney(p.gross_revenue_cents) + ' · Fee ' + fmtMoney(p.platform_fee_cents)));
        row.appendChild(right);
        list.appendChild(row);
      });
    }).catch(err => showMsg('payouts-status', err.message, true));
  }

  // ── Diagnostics tab ───────────────────────────────────────────────────────────
  function loadDiagnostics() {
    showMsg('diag-status', 'Loading…');
    Promise.all([
      api('GET', '/api/admin/diagnostics/auctions'),
      api('GET', '/api/admin/diagnostics/payments'),
      api('GET', '/api/admin/diagnostics/notifications'),
    ]).then(([auctionRes, paymentRes, notifRes]) => {
      showMsg('diag-status', '');
      const content = document.getElementById('diag-content');
      content.innerHTML = '';

      // Auctions
      content.appendChild(el('div', 'section-label', 'Auctions'));
      const aGrid = el('div', 'diag-grid');
      const aCard = el('div', 'diag-card');
      aCard.appendChild(el('div', 'diag-title', 'Auction States'));
      (auctionRes.data.auction_states || []).forEach(s => {
        const row = el('div', 'diag-row');
        row.appendChild(el('span', 'diag-row-label', s.state));
        row.appendChild(el('span', 'diag-row-value', String(s.count)));
        aCard.appendChild(row);
      });
      aGrid.appendChild(aCard);

      const openCard = el('div', 'diag-card');
      openCard.appendChild(el('div', 'diag-title', 'Open Lots'));
      openCard.appendChild(el('div', 'diag-big accent-green', String(auctionRes.data.open_lots)));
      aGrid.appendChild(openCard);
      content.appendChild(aGrid);

      // Payments
      content.appendChild(el('div', 'section-label', 'Payments'));
      const pGrid = el('div', 'diag-grid');
      const pCard = el('div', 'diag-card');
      pCard.appendChild(el('div', 'diag-title', 'Payment Statuses'));
      (paymentRes.data.by_status || []).forEach(s => {
        const row = el('div', 'diag-row');
        row.appendChild(el('span', 'diag-row-label', s.status));
        row.appendChild(el('span', 'diag-row-value', String(s.count)));
        pCard.appendChild(row);
      });
      pGrid.appendChild(pCard);
      content.appendChild(pGrid);

      // Notifications
      content.appendChild(el('div', 'section-label', 'Notifications'));
      const nGrid = el('div', 'diag-grid');
      const nStatusCard = el('div', 'diag-card');
      nStatusCard.appendChild(el('div', 'diag-title', 'Notification Statuses'));
      (notifRes.data.by_status || []).forEach(s => {
        const row = el('div', 'diag-row');
        row.appendChild(el('span', 'diag-row-label', s.status));
        row.appendChild(el('span', 'diag-row-value', String(s.count)));
        nStatusCard.appendChild(row);
      });
      nGrid.appendChild(nStatusCard);

      const qCard = el('div', 'diag-card');
      qCard.appendChild(el('div', 'diag-title', 'Queue Depth'));
      qCard.appendChild(el('div', 'diag-big', String(notifRes.data.queue_depth)));
      nGrid.appendChild(qCard);
      content.appendChild(nGrid);

      // Recent notifications
      content.appendChild(el('div', 'section-label', 'Recent Notifications'));
      const nList = el('div', 'row-list');
      const recents = notifRes.data.recent_notifications || [];
      if (!recents.length) {
        nList.appendChild(el('div', 'empty', 'No recent notifications.'));
      } else {
        recents.forEach(n => {
          const row = el('div', 'row-item');
          const main = el('div', 'row-main');
          main.appendChild(el('div', 'row-title', n.notification_type + ' - ' + n.channel));
          const retryNote = n.retry_count > 0 ? ` · ${n.retry_count} retries` : '';
          const failNote  = n.failed_reason ? ` · ${n.failed_reason}` : '';
          main.appendChild(el('div', 'row-meta', n.status + ' · ' + fmtDate(n.created_at) + retryNote + failNote));
          row.appendChild(main);
          nList.appendChild(row);
        });
      }
      content.appendChild(nList);
    }).catch(err => showMsg('diag-status', err.message, true));
  }

  // ── Bootstrap ─────────────────────────────────────────────────────────────────
  loadQueue();
  </script>
</body>
</html>
