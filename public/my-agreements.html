<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>My Agreements</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; background: #f1f5f9; color: #1f2937; }
    .wrap { max-width: 820px; margin: 1.5rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    .row { background: #fff; border: 1px solid #e5e7eb; border-radius: 9px; padding: 0.9rem 1.1rem; margin-bottom: 0.7rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .name { font-weight: 600; }
    .muted { color: #64748b; font-size: 0.82rem; }
    .badge { display: inline-block; padding: 0.1rem 0.55rem; border-radius: 999px; font-size: 0.72rem; font-weight: 600; }
    .b-sent { background: #dbeafe; color: #1e40af; } .b-viewed { background: #fef3c7; color: #92400e; }
    .b-signed { background: #dcfce7; color: #166534; } .b-expired, .b-revoked, .b-superseded { background: #fee2e2; color: #991b1b; }
    button, a.btn { background: #2563eb; color: #fff; border: 0; border-radius: 7px; padding: 0.5rem 0.9rem; font: inherit; cursor: pointer; text-decoration: none; }
    a.btn.ghost { background: #e2e8f0; color: #1f2937; }
    .empty { color: #64748b; padding: 2rem; text-align: center; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>My Agreements</h1>
    <div id="list"><div class="empty">Loading…</div></div>
  </div>
  <script>
    var token = localStorage.getItem('token');
    if (!token) { location.href = '/login.html?next=' + encodeURIComponent('/my-agreements.html'); }

    function badge(s) { return '<span class="badge b-' + s + '">' + s + '</span>'; }

    async function load() {
      var res = await fetch('/api/agreements/mine', { headers: { Authorization: 'Bearer ' + token } });
      if (res.status === 401) { location.href = '/login.html'; return; }
      var json = await res.json();
      var list = document.getElementById('list');
      var items = (json && json.data) || [];
      if (!items.length) { list.innerHTML = '<div class="empty">You have no agreements yet.</div>'; return; }
      list.innerHTML = '';
      items.forEach(function (a) {
        var div = document.createElement('div'); div.className = 'row';
        var left = document.createElement('div');
        left.innerHTML = '<div class="name">' + (a.template_name || 'Agreement') + ' ' + badge(a.status) + '</div>' +
          '<div class="muted">' + (a.signed_at ? 'Signed ' + new Date(a.signed_at).toLocaleDateString()
            : (a.expires_at ? 'Expires ' + new Date(a.expires_at).toLocaleDateString() : '')) + '</div>';
        var right = document.createElement('div');
        if (a.status === 'sent' || a.status === 'viewed') {
          var b = document.createElement('a'); b.className = 'btn'; b.textContent = 'Review & Sign';
          b.href = '/sign-agreement.html?id=' + a.id; right.appendChild(b);
        } else if (a.status === 'signed') {
          var d = document.createElement('button'); d.textContent = 'Download PDF';
          d.onclick = async function () {
            var r = await fetch('/api/agreements/' + a.id + '/pdf', { headers: { Authorization: 'Bearer ' + token } });
            var j = await r.json(); if (j && j.url) window.open(j.url, '_blank'); else alert(j.message || 'PDF not available yet.');
          };
          right.appendChild(d);
        }
        div.appendChild(left); div.appendChild(right); list.appendChild(div);
      });
    }
    load();
  </script>
</body>
</html>
