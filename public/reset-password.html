<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Advantage.Bid</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f4f4f5; color: #111; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #111; padding: 0.9rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .brand { color: #fff; font-weight: 700; font-size: 1rem; text-decoration: none; }
    .header-browse { color: #94a3b8; font-size: 0.8rem; text-decoration: none; }
    .header-browse:hover { color: #e2e8f0; }
    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .card { background: #fff; border: 1px solid #e4e4e7; border-radius: 12px; padding: 2rem; width: 100%; max-width: 400px; }
    .card-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; text-align: center; }
    .card-sub { font-size: 0.85rem; color: #71717a; text-align: center; line-height: 1.5; margin-bottom: 1.5rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.8rem; font-weight: 600; color: #374151; margin-bottom: 0.35rem; }
    .field input { width: 100%; padding: 0.55rem 0.75rem; font-size: 0.9rem; border: 1.5px solid #d1d5db; border-radius: 7px; background: #fff; color: #111; transition: border-color 0.15s; }
    .field input:focus { outline: none; border-color: #111; }
    .field input.error { border-color: #dc2626; }
    .btn-submit { width: 100%; padding: 0.7rem; font-size: 0.9rem; font-weight: 700; background: #111; color: #fff; border: none; border-radius: 7px; cursor: pointer; margin-top: 0.5rem; transition: background 0.15s; }
    .btn-submit:hover:not(:disabled) { background: #222; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { display: none; font-size: 0.82rem; border-radius: 6px; padding: 0.6rem 0.75rem; margin-bottom: 1rem; }
    .msg.visible { display: block; }
    .msg.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .msg.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .note { margin-top: 1.25rem; font-size: 0.78rem; color: #71717a; text-align: center; line-height: 1.5; }
    .note a { color: #111; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>

<header>
  <a class="brand" href="/">Advantage.Bid</a>
  <a href="/login.html" class="header-browse">Back to sign in →</a>
</header>

<div class="page">
  <div class="card">
    <div class="card-title">Choose a new password</div>
    <div class="card-sub">Enter a new password for your Advantage.Bid account.</div>

    <div class="msg error"   id="err"></div>
    <div class="msg success" id="ok"></div>

    <div id="form">
      <div class="field">
        <label for="password">New password</label>
        <input type="password" id="password" autocomplete="new-password" placeholder="At least 8 characters" />
      </div>
      <div class="field">
        <label for="confirm">Confirm new password</label>
        <input type="password" id="confirm" autocomplete="new-password" placeholder="••••••••" />
      </div>
      <button class="btn-submit" id="btn" onclick="submitReset()">Update password</button>
    </div>

    <p class="note"><a href="/login.html">Return to sign in</a></p>
  </div>
</div>

<script>
  var TOKEN = new URLSearchParams(window.location.search).get('token') || '';

  function showMsg(id, text) {
    var el = document.getElementById(id);
    el.textContent = text;
    el.classList.add('visible');
  }
  function clearMsgs() {
    ['err', 'ok'].forEach(function (id) { document.getElementById(id).classList.remove('visible'); });
    document.querySelectorAll('input.error').forEach(function (el) { el.classList.remove('error'); });
  }

  // No token in the URL → the link is malformed/expired; guide the user back.
  if (!TOKEN) {
    document.getElementById('form').style.display = 'none';
    showMsg('err', 'This reset link is missing or invalid. Please request a new one from the Forgot Password page.');
  }

  function submitReset() {
    clearMsgs();
    var password = document.getElementById('password').value;
    var confirm  = document.getElementById('confirm').value;

    if (password.length < 8) {
      document.getElementById('password').classList.add('error');
      showMsg('err', 'Password must be at least 8 characters.');
      return;
    }
    if (password !== confirm) {
      document.getElementById('confirm').classList.add('error');
      showMsg('err', 'Passwords do not match.');
      return;
    }

    var btn = document.getElementById('btn');
    btn.disabled = true;
    btn.textContent = 'Updating…';

    fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: TOKEN, password: password }),
    })
      .then(function (res) { return res.json().then(function (b) { return { status: res.status, body: b }; }); })
      .then(function (r) {
        if (r.body && r.body.success) {
          document.getElementById('form').style.display = 'none';
          showMsg('ok', (r.body.message || 'Your password has been updated.') + ' Redirecting to sign in…');
          setTimeout(function () { window.location.href = '/login.html'; }, 2200);
        } else {
          showMsg('err', (r.body && r.body.error) || 'Could not reset your password. Please request a new link.');
          btn.disabled = false;
          btn.textContent = 'Update password';
        }
      })
      .catch(function () {
        showMsg('err', 'Network error - please try again.');
        btn.disabled = false;
        btn.textContent = 'Update password';
      });
  }

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && TOKEN) submitReset();
  });
</script>

</body>
</html>
