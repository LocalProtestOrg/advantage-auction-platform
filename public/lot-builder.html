<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lot Builder - Advantage Auction</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 2rem 1rem;
    }

    header {
      max-width: 900px;
      margin: 0 auto 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    header .brand { font-weight: 700; color: #2563eb; }
    header .auction-label { font-size: 0.85rem; color: #666; }

    #status-banner {
      display: none;
      max-width: 900px;
      margin: 0 auto 1.25rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
    }
    #status-banner.success { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
    #status-banner.error   { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 1.75rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    @media (max-width: 600px) {
      .columns { grid-template-columns: 1fr; }
    }

    .col-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #e5e7eb;
    }

    /* ── Drop zone ── */
    #drop-zone {
      border: 2px dashed #c7d2fe;
      border-radius: 8px;
      background: #f0f4ff;
      padding: 1.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 0.75rem;
      user-select: none;
    }
    #drop-zone:hover,
    #drop-zone.drag-over {
      border-color: #2563eb;
      background: #e0e7ff;
    }
    #drop-zone p { color: #4b5563; font-size: 0.875rem; pointer-events: none; }
    #drop-zone p span { color: #2563eb; font-weight: 600; }
    #drop-zone p.sub { font-size: 0.75rem; color: #9ca3af; margin-top: 0.3rem; }
    #file-input { display: none; }

    /* ── Thumbnail list ── */
    #thumbnail-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      min-height: 1rem;
      margin-bottom: 1rem;
    }

    .thumb-wrap {
      position: relative;
      cursor: grab;
    }
    .thumb-wrap.dragging { opacity: 0.4; }

    .thumb-wrap img {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #e0e0e0;
      display: block;
    }
    .thumb-wrap .order-badge {
      position: absolute;
      bottom: 3px;
      left: 4px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 1px 4px;
      border-radius: 3px;
    }
    .thumb-wrap button.rm {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: none;
      background: #ef4444;
      color: #fff;
      font-size: 0.65rem;
      line-height: 18px;
      text-align: center;
      cursor: pointer;
      padding: 0;
    }

    /* Form fields */
    .field { margin-bottom: 1.1rem; }
    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
      color: #374151;
    }
    label .req { color: #ef4444; }

    input[type="text"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      padding: 0.55rem 0.7rem;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.875rem;
      font-family: inherit;
      color: #111;
      background: #fff;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #2563eb;
    }
    textarea { resize: vertical; min-height: 110px; }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary  { background: #2563eb; color: #fff; }
    .btn-primary:not(:disabled):hover  { background: #1d4ed8; }
    .btn-success  { background: #16a34a; color: #fff; }
    .btn-success:not(:disabled):hover  { background: #15803d; }
    .btn-outline  { background: #fff; color: #374151; border: 1.5px solid #d1d5db; }
    .btn-outline:not(:disabled):hover  { border-color: #9ca3af; }

    /* Item details section */
    .details-section {
      margin-top: 1.75rem;
      padding-top: 1.25rem;
      border-top: 1px solid #e5e7eb;
    }
    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 600px) {
      .details-grid { grid-template-columns: 1fr; }
    }
    .dim-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.6rem;
    }
    .dim-row .field { margin-bottom: 0; }
    .input-unit {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .input-unit input { flex: 1; }
    .input-unit span {
      font-size: 0.8rem;
      color: #6b7280;
      white-space: nowrap;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 0.75rem;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }
    .toggle-wrap {
      position: relative;
      width: 34px;
      height: 19px;
      flex-shrink: 0;
    }
    .toggle-wrap input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #d1d5db;
      border-radius: 19px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 13px; height: 13px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-wrap input:checked + .toggle-slider { background: #2563eb; }
    .toggle-wrap input:checked + .toggle-slider::before { transform: translateX(15px); }
    .toggle-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #374151;
      cursor: pointer;
      user-select: none;
    }
    .reserve-note {
      font-size: 0.75rem;
      color: #9ca3af;
      padding: 0.5rem 0.75rem;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
    }

    .action-bar {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      margin-top: 1.75rem;
      padding-top: 1.25rem;
      border-top: 1px solid #e5e7eb;
      flex-wrap: wrap;
    }

    #lots-saved {
      margin-left: auto;
      font-size: 0.82rem;
      color: #6b7280;
    }

    /* AI enhancement toggle */
    .enhance-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
      padding: 0.6rem 0.75rem;
      background: #f8faff;
      border: 1px solid #e0e7ff;
      border-radius: 8px;
    }
    .enhance-toggle {
      position: relative;
      width: 34px;
      height: 19px;
      flex-shrink: 0;
    }
    .enhance-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .enhance-slider {
      position: absolute;
      inset: 0;
      background: #d1d5db;
      border-radius: 19px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .enhance-slider::before {
      content: '';
      position: absolute;
      width: 13px; height: 13px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .enhance-toggle input:checked + .enhance-slider { background: #2563eb; }
    .enhance-toggle input:checked + .enhance-slider::before { transform: translateX(15px); }
    .enhance-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #374151;
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>
<body>

<header>
  <span class="brand">Advantage Auction</span>
  <span class="auction-label" id="auction-label">Loading auction…</span>
</header>

<div id="status-banner"></div>

<div class="card">
  <div class="card-title">Add Lot</div>

  <div class="columns">

    <!-- LEFT: Images -->
    <div>
      <div class="col-label">Images</div>

      <div id="drop-zone">
        <p>Drop images here or <span>click to upload</span></p>
        <p class="sub">JPG, PNG, WEBP - multiple allowed</p>
      </div>
      <input type="file" id="file-input" accept="image/*" multiple />

      <div id="thumbnail-list"></div>

      <div class="enhance-row">
        <span class="enhance-toggle">
          <input type="checkbox" id="lot-enhance-toggle" checked />
          <span class="enhance-slider"></span>
        </span>
        <label class="enhance-label" for="lot-enhance-toggle">Smart background removal</label>
      </div>
    </div>

    <!-- RIGHT: Details -->
    <div>
      <div class="col-label">Lot Details</div>

      <div class="field">
        <label for="lot-title">Title <span class="req">*</span></label>
        <input type="text" id="lot-title" placeholder="e.g. Vintage Brass Table Lamp" />
      </div>

      <div class="field">
        <label for="lot-description">Description</label>
        <textarea id="lot-description" placeholder="Factual description of the item…"></textarea>
        <button type="button" class="btn btn-outline" id="btn-packing-note" style="margin-top:0.4rem;font-size:0.8rem">+ Add Packing Material Note</button>
      </div>

      <div class="field">
        <label for="lot-category">Category</label>
        <select id="lot-category">
          <option value="">- Select -</option>
          <option>Furniture</option>
          <option>Fine Art</option>
          <option>Jewelry</option>
          <option>Home Decor</option>
          <option>Lighting</option>
          <option>Tools</option>
          <option>Pottery &amp; Ceramics</option>
          <option>Clocks &amp; Timepieces</option>
          <option>Antiques</option>
          <option>Collectibles</option>
          <option>Electronics</option>
          <option>General</option>
        </select>
      </div>

      <div class="field">
        <label for="lot-pickup">Pickup Size</label>
        <select id="lot-pickup">
          <option value="">- Select -</option>
          <option value="A">A - Small (carry by hand)</option>
          <option value="B">B - Medium (2 people)</option>
          <option value="C">C - Large (truck / dolly)</option>
        </select>
      </div>

      <div class="field">
        <label for="lot-starting-bid">Starting Bid ($)</label>
        <input type="number" id="lot-starting-bid" placeholder="1.00" min="0" step="0.01" />
      </div>

      <div class="field">
        <p class="reserve-note">Reserve price - admin-configurable after submission</p>
      </div>
    </div>
  </div>

  <!-- ── Item Details ──────────────────────────────────────────────────────── -->
  <div class="details-section">
    <div class="col-label" style="margin-bottom:1rem;">Item Details</div>

    <div class="details-grid">
      <div class="field">
        <label for="lot-condition">Condition</label>
        <select id="lot-condition">
          <option value="">- Select -</option>
          <option value="excellent">Excellent</option>
          <option value="good">Good</option>
          <option value="fair">Fair</option>
          <option value="poor">Poor</option>
          <option value="parts_only">Parts / As-Is</option>
        </select>
      </div>

      <div class="field">
        <label for="lot-material">Material</label>
        <input type="text" id="lot-material" placeholder="e.g. Solid oak, Brass, Ceramic" />
      </div>

      <div class="field">
        <label for="lot-era">Era / Period</label>
        <input type="text" id="lot-era" placeholder="e.g. Mid-Century, Victorian, 1960s" />
      </div>

      <div class="field">
        <label for="lot-maker">Maker / Artist</label>
        <input type="text" id="lot-maker" placeholder="e.g. Herman Miller, Stickley" />
      </div>

      <div class="field">
        <label>Weight</label>
        <div class="input-unit">
          <input type="number" id="lot-weight" placeholder="0" min="0" step="0.1" />
          <span>lbs</span>
        </div>
      </div>

      <div class="field">
        <label>Shipping</label>
        <div class="toggle-row">
          <span class="toggle-wrap">
            <input type="checkbox" id="lot-shippable" />
            <span class="toggle-slider"></span>
          </span>
          <label class="toggle-label" for="lot-shippable">Item can be shipped</label>
        </div>
      </div>
    </div>

    <div class="field" style="margin-top:1rem;">
      <label>Dimensions (inches)</label>
      <div class="dim-row">
        <div class="field">
          <label style="font-size:0.75rem;color:#6b7280;">Height</label>
          <div class="input-unit">
            <input type="number" id="lot-height" placeholder="0" min="0" step="0.25" />
            <span>in</span>
          </div>
        </div>
        <div class="field">
          <label style="font-size:0.75rem;color:#6b7280;">Width</label>
          <div class="input-unit">
            <input type="number" id="lot-width" placeholder="0" min="0" step="0.25" />
            <span>in</span>
          </div>
        </div>
        <div class="field">
          <label style="font-size:0.75rem;color:#6b7280;">Depth</label>
          <div class="input-unit">
            <input type="number" id="lot-depth" placeholder="0" min="0" step="0.25" />
            <span>in</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn btn-outline" id="btn-generate">Suggest Details</button>
    <button class="btn btn-success" id="btn-save">Save Lot</button>
    <button class="btn btn-outline" id="btn-another" style="display:none">Add Another Lot</button>
    <span id="lots-saved"></span>
  </div>
</div>

<script>
  const token     = localStorage.getItem('token');
  const params    = new URLSearchParams(location.search);
  const auctionId = params.get('auctionId');

  if (!token)     location.href = '/login.html';
  if (!auctionId) document.getElementById('auction-label').textContent = 'No auction ID in URL';

  if (auctionId) {
    fetch('/api/lots/auction/' + auctionId)
      .then(r => r.json()).catch(() => null)
      .then(d => {
        const count = d && d.data ? d.data.length : 0;
        document.getElementById('auction-label').textContent =
          'Auction ' + auctionId.slice(0, 8) + '… (' + count + ' lot' + (count === 1 ? '' : 's') + ')';
      });
  }

  // ── Image state ──────────────────────────────────────────────────────────────
  // Each entry: { objectUrl: string, file: File }
  let images    = [];
  let lotsAdded = 0;

  const dropZone  = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const thumbList = document.getElementById('thumbnail-list');

  // Click on drop zone opens file picker
  dropZone.addEventListener('click', () => fileInput.click());

  // Drag-and-drop
  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    addFiles(e.dataTransfer.files);
  });

  // File input change
  fileInput.addEventListener('change', () => {
    addFiles(fileInput.files);
    fileInput.value = ''; // reset so same file can be re-added if removed
  });

  function addFiles(fileList) {
    Array.from(fileList).forEach(file => {
      if (!file.type.startsWith('image/')) return;
      const objectUrl = URL.createObjectURL(file);
      const entry = { objectUrl, file, cloudinaryUrl: null };
      images.push(entry);
      uploadToCloudinary(file).then(url => { entry.cloudinaryUrl = url; }).catch(() => {});
    });
    renderThumbs();
  }

  function renderThumbs() {
    thumbList.innerHTML = '';
    images.forEach((img, i) => {
      const wrap = document.createElement('div');
      wrap.className = 'thumb-wrap';
      wrap.draggable = true;
      wrap.dataset.index = i;

      const el = document.createElement('img');
      el.src = img.objectUrl;
      el.alt = img.file.name;

      const badge = document.createElement('div');
      badge.className = 'order-badge';
      badge.textContent = i + 1;

      const rm = document.createElement('button');
      rm.className = 'rm';
      rm.textContent = '×';
      rm.title = 'Remove';
      rm.addEventListener('click', e => {
        e.stopPropagation();
        URL.revokeObjectURL(img.objectUrl);
        images.splice(i, 1);
        renderThumbs();
      });

      wrap.appendChild(el);
      wrap.appendChild(badge);
      wrap.appendChild(rm);

      // Drag-to-reorder
      wrap.addEventListener('dragstart', onDragStart);
      wrap.addEventListener('dragover',  onDragOver);
      wrap.addEventListener('drop',      onDrop);
      wrap.addEventListener('dragend',   onDragEnd);

      thumbList.appendChild(wrap);
    });
  }

  // ── Drag-to-reorder thumbnails ────────────────────────────────────────────────
  let dragSrcIndex = null;

  function onDragStart(e) {
    dragSrcIndex = parseInt(this.dataset.index);
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }
  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
  }
  function onDrop(e) {
    e.preventDefault();
    const destIndex = parseInt(this.dataset.index);
    if (dragSrcIndex === null || dragSrcIndex === destIndex) return;
    const moved = images.splice(dragSrcIndex, 1)[0];
    images.splice(destIndex, 0, moved);
    renderThumbs();
  }
  function onDragEnd() {
    this.classList.remove('dragging');
    dragSrcIndex = null;
  }

  // ── Generate Details ─────────────────────────────────────────────────────────
  document.getElementById('btn-generate').addEventListener('click', async () => {
    if (images.length === 0) {
      showBanner('Upload at least one image before generating.', 'error');
      return;
    }
    const btn = document.getElementById('btn-generate');
    btn.disabled = true;
    btn.textContent = 'Suggesting…';
    try {
      let imageUrl = images[0].cloudinaryUrl;
      if (!imageUrl) {
        btn.textContent = 'Uploading…';
        imageUrl = await uploadToCloudinary(images[0].file);
        images[0].cloudinaryUrl = imageUrl;
        btn.textContent = 'Suggesting…';
      }
      const res  = await fetch('/api/ai/generate-description', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body:    JSON.stringify({ imageUrl })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message || 'Suggestion failed');
      const d = data.data;
      set('lot-title',       d.title);
      set('lot-description', d.description);
      setSelect('lot-category',    d.category);
      setSelect('lot-pickup',      d.pickup_category);
    } catch (err) {
      showBanner('Suggestion failed: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Suggest Details';
    }
  });

  // ── Add Packing Material Note (convenience; user-initiated, idempotent) ───────
  // Appends the exact note once; never duplicates, never overwrites the description.
  document.getElementById('btn-packing-note').addEventListener('click', () => {
    const ta = document.getElementById('lot-description');
    const NOTE = 'Please bring appropriate packing material for safe transport.';
    const cur = ta.value || '';
    if (cur.indexOf(NOTE) !== -1) { showBanner('Packing material note is already added.', 'error'); return; }
    ta.value = cur.trim() ? (cur.trim() + '\n\n' + NOTE) : NOTE;
    ta.focus();
    showBanner('Packing material note added.', 'success');
  });

  // ── Save Lot ─────────────────────────────────────────────────────────────────
  document.getElementById('btn-save').addEventListener('click', async () => {
    const title = document.getElementById('lot-title').value.trim();
    if (!title)     { showBanner('Title is required.', 'error'); return; }
    if (!auctionId) { showBanner('No auction ID.', 'error'); return; }

    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      const getNum = id => { const v = parseFloat(document.getElementById(id).value); return isNaN(v) ? null : v; };
      const getVal = id => document.getElementById(id).value.trim() || null;

      const dimH = getNum('lot-height');
      const dimW = getNum('lot-width');
      const dimD = getNum('lot-depth');
      const dimensions = (dimH || dimW || dimD) ? { height: dimH, width: dimW, depth: dimD } : null;

      const startingBid = getNum('lot-starting-bid');

      // 1. Create lot
      const lotRes = await fetch('/api/lots', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body:    JSON.stringify({
          auctionId,
          title,
          description:     getVal('lot-description'),
          category:        getVal('lot-category'),
          pickup_category: document.getElementById('lot-pickup').value || null,
          starting_price:  startingBid,
          condition:       getVal('lot-condition'),
          material:        getVal('lot-material'),
          era:             getVal('lot-era'),
          maker_artist:    getVal('lot-maker'),
          weight:          getNum('lot-weight') != null ? String(getNum('lot-weight')) : null,
          dimensions,
          shippable:       document.getElementById('lot-shippable').checked,
        })
      });
      const lotData = await lotRes.json();
      if (!lotData.success) throw new Error(lotData.message || 'Failed to save lot');
      const lotId = lotData.data.id;

      // 2. Upload any images not yet on Cloudinary, then attach real URLs
      if (images.length > 0) {
        await Promise.all(images.map(async img => {
          if (!img.cloudinaryUrl) {
            img.cloudinaryUrl = await uploadToCloudinary(img.file).catch(() => null);
          }
        }));
        const imageUrls = images.map(img => img.cloudinaryUrl).filter(Boolean);
        if (imageUrls.length > 0) {
          const enhancementEnabled = document.getElementById('lot-enhance-toggle').checked;
          await fetch('/api/lots/' + lotId + '/images', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
            body:    JSON.stringify({ images: imageUrls, enhancement_enabled: enhancementEnabled })
          }).catch(() => {}); // image link is non-fatal after lot creation
        }
      }

      lotsAdded++;
      updateCounter();
      showBanner('Lot saved! (' + title + ')', 'success');
      document.getElementById('btn-another').style.display = 'inline-block';

    } catch (err) {
      showBanner('Error: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Lot';
    }
  });

  // ── Add Another Lot ──────────────────────────────────────────────────────────
  // This button only appears AFTER a lot saves successfully, so the previous lot is
  // already added. Reset the form for the next lot, then return the studio to the top
  // so the fresh blank form starts at its beginning (previously the page kept the
  // seller's old scroll position partway down the form).
  document.getElementById('btn-another').addEventListener('click', () => {
    clearForm();
    document.getElementById('btn-another').style.display = 'none';
    // Scroll to the top after the reset/rerender has settled. Double requestAnimationFrame
    // avoids a jump-back from late layout. The studio scrolls the document (there is no
    // internal scroll container), so scrolling the window is correct here.
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      window.scrollTo({ top: 0, behavior: reduceMotion ? 'auto' : 'smooth' });
      // Focus the first field for keyboard users, but NOT on touch devices, so we never
      // pop an unwanted mobile keyboard. preventScroll keeps focus from fighting the scroll.
      const first = document.getElementById('lot-title');
      if (first && !window.matchMedia('(pointer: coarse)').matches) {
        first.focus({ preventScroll: true });
      }
    }));
  });

  // ── Helpers ──────────────────────────────────────────────────────────────────
  async function uploadToCloudinary(file) {
    const fd = new FormData();
    fd.append('image', file);
    const res = await fetch('/api/uploads/image', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token },
      body: fd,
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message || 'Upload failed');
    return data.secure_url;
  }

  function clearForm() {
    images.forEach(img => URL.revokeObjectURL(img.objectUrl));
    images = [];
    renderThumbs();
    [
      'lot-title', 'lot-description', 'lot-material', 'lot-era',
      'lot-maker', 'lot-starting-bid', 'lot-weight',
      'lot-height', 'lot-width', 'lot-depth',
    ].forEach(id => { document.getElementById(id).value = ''; });
    ['lot-category', 'lot-pickup', 'lot-condition'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('lot-shippable').checked = false;
    document.getElementById('lot-enhance-toggle').checked = true;
  }

  function updateCounter() {
    const el = document.getElementById('lots-saved');
    el.textContent = lotsAdded + ' lot' + (lotsAdded === 1 ? '' : 's') + ' saved this session';
  }

  function set(id, value) {
    const el = document.getElementById(id);
    if (el && value != null) el.value = value;
  }

  function setSelect(id, value) {
    const el = document.getElementById(id);
    if (!el || value == null) return;
    const needle = String(value).toLowerCase();
    for (const opt of el.options) {
      if (opt.value.toLowerCase() === needle || opt.text.toLowerCase() === needle) {
        el.value = opt.value;
        return;
      }
    }
  }

  function showBanner(msg, type) {
    const b = document.getElementById('status-banner');
    b.textContent = msg;
    b.className   = type;
    b.style.display = 'block';
    if (type === 'success') setTimeout(() => { b.style.display = 'none'; }, 4000);
  }
</script>
</body>
</html>
