<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="canonical" href="https://bid.advantage.bid/auction-view.html" />

  <!-- Open Graph -->
  <meta property="og:title" content="Auction - Advantage.Bid" />
  <meta property="og:description" content="Bid on estate &amp; liquidation lots on Advantage.Bid." />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Auction - Advantage.Bid" />
  <meta name="twitter:description" content="Bid on estate &amp; liquidation lots on Advantage.Bid." />
  <meta name="twitter:image" content="https://bid.advantage.bid/img/social-card.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f4f4f5;
      color: #111;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #111;
      padding: 0.9rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand { color: #fff; font-weight: 700; font-size: 1rem; }
    .header-right { display: flex; align-items: center; gap: 1.25rem; }
    .lot-count { color: #888; font-size: 0.8rem; }

    /* ── Auction banner ── */
    .auction-banner {
      background: #fff;
      border-bottom: 1px solid #e4e4e7;
    }

    /* Optional banner image hero */
    .banner-hero {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      display: block;
    }

    .banner-body {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.25rem 1.5rem 1rem;
    }

    .auction-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .auction-title-group { flex: 1; min-width: 0; }
    .auction-title { font-size: 1.3rem; font-weight: 700; color: #111; }
    .auction-subtitle {
      font-size: 0.88rem;
      color: #52525b;
      margin-top: 0.2rem;
    }
    .auction-meta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 0.4rem;
      font-size: 0.78rem;
      color: #71717a;
    }
    .auction-meta span::before { content: '· '; }
    .auction-meta span:first-child::before { content: ''; }

    /* Walkthrough CTA */
    .btn-walkthrough {
      display: none;
      align-items: center;
      gap: 0.45rem;
      padding: 0.5rem 1rem;
      border: 1.5px solid #3f3f46;
      border-radius: 6px;
      background: #111;
      color: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s;
      flex-shrink: 0;
    }
    .btn-walkthrough:hover { background: #3f3f46; }
    .btn-walkthrough.visible { display: flex; }
    .play-icon {
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .play-icon::after {
      content: '';
      border-style: solid;
      border-width: 4px 0 4px 8px;
      border-color: transparent transparent transparent #111;
      margin-left: 1px;
    }

    /* ── Seller bar ── */
    .seller-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.7rem;
      font-size: 0.8rem;
      color: #71717a;
    }
    .btn-follow {
      padding: 0.25rem 0.75rem;
      font-size: 0.78rem;
      font-weight: 600;
      border-radius: 6px;
      border: 1.5px solid #2563eb;
      background: #fff;
      color: #2563eb;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .btn-follow:hover { background: #eff6ff; }
    .btn-follow.following { background: #2563eb; color: #fff; }
    .btn-follow.following:hover { background: #1d4ed8; }
    .btn-follow:disabled { opacity: 0.5; cursor: default; }

    /* ── P3: at-a-glance auction facts ── */
    .auction-facts { margin-top: 1rem; }
    .auction-facts-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, auto));
      gap: 0.75rem 2.25rem;
    }
    .af-item { display: flex; flex-direction: column; gap: 0.15rem; min-width: 0; }
    .af-label {
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #71717a;
    }
    .af-value { font-size: 0.92rem; font-weight: 700; color: #111; line-height: 1.3; }
    .af-note { margin-top: 0.7rem; font-size: 0.82rem; color: #52525b; line-height: 1.45; }
    @media (max-width: 640px) {
      .auction-facts-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem 1.25rem; }
    }

    /* ── Grid wrapper ── */
    .grid-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    /* ── Lot grid ── */
    .lot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.25rem;
    }

    /* ── Lot card ── */
    .lot-card {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e4e4e7;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.15s, transform 0.1s;
    }
    .lot-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
      transform: translateY(-2px);
    }

    /* Image area */
    .card-img {
      width: 100%;
      aspect-ratio: 4/3;
      background: #e4e4e7;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .card-img img.loaded { opacity: 1; }
    .card-img .img-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #a1a1aa;
      font-size: 0.8rem;
    }

    /* Enhanced badge */
    .enhanced-badge {
      position: absolute;
      bottom: 0.5rem;
      left: 0.5rem;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    /* Status badge */
    .status-badge {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      padding: 0.2rem 0.55rem;
      border-radius: 99px;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .status-open      { background: #dcfce7; color: #15803d; }
    .status-closed    { background: #fee2e2; color: #b91c1c; }
    .status-sold      { background: #16a34a; color: #ffffff; }
    .status-withdrawn { background: #f4f4f5; color: #71717a; }
    .card-bids        { font-size: 12px; color: #475569; font-weight: 600; margin-top: 2px; }

    /* Card body */
    .card-body {
      padding: 0.9rem 1rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      flex: 1;
    }
    .card-title {
      font-size: 0.92rem;
      font-weight: 700;
      color: #111;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-category {
      font-size: 0.72rem;
      color: #a1a1aa;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .card-bid {
      margin-top: auto;
      padding-top: 0.65rem;
      border-top: 1px solid #f4f4f5;
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
    }
    .bid-label { font-size: 0.72rem; color: #a1a1aa; }
    .bid-amount { font-size: 1.05rem; font-weight: 800; color: #111; }
    .bid-amount.no-bids { color: #a1a1aa; font-weight: 500; font-size: 0.85rem; }

    /* ── #17: inline card bidding ── */
    .card-nextmin { font-size: 0.74rem; color: #6b7280; margin-top: 0.2rem; }
    .card-nextmin strong { color: #111; font-weight: 700; }
    .card-countdown {
      display: flex; align-items: center; gap: 0.3rem;
      font-size: 0.78rem; font-weight: 600; color: #b45309;
      margin-top: 0.35rem;
    }
    .card-countdown.urgent { color: #b91c1c; }
    .card-countdown.ended  { color: #71717a; }

    /* ── #19: per-lot countdown progress bar (final 60s urgency) ── */
    .lot-progress {
      position: relative;
      height: 9px;
      width: 100%;
      background: #eef0f3;
      overflow: hidden;
    }
    .lot-progress-fill {
      height: 100%;
      width: 100%;
      transform-origin: left center;
      border-radius: 0 6px 6px 0;
      transition: width 1s linear, background 0.4s ease, box-shadow 0.4s ease;
      background: linear-gradient(90deg, #34d399, #10b981);
    }
    /* >60s remaining - subtle, calm */
    .lot-progress-fill.lp-idle  { background: linear-gradient(90deg, #a7f3d0, #6ee7b7); opacity: 0.5; }
    /* 60-31s */
    .lot-progress-fill.lp-green { background: linear-gradient(90deg, #34d399, #059669); opacity: 1; }
    /* 30-16s */
    .lot-progress-fill.lp-amber { background: linear-gradient(90deg, #fbbf24, #f97316); opacity: 1; }
    /* 15-1s - urgent, with a soft glow */
    .lot-progress-fill.lp-red   { background: linear-gradient(90deg, #fb7185, #dc2626); opacity: 1;
                                  box-shadow: 0 0 10px rgba(220, 38, 38, 0.55); }
    /* closed */
    .lot-progress-fill.lp-closed { background: #27272a; opacity: 1; width: 0 !important; }
    .card-bidform { margin-top: 0.6rem; display: flex; flex-direction: column; gap: 0.4rem; }
    .card-bidform .cbf-row { display: flex; gap: 0.4rem; }
    .card-bidform input {
      flex: 1; min-width: 0; padding: 0.45rem 0.55rem; font-size: 0.85rem;
      border: 1.5px solid #e2e8f0; border-radius: 6px; color: #111;
    }
    .card-bidform button {
      padding: 0.45rem 0.8rem; font-size: 0.82rem; font-weight: 700;
      background: #1d4ed8; color: #fff; border: none; border-radius: 6px; cursor: pointer;
      white-space: nowrap;
    }
    .card-bidform button:disabled { opacity: 0.6; cursor: default; }
    .cbf-status { font-size: 0.76rem; min-height: 1em; }
    .cbf-status.ok  { color: #15803d; }
    .cbf-status.err { color: #b91c1c; }
    .card-signin { margin-top: 0.55rem; font-size: 0.8rem; }
    .card-signin a { color: #1d4ed8; text-decoration: none; font-weight: 600; }
    .card-register { margin-top: 0.6rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .btn-register {
      padding: 0.5rem 0.9rem; font-size: 0.85rem; font-weight: 700;
      background: #047857; color: #fff; border: none; border-radius: 7px; cursor: pointer;
    }
    .btn-register:disabled { opacity: 0.6; cursor: default; }
    .register-ack-text { font-size: 0.76rem; color: #4b5563; line-height: 1.35; }
    .register-ack-text a { color: #1d4ed8; text-decoration: none; font-weight: 600; }
    .register-ack { font-size: 0.78rem; color: #374151; display: flex; align-items: flex-start; gap: 0.35rem; }
    .card-actions { margin-top: 0.55rem; display: flex; justify-content: flex-end; }
    .view-details { font-size: 0.8rem; color: #1d4ed8; text-decoration: none; font-weight: 600; }
    .view-details:hover { text-decoration: underline; }
    .card-realized-prompt {
      margin-top: auto; padding-top: 0.65rem; border-top: 1px solid #f4f4f5;
      font-size: 0.82rem; line-height: 1.35;
    }
    .card-realized-prompt a { color: #1d4ed8; text-decoration: none; font-weight: 600; }
    .card-realized-prompt a:hover { text-decoration: underline; }
    .card-img-link { display: block; }

    /* ── States ── */
    .state-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: #71717a;
      font-size: 0.9rem;
    }
    .state-msg strong { display: block; font-size: 1.1rem; color: #3f3f46; margin-bottom: 0.4rem; }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #e4e4e7 25%, #f4f4f5 50%, #e4e4e7 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .card-skeleton .card-img { background: #e4e4e7; }
    .card-skeleton .sk-line  { height: 12px; margin: 4px 0; border-radius: 4px; }

    /* ── Video modal ── */
    #video-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 900;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    #video-modal.open { display: flex; }
    .video-modal-inner {
      position: relative;
      width: 100%;
      max-width: 900px;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
    }
    .video-modal-inner video {
      width: 100%;
      display: block;
      max-height: 80vh;
      object-fit: contain;
    }
    .video-modal-close {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      width: 32px;
      height: 32px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .video-modal-close:hover { background: rgba(0,0,0,0.85); }
    .video-title {
      padding: 0.75rem 1rem;
      background: #111;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
    }
    /* Auction header tabs (mobile-friendly: horizontal scroll, no overflow) */
    .auction-tabs{display:flex;gap:2px;max-width:1200px;margin:0 auto;padding:0 16px;border-bottom:1px solid #e2e8f0;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .atab{flex:0 0 auto;background:none;border:none;padding:12px 14px;font-size:14px;font-weight:700;color:#64748b;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
    .atab:hover{color:#334155}
    .atab.active{color:#2563eb;border-bottom-color:#2563eb}
    .tab-panel{max-width:1200px;margin:0 auto;padding:18px 16px}
    .tab-panel h3{font-size:1.05rem;margin:0 0 .6rem}
    .info-row{margin:.4rem 0;font-size:.92rem;color:#334155;line-height:1.5}
    .info-row strong{color:#0f172a}
    .map-link{color:#2563eb;font-weight:700;text-decoration:none}
    .tab-note{font-size:.8rem;color:#64748b;background:#f1f5f9;border-radius:8px;padding:.55rem .75rem;margin-top:.7rem;line-height:1.5}
    .wl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
    .wl-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;text-decoration:none;color:inherit}
    .wl-card .b{padding:8px 10px}.wl-card .t{font-weight:700;font-size:.86rem;line-height:1.3}.wl-card .s{font-size:.76rem;color:#64748b;margin-top:2px}
    .empty-tab{padding:1.6rem;text-align:center;color:#64748b}
    .auc-footer{background:#0f172a;color:#94a3b8;text-align:center;padding:1.5rem 1rem;font-size:.85rem;margin-top:2rem}
    .auc-footer a{color:#cbd5e1;text-decoration:none;margin:0 .4rem}.auc-footer a:hover{color:#fff}

    /* ════════════════════════════════════════════════════════════════════════
       Advantage.Bid design-language re-skin (Phase 2). PRESENTATION ONLY —
       every id, class hook, card template and JS behavior is unchanged; this
       block only restyles existing selectors to the approved Living Map identity
       (light-first, Fraunces, rich-red action/urgency, premium photography).
       ════════════════════════════════════════════════════════════════════════ */
    :root{ --ink:#0B1B2B; --paper:#FBFAF7; --surface:#fff; --muted:#637488; --hair:#ECE8E0;
           --accent:#2F6BFF; --live:#B5273B; --ending:#E0922E; --coming:#1FB6A6; --sold:#16A34A;
           --ease:cubic-bezier(.22,.7,.2,1); }
    body{ background:var(--paper); color:var(--ink); overflow-x:hidden;
          font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }

    /* header → light, refined; brand in Fraunces */
    header{ background:rgba(251,250,247,.9); backdrop-filter:saturate(150%) blur(12px);
            -webkit-backdrop-filter:saturate(150%) blur(12px); border-bottom:1px solid var(--hair); padding:12px 20px; }
    .brand{ color:var(--ink); font-family:"Fraunces","Georgia",serif; font-weight:700; font-size:1.05rem; letter-spacing:.005em; }
    .lot-count{ color:var(--muted); }

    /* banner → cinematic hero. Branded gradient always behind; banner image (when
       present) overlays as a cover layer; text stays white in both cases. */
    .auction-banner{ position:relative; overflow:hidden; border-bottom:0;
                     background:linear-gradient(135deg,#0B1B2B 0%,#243b6b 58%,#7a274a 130%); }
    .banner-hero{ position:absolute!important; inset:0; width:100%; height:100%; max-height:none;
                  object-fit:cover; z-index:0; opacity:.46; }
    .auction-banner::after{ content:""; position:absolute; inset:0; z-index:0;
                  background:linear-gradient(to top,rgba(6,12,22,.55),rgba(6,12,22,.05) 60%,transparent); }
    .banner-body{ position:relative; z-index:1; max-width:1180px; padding:46px 24px 30px; color:#fff; }
    .auction-title{ font-family:"Fraunces","Georgia",serif; font-weight:600; color:#fff;
                    font-size:clamp(26px,4vw,44px); line-height:1.04; letter-spacing:-.01em; }
    .auction-subtitle{ color:rgba(255,255,255,.85); font-size:1rem; margin-top:.45rem; }
    .auction-meta{ color:#fff; font-weight:600; margin-top:.75rem; font-size:.86rem; }
    .auction-meta span::before{ color:rgba(255,255,255,.45); }
    .seller-bar{ color:rgba(255,255,255,.9); }
    /* #7: the walkthrough is a key conversion action - use the standard filled
       Advantage red primary style so it stands out on the hero (behavior/placement
       unchanged). Focus ring added for keyboard users. */
    .btn-walkthrough{ background:#d62828; border:1px solid #d62828; color:#fff;
                      backdrop-filter:none; border-radius:12px; box-shadow:0 6px 18px rgba(214,40,40,.34); }
    .btn-walkthrough:hover{ background:#b81f1f; border-color:#b81f1f; }
    .btn-walkthrough:focus-visible{ outline:3px solid rgba(214,40,40,.45); outline-offset:2px; }
    .btn-follow{ border:1.5px solid rgba(255,255,255,.6); color:#fff; background:rgba(255,255,255,.12);
                 border-radius:999px; backdrop-filter:blur(4px); }
    .btn-follow:hover{ background:rgba(255,255,255,.22); }
    .btn-follow.following{ background:#fff; color:var(--ink); border-color:#fff; }
    .btn-follow.following:hover{ background:#f1f1ee; }
    /* FUTURE-READY preview-video hero slot — LAYOUT ONLY, fully inert today.
       No body.has-auction-preview class is ever set when preview_video_url is absent
       (the case today), so the slot stays display:none, banner-body stays a normal
       block, and the hero is byte-for-byte identical to before. */
    .hero-media{ display:none; }
    .btn-preview-mobile{ display:none; }
    @media(min-width:881px){
      body.has-auction-preview .banner-body{ display:flex; gap:28px; align-items:center; }
      body.has-auction-preview .banner-body .hero-content{ flex:1 1 auto; min-width:0; }
      /* height-capped so the media never makes the hero taller than its text column */
      body.has-auction-preview .hero-media{ display:block; flex:0 0 min(38%,420px); }
      body.has-auction-preview .hero-media video,
      body.has-auction-preview .hero-media iframe{ width:100%; aspect-ratio:16/9; max-height:220px;
        border:0; border-radius:14px; background:#000; display:block; box-shadow:0 12px 30px rgba(8,16,28,.4); }
    }
    @media(max-width:880px){
      body.has-auction-preview .btn-preview-mobile{ display:inline-flex; align-items:center; justify-content:center;
        gap:8px; margin:12px 16px 0; width:calc(100% - 32px); padding:12px 16px; border:0; border-radius:12px;
        background:#0B1B2B; color:#fff; font-weight:700; font-size:.9rem; cursor:pointer; }
    }
    /* P3 facts sit on the cinematic hero — invert to light text */
    .auction-facts .af-label{ color:rgba(255,255,255,.62); }
    .auction-facts .af-value{ color:#fff; }
    .auction-facts .af-note{ color:rgba(255,255,255,.85); }

    /* tabs → refined, red active accent */
    .auction-tabs{ max-width:1180px; padding:0 20px; border-bottom:1px solid var(--hair); background:var(--paper); }
    .atab{ color:var(--muted); font-weight:700; padding:14px 16px; }
    .atab:hover{ color:var(--ink); }
    .atab.active{ color:var(--live); border-bottom-color:var(--live); }

    /* lots → premium cards */
    .grid-wrap{ max-width:1180px; padding:28px 20px; }
    .lot-grid{ grid-template-columns:repeat(auto-fill,minmax(248px,1fr)); gap:18px; }
    .lot-card{ border:1px solid var(--hair); border-radius:18px;
               transition:transform .18s var(--ease),box-shadow .18s; }
    .lot-card:hover{ transform:translateY(-4px); box-shadow:0 18px 38px rgba(8,16,28,.14); }
    .card-img img{ transition:opacity .25s, transform 6s ease; transform-origin:center; }
    .lot-card:hover .card-img img.loaded{ transform:scale(1.05); }
    .card-title{ font-weight:600; font-size:.98rem; color:var(--ink); }
    .card-category{ color:var(--muted); }
    .card-bid{ border-top-color:var(--hair); }
    .bid-label{ color:var(--muted); }
    .bid-amount{ font-family:"Fraunces","Georgia",serif; font-weight:600; font-size:1.18rem; color:var(--ink); }
    .bid-amount.no-bids{ color:var(--muted); }
    .status-open{ background:rgba(181,39,59,.12); color:var(--live); }
    .status-sold{ background:var(--sold); color:#fff; }
    .card-countdown{ color:var(--ending); }
    .card-countdown.urgent{ color:var(--live); }
    .card-nextmin strong{ color:var(--ink); }
    .card-bidform input{ border:1.5px solid var(--hair); border-radius:12px; }
    .card-bidform input:focus{ outline:none; border-color:var(--live); }
    .card-bidform button{ background:var(--live); border-radius:12px; font-weight:800;
                          box-shadow:0 8px 20px rgba(181,39,59,.28); }
    .card-bidform button:hover{ filter:brightness(1.05); }
    .btn-register{ background:var(--live); border-radius:12px; font-weight:800;
                   box-shadow:0 8px 20px rgba(181,39,59,.26); }
    .btn-register:hover{ filter:brightness(1.05); }
    .view-details,.card-signin a,.card-realized-prompt a,.register-ack-text a{ color:var(--accent); }
    .lot-progress-fill.lp-amber{ background:linear-gradient(90deg,#F0B43B,var(--ending)); }
    .lot-progress-fill.lp-red{ background:linear-gradient(90deg,#E0593B,var(--live));
                               box-shadow:0 0 10px rgba(181,39,59,.55); }
    /* #5: card bid button follows the SAME standard tri-state as the lot page —
       neutral=blue "Place Bid", winning=green "Winning", outbid=red "Bid Again" (pulsing).
       The OUTBID status itself is carried by the separate status chip, not the button.
       (Overrides the earlier brand-red default via later source order.) */
    .card-bidform button{ background:#2563eb; box-shadow:0 8px 20px rgba(37,99,235,.24); }
    .card-bidform button:hover{ filter:brightness(1.05); }
    .card-bidform button.is-winning{ background:#16a34a; box-shadow:0 8px 20px rgba(22,163,74,.28); }
    .card-bidform button.is-outbid{ background:#dc2626; box-shadow:0 8px 20px rgba(220,38,38,.30);
                                     animation:outbidPulse 1.5s ease-in-out infinite; }
    @keyframes outbidPulse{ 0%,100%{ box-shadow:0 8px 20px rgba(220,38,38,.30), 0 0 0 0 rgba(220,38,38,.5); }
                            50%{ box-shadow:0 8px 20px rgba(220,38,38,.30), 0 0 0 7px rgba(220,38,38,0); } }
    /* #5: respect reduced-motion — keep the red "Bid Again" button, drop the pulse. */
    @media (prefers-reduced-motion: reduce){ .card-bidform button.is-outbid{ animation:none; } }

    /* panels → clean light */
    .tab-panel{ max-width:1180px; padding:24px 20px; }
    .tab-panel h3{ font-family:"Fraunces","Georgia",serif; font-weight:600; font-size:1.25rem; }
    .info-row strong{ color:var(--ink); }
    .map-link,.wl-card .t a{ color:var(--accent); }
    .tab-note{ background:var(--surface); border:1px solid var(--hair); border-radius:12px; color:var(--muted); }
    .wl-card{ border:1px solid var(--hair); border-radius:14px; }
    .state-msg strong{ color:var(--ink); font-family:"Fraunces","Georgia",serif; font-weight:600; }
    .auc-footer{ background:var(--ink); margin-top:2.5rem; }
  </style>
</head>

<script>
  const params    = new URLSearchParams(location.search);
  // Accept ?auctionId= (canonical) or ?id= (legacy/marketplace card links) so
  // older or externally-shared links don't dead-end on "No auction selected".
  const auctionId = params.get('auctionId') || params.get('id');
  const grid      = document.getElementById('lot-grid');
  const token     = localStorage.getItem('token');
  let   auctionState = null;   // #5/#19: 'published' | 'active' | 'closed' | …
  let   isHistoricalAuction = false; // historical archive: suppress dates + price lines
  let   bidGate = { logged_in: false, terms_accepted_current: false, registered: false, can_bid: false }; // #20
  let   gridKey = null;        // #1: structural signature of the rendered grid (poll change-detection)
  let   auctionSummary = null; // tabs: captured /summary data for Pickup + Terms panels
  let   firstLotCloseIso = null; // P3: earliest lot closes_at (computed in loadAuction)
  let   totalLotCount    = null; // P3: total lots in this auction

  // P3: minimal state→IANA timezone map. Used only when the auction object has no
  // explicit `timezone`. Defaults to America/Chicago (Central) when unknown.
  const STATE_TZ = {
    CT:'America/New_York', DE:'America/New_York', DC:'America/New_York', FL:'America/New_York',
    GA:'America/New_York', ME:'America/New_York', MD:'America/New_York', MA:'America/New_York',
    MI:'America/New_York', NH:'America/New_York', NJ:'America/New_York', NY:'America/New_York',
    NC:'America/New_York', OH:'America/New_York', PA:'America/New_York', RI:'America/New_York',
    SC:'America/New_York', VT:'America/New_York', VA:'America/New_York', WV:'America/New_York',
    IN:'America/New_York',
    AL:'America/Chicago', AR:'America/Chicago', IL:'America/Chicago', IA:'America/Chicago',
    KS:'America/Chicago', KY:'America/New_York', LA:'America/Chicago', MN:'America/Chicago',
    MS:'America/Chicago', MO:'America/Chicago', NE:'America/Chicago', ND:'America/Chicago',
    OK:'America/Chicago', SD:'America/Chicago', TN:'America/Chicago', TX:'America/Chicago',
    WI:'America/Chicago',
    AZ:'America/Phoenix', CO:'America/Denver', ID:'America/Denver', MT:'America/Denver',
    NM:'America/Denver', UT:'America/Denver', WY:'America/Denver',
    CA:'America/Los_Angeles', NV:'America/Los_Angeles', OR:'America/Los_Angeles', WA:'America/Los_Angeles',
    AK:'America/Anchorage', HI:'Pacific/Honolulu',
  };
  function resolveAuctionTz(d) {
    if (d && d.timezone) return d.timezone;
    const st = (d && d.address_state ? String(d.address_state).trim().toUpperCase() : '');
    return STATE_TZ[st] || 'America/Chicago';
  }
  // P3: format e.g. "Mon, Jul 7, 6:00 PM CDT" in the AUCTION's timezone.
  function fmtTzDateTime(iso, tz) {
    try {
      return new Intl.DateTimeFormat('en-US', {
        weekday: 'short', month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit', timeZoneName: 'short', timeZone: tz,
      }).format(new Date(iso));
    } catch { return ''; }
  }
  // P3: time-only variant e.g. "6:00 PM CDT" for the closing-schedule note.
  function fmtTzTime(iso, tz) {
    try {
      return new Intl.DateTimeFormat('en-US', {
        hour: 'numeric', minute: '2-digit', timeZoneName: 'short', timeZone: tz,
      }).format(new Date(iso));
    } catch { return ''; }
  }
  // P3: render the at-a-glance fact row. Safe to call repeatedly as data arrives
  // (summary from loadSellerInfo, lot counts/first-close from loadAuction).
  function renderAuctionFacts() {
    const host = document.getElementById('auction-facts');
    if (!host) return;
    const d = auctionSummary;
    if (!d || isHistoricalAuction) { host.style.display = 'none'; return; }
    const tz = resolveAuctionTz(d);
    const items = [];
    if (d.start_time)        items.push(['Bidding Opens',   fmtTzDateTime(d.start_time, tz)]);
    if (firstLotCloseIso)    items.push(['First Lot Closes', fmtTzDateTime(firstLotCloseIso, tz)]);
    if (totalLotCount != null) items.push(['Total Lots',    String(totalLotCount)]);
    if (d.pickup_window_start) items.push(['Pickup Date',   fmtTzDateTime(d.pickup_window_start, tz)]);
    const shown = items.filter(it => it[1]);
    if (!shown.length) { host.style.display = 'none'; return; }
    let html = '<div class="auction-facts-grid">' + shown.map(it =>
      '<div class="af-item"><span class="af-label">' + esc(it[0]) + '</span>' +
      '<span class="af-value">' + esc(it[1]) + '</span></div>').join('') + '</div>';
    if (firstLotCloseIso && d.state !== 'closed') {
      html += '<div class="af-note">First lot closes at ' + esc(fmtTzTime(firstLotCloseIso, tz)) +
              '. Remaining lots close about one minute apart.</div>';
    }
    host.innerHTML = html;
    host.style.display = 'block';
  }

  if (!auctionId) {
    grid.innerHTML = '<div class="state-msg"><strong>No auction selected.</strong>Check the URL and try again.</div>';
    document.getElementById('auction-title').textContent = 'No auction ID';
  } else {
    loadAuction();
    loadSellerInfo();
    loadWalkthroughVideo();
    initSellerAcquisitionCta();

    // #8: refresh lot/bid state automatically when returning to the page
    // (bfcache restore or tab re-focus). Skip if a bid is half-typed so we
    // never wipe a buyer's in-progress entry.
    function anyBidInputDirty() {
      return Array.from(document.querySelectorAll('.card-bidform input')).some(i => i.value.trim() !== '');
    }
    window.addEventListener('pageshow', e => { if (e.persisted && !anyBidInputDirty()) loadAuction(); });
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && !anyBidInputDirty()) loadAuction();
    });

    // #1 real-time: permanent polling fallback (every 6s) + socket.io push when
    // available. Bidding visibility NEVER depends on the socket - if it drops,
    // the poll keeps the grid live.
    setInterval(pollGrid, 6000);
    startRealtime();
  }

  function initSellerAcquisitionCta() {
    var mount = document.getElementById('marketplace-seller-cta-mount');
    if (!mount || typeof window.AAPMarketplaceSellerCta === 'undefined') return;
    window.AAPMarketplaceSellerCta.init(mount, {
      context: { auction_id: auctionId || null }
    });
  }

  // ── Seller / auction info ─────────────────────────────────────────────────
  let currentSellerId = null;
  let isFollowing     = false;

  async function loadSellerInfo() {
    try {
      const res  = await fetch('/api/auctions/' + auctionId + '/summary');
      const data = await res.json();
      if (!data.success || !data.data) return;

      const d = data.data;
      currentSellerId = d.seller_id;
      auctionSummary = d;
      try { populatePickupTab(); populateTermsTab(); renderAuctionFacts(); } catch (e) { /* tabs are best-effort */ }

      // Historical archive auctions: never display the (internal placeholder) date;
      // show a subtle "Historical Auction" indicator instead.
      const isHist = d.public_auction_type === 'historical_archive';
      isHistoricalAuction = isHist;

      // Title
      const titleEl = document.getElementById('auction-title');
      titleEl.textContent = d.title || 'Auction';
      document.title = isHist
        ? (d.title || 'Auction') + ' - Advantage Auction Company Historical Archive'
        : (d.title || 'Auction') + ' - Advantage Auction';
      if (isHist) {
        const hb = document.createElement('span');
        hb.textContent = 'Historical Auction Archive';
        hb.style.cssText = 'display:inline-block;margin-left:.55rem;vertical-align:middle;font-size:.6em;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#fff;background:#b45309;border-radius:6px;padding:3px 9px';
        titleEl.appendChild(hb);
      }

      // Subtitle
      if (d.subtitle) {
        const sub = document.getElementById('auction-subtitle');
        sub.textContent    = d.subtitle;
        sub.style.display  = 'block';
      }

      // Meta row: location + dates
      const meta = document.getElementById('auction-meta');
      const parts = [];
      if (d.city && d.address_state) parts.push(d.city + ', ' + d.address_state);
      else if (d.city)               parts.push(d.city);
      // #7: soft timed-auction language - avoid a single hard "auction end time".
      // Historical: the badge + subtitle already convey "archive / reference only",
      // so the meta row shows location only (no date, no "sale results").
      if (isHist) {
        /* location only */
      } else if (d.state === 'closed') {
        parts.push('Auction ended - sale results below');
      }
      // P3: the "Bidding Opens / First Lot Closes" fact row (below) now owns the
      // scheduling story, so the meta row no longer repeats the vague
      // "auction starts … about 1 min apart" line.
      if (d.shipping_available) parts.push('Shipping available');
      meta.innerHTML = parts.map(p => '<span>' + esc(p) + '</span>').join('');

      // Banner hero image — show only if it actually loads. A broken/missing URL
      // must never surface raw "alt" text; onerror gracefully hides the element.
      if (d.banner_image_url) {
        const hero = document.getElementById('banner-hero');
        hero.alt = '';
        hero.onerror = () => { hero.style.display = 'none'; hero.onerror = null; };
        hero.src = d.banner_image_url;
        hero.style.display = 'block';
      }

      // FUTURE-READY (inert today): render a preview video into the hero slot ONLY if
      // the summary provides preview_video_url. This field does not exist yet, so this
      // is a no-op and the hero is visually unchanged. No schema/upload work here.
      renderPreviewVideo(d.preview_video_url);

      // Follow state
      if (token) {
        try {
          const fRes  = await fetch('/api/sellers/following', { headers: { Authorization: 'Bearer ' + token } });
          if (fRes.status === 401) {
            // #2 Session continuity: a 401 on this NON-CRITICAL follow lookup must not
            // silently log the user out. Verify the token first; only clear it if the
            // server confirms it is invalid (so the nav is truthful). Never redirect -
            // the gallery is browsable, and a valid session is left untouched.
            try { const me = await fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } }); if (!me.ok) localStorage.removeItem('token'); } catch (_) { /* keep session on network blip */ }
          } else {
            const fData = await fRes.json();
            if (fData.success) isFollowing = fData.data.some(s => s.seller_id === d.seller_id);
          }
        } catch { /* ignore */ }
      }

      // Historical archive: no follower count / Follow button (reference only).
      if (isHist) { const bar = document.getElementById('seller-bar'); if (bar) bar.style.display = 'none'; }
      else renderSellerBar(d.follower_count);
    } catch { /* summary failed - banner stays minimal */ }
  }

  function renderSellerBar(followerCount) {
    const bar = document.getElementById('seller-bar');
    bar.innerHTML = '';
    const countEl = document.createElement('span');
    countEl.id          = 'follower-count-display';
    countEl.textContent = followerCount + ' follower' + (followerCount === 1 ? '' : 's');
    bar.appendChild(countEl);

    if (token) {
      const btn = document.createElement('button');
      btn.className   = 'btn-follow' + (isFollowing ? ' following' : '');
      btn.textContent = isFollowing ? 'Following' : 'Follow Seller';
      btn.addEventListener('click', () => toggleFollow(btn));
      bar.appendChild(btn);
    }
    bar.style.display = 'flex';
  }

  async function toggleFollow(btn) {
    if (!currentSellerId) return;
    const wasFollowing = isFollowing;
    isFollowing = !wasFollowing;
    applyFollowState(btn);

    const countEl   = document.getElementById('follower-count-display');
    const prevCount = parseInt(countEl.textContent, 10) || 0;
    const newCount  = wasFollowing ? Math.max(0, prevCount - 1) : prevCount + 1;
    countEl.textContent = newCount + ' follower' + (newCount === 1 ? '' : 's');

    btn.disabled = true;
    try {
      const res = await fetch('/api/sellers/' + currentSellerId + '/follow', {
        method: wasFollowing ? 'DELETE' : 'POST',
        headers: { Authorization: 'Bearer ' + token },
      });
      if (res.status === 401) { localStorage.removeItem('token'); window.location.href = '/login.html?next=' + encodeURIComponent(location.pathname + location.search); return; }
      if (!res.ok) throw new Error();
    } catch {
      isFollowing = wasFollowing;
      applyFollowState(btn);
      countEl.textContent = prevCount + ' follower' + (prevCount === 1 ? '' : 's');
    } finally {
      btn.disabled = false;
    }
  }

  function applyFollowState(btn) {
    btn.textContent = isFollowing ? 'Following' : 'Follow Seller';
    btn.className   = 'btn-follow' + (isFollowing ? ' following' : '');
  }

  // ── FUTURE-READY preview video (layout only, inert until data exists) ────────
  // Separate from the walkthrough modal above. When the auction summary later carries
  // a preview_video_url, this fills the desktop hero slot and reveals the mobile
  // "Watch Auction Preview" button. Absent today → early return → zero visual change.
  let previewVideoUrl = null;
  function renderPreviewVideo(url) {
    if (!url || typeof url !== 'string') return;
    previewVideoUrl = url;
    const slot = document.getElementById('hero-media');
    if (slot) {
      const v = document.createElement('video');
      v.src = url; v.controls = true; v.playsInline = true; v.preload = 'metadata';
      slot.innerHTML = ''; slot.appendChild(v);
    }
    document.body.classList.add('has-auction-preview'); // reveals slot (desktop) / button (mobile)
  }
  document.getElementById('btn-preview-mobile').addEventListener('click', () => {
    if (!previewVideoUrl) return;
    const vid = document.getElementById('walkthrough-video');
    vid.src = previewVideoUrl;
    document.getElementById('video-title').textContent = 'Auction Preview';
    document.getElementById('video-modal').classList.add('open');
    vid.play().catch(() => {});
  });

  // ── Walkthrough video ─────────────────────────────────────────────────────
  let walkthroughVideoUrl   = null;
  let walkthroughVideoTitle = null;

  async function loadWalkthroughVideo() {
    try {
      const res  = await fetch('/api/auctions/' + auctionId + '/public-video');
      const data = await res.json();
      if (!data.success || !data.data) return;
      walkthroughVideoUrl   = data.data.video_url;
      walkthroughVideoTitle = data.data.title || 'Auction Walkthrough';
      const btn = document.getElementById('btn-walkthrough');
      btn.classList.add('visible');
    } catch { /* video unavailable - no CTA shown */ }
  }

  document.getElementById('btn-walkthrough').addEventListener('click', () => {
    if (!walkthroughVideoUrl) return;
    const vid = document.getElementById('walkthrough-video');
    vid.src = walkthroughVideoUrl;
    document.getElementById('video-title').textContent = walkthroughVideoTitle;
    document.getElementById('video-modal').classList.add('open');
    vid.play().catch(() => {});
  });

  function closeVideoModal() {
    const modal = document.getElementById('video-modal');
    const vid   = document.getElementById('walkthrough-video');
    modal.classList.remove('open');
    vid.pause();
    vid.src = '';
  }

  document.getElementById('video-close').addEventListener('click', closeVideoModal);
  document.getElementById('video-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('video-modal')) closeVideoModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeVideoModal();
  });

  // ── Lot grid ──────────────────────────────────────────────────────────────
  async function loadAuction() {
    try {
      // Pull lots + auction state together; state drives #5 visibility.
      // Send the token (when present) so logged-in users receive realized/sold
      // prices on closed lots; anonymous callers get them gated server-side (#20.1).
      const authH = token ? { headers: { Authorization: 'Bearer ' + token } } : {};
      const [lotsRes, meta] = await Promise.all([
        fetch('/api/lots/auction/' + auctionId, authH).then(r => r.json()),
        fetch('/api/auctions/' + auctionId + '/summary').then(r => r.json()).catch(() => null),
      ]);
      if (!lotsRes.success) throw new Error(lotsRes.message || 'Failed to load lots');
      auctionState = (meta && meta.success && meta.data) ? meta.data.state : auctionState;
      if (meta && meta.success && meta.data) isHistoricalAuction = meta.data.public_auction_type === 'historical_archive';

      // #20: refresh the bidder gate (logged in? terms? registered?) for this auction.
      bidGate = await BidUtils.getBidGate(auctionId, token);

      const allLots = lotsRes.data;

      // P3: derive the earliest scheduled close + total count for the fact row.
      totalLotCount = allLots.length;
      const closeTimes = allLots
        .map(l => l.closes_at ? new Date(l.closes_at).getTime() : NaN)
        .filter(n => !isNaN(n));
      firstLotCloseIso = closeTimes.length ? new Date(Math.min(...closeTimes)).toISOString() : null;
      if (auctionSummary) auctionSummary.state = auctionState;
      renderAuctionFacts();

      // #5: while the auction is actively closing, show only lots still open so
      // bidders see what's available. 'published' (not started) shows all (none
      // closed yet); 'closed' shows ALL lots - the sale-results view.
      const lots = (auctionState === 'active') ? allLots.filter(lotIsOpen) : allLots;

      const resultsMode = (auctionState === 'closed');
      const label = !allLots.length ? ''
        : auctionState === 'active' ? (lots.length + ' lot' + (lots.length === 1 ? '' : 's') + ' open')
        : (resultsMode && !isHistoricalAuction) ? (allLots.length + ' lot' + (allLots.length === 1 ? '' : 's') + ' · sale results')
        : (allLots.length + ' lot' + (allLots.length === 1 ? '' : 's'));
      document.getElementById('lot-count').textContent = label;

      if (!allLots.length) {
        grid.innerHTML = '<div class="state-msg"><strong>No lots listed yet.</strong>Check back soon.</div>';
        gridKey = computeGridKey(auctionState, []);
        return;
      }
      if (!lots.length) {
        // Active auction with everything already closed (between last close and
        // the auction-level close transition).
        clearAllCardTimers();
        grid.innerHTML = '<div class="state-msg"><strong>All lots have closed.</strong>Final results will appear shortly.</div>';
        gridKey = computeGridKey(auctionState, []);
        return;
      }

      const imageMap = await fetchFirstImages(lots.map(l => l.id));

      clearAllCardTimers();
      grid.innerHTML = '';
      lots.forEach(lot => grid.appendChild(buildCard(lot, imageMap[lot.id])));
      gridKey = computeGridKey(auctionState, lots);

    } catch (err) {
      grid.innerHTML = '<div class="state-msg"><strong>Could not load auction.</strong>' + esc(err.message) + '</div>';
    }
  }

  async function fetchFirstImages(lotIds) {
    const results = await Promise.all(
      lotIds.map(id =>
        fetch('/api/lots/' + id + '/images')
          .then(r => r.json())
          .then(d => {
            if (!d.success || !d.data.length) return { id, url: null, enhanced: false };
            const row = d.data[0];
            return {
              id,
              url: row.best_image_url || row.image_url || null,
              enhanced: row.processing_status === 'complete' && !!row.processed_image_url,
            };
          })
          .catch(() => ({ id, url: null, enhanced: false }))
      )
    );
    const map = {};
    results.forEach(r => { map[r.id] = r; });
    return map;
  }

  // ── #17: per-card countdown timers (cleared on every re-render) ─────────────
  const cardTimers = {};
  function clearAllCardTimers() {
    Object.keys(cardTimers).forEach(id => { clearInterval(cardTimers[id]); delete cardTimers[id]; });
  }
  function lotCloseTime(lot) { return lot.extended_until || lot.closes_at || null; }
  function lotIsOpen(lot) {
    if ((lot.state || 'open').toLowerCase() !== 'open') return false;
    const close = lotCloseTime(lot);
    return !(close && Date.now() > new Date(close).getTime());
  }
  // #19: drive the urgency bar from the SAME closes_at as the numeric timer.
  // Bands: >60s idle/subtle · 60-31s green · 30-16s amber · 15-1s red · 0 closed.
  function updateProgressBar(fill, remaining) {
    if (!fill) return;
    if (remaining <= 0) { fill.className = 'lot-progress-fill lp-closed'; fill.style.width = '0%'; return; }
    if (remaining > 60000) { fill.className = 'lot-progress-fill lp-idle'; fill.style.width = '100%'; return; }
    const pct = Math.max(0, Math.min(100, (remaining / 60000) * 100));
    let cls = 'lp-green';
    if (remaining <= 15000)      cls = 'lp-red';
    else if (remaining <= 30000) cls = 'lp-amber';
    fill.className = 'lot-progress-fill ' + cls;
    fill.style.width = pct + '%';
  }

  // span = numeric timer; fill = progress-bar fill (may be null when not active).
  function startCardCountdown(lotId, wrap, span, fill, closesAt) {
    if (cardTimers[lotId]) { clearInterval(cardTimers[lotId]); delete cardTimers[lotId]; }
    if (!closesAt) { wrap.style.display = 'none'; updateProgressBar(fill, 0); return; }
    const end = new Date(closesAt).getTime();
    function tick() {
      const remaining = end - Date.now();
      updateProgressBar(fill, remaining);
      if (remaining <= 0) {
        span.textContent = 'Ended';
        wrap.classList.add('ended'); wrap.classList.remove('urgent');
        clearInterval(cardTimers[lotId]); delete cardTimers[lotId];
        return;
      }
      const h = Math.floor(remaining / 3600000);
      const m = Math.floor((remaining % 3600000) / 60000);
      const s = Math.floor((remaining % 60000) / 1000);
      span.textContent = h > 0 ? (h + 'h ' + String(m).padStart(2, '0') + 'm')
                       : m > 0 ? (m + 'm ' + String(s).padStart(2, '0') + 's')
                       : (s + 's');
      wrap.classList.toggle('urgent', remaining < 60000);
    }
    tick();
    cardTimers[lotId] = setInterval(tick, 1000);
  }

  // After a bid, refresh just this card's bid figures in place (keeps the
  // success message + the buyer's place in the grid). Uses the single-lot
  // endpoint which returns server-authoritative next_min_bid_cents.
  async function patchCardBids(card, lotId) {
    try {
      const authH = token ? { headers: { Authorization: 'Bearer ' + token } } : {};
      const res  = await fetch('/api/lots/' + lotId, authH);
      const data = await res.json();
      if (!data.success || !data.data) return;
      applyLotToCard(card, data.data);
    } catch { /* ignore refresh blip */ }
  }

  // Update a card's bid figures, countdown, and winning/outbid chip IN PLACE from
  // a lot object. Shared by the per-bid patch, the catalog poll, and socket events.
  function applyLotToCard(card, lot) {
    const lotId    = card.getAttribute('data-lot-id');
    const cents    = Number(lot.current_bid_cents) > 0 ? Number(lot.current_bid_cents) : 0;
    const starting = Number(lot.starting_bid_cents) > 0 ? Number(lot.starting_bid_cents) : 100;
    const nextMin  = Number(lot.next_min_bid_cents) > 0 ? Number(lot.next_min_bid_cents)
                   : BidUtils.nextMinCents(starting, cents, lot.effective_bid_increment_cents);
    const amtEl = card.querySelector('.bid-amount');
    if (amtEl) {
      amtEl.className   = cents > 0 ? 'bid-amount' : 'bid-amount no-bids';
      amtEl.textContent = cents > 0 ? BidUtils.formatUSD(cents) : 'No bids - starts ' + BidUtils.formatUSD(starting);
    }
    const nmEl = card.querySelector('.card-nextmin strong');
    if (nmEl) nmEl.textContent = BidUtils.formatUSD(nextMin);
    const inp = card.querySelector('.card-bidform input');
    if (inp && document.activeElement !== inp) inp.placeholder = BidUtils.formatUSD(nextMin) + ' or more';
    // #19.7: anti-snipe extension resets the countdown + bar to the fresh close.
    const cdWrap = card.querySelector('.card-countdown');
    const cdVal  = cdWrap ? cdWrap.querySelector('span:last-child') : null;
    const fill   = card.querySelector('.lot-progress-fill');
    if (cdWrap && cdVal) startCardCountdown(lotId, cdWrap, cdVal, fill, lot.extended_until || lot.closes_at);
    // #2 winning / outbid / watching / sold status badge.
    applyCardStatus(card, lot);
    // #5: keep the primary button's tri-state (Place Bid / Winning / Bid Again) in sync.
    const bidBtn = card.querySelector('.card-bidform button');
    if (bidBtn && !bidBtn.disabled) applyBidBtnState(bidBtn, lot);
  }

  // ── #2 winning / outbid / watching / sold status badge ──────────────────────
  const CHIP_CSS = 'display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;margin-left:6px;vertical-align:middle;';
  const CHIP_TONE = { win: 'background:#dcfce7;color:#166534;', lose: 'background:#fee2e2;color:#991b1b;', neutral: 'background:#f1f5f9;color:#475569;' };
  // Render the chip from the shared bidder-status logic (reliable Winning/Outbid/
  // Watching/Sold without guessing). 'watching' is hidden on cards to avoid noise.
  function renderChip(chip, lot) {
    if (!chip || !window.BidStatus) return;
    const s = BidStatus.deriveBidderStatus(lot);
    if (s.key === 'watching') { chip.style.display = 'none'; chip.setAttribute('data-state', ''); chip.textContent = ''; return; }
    chip.setAttribute('data-state', s.key);
    let txt = s.label;
    if (s.hasBid && s.maxBidCents) txt += ' · Your max ' + BidUtils.formatUSD(s.maxBidCents);
    chip.textContent = txt;
    chip.style.cssText = CHIP_CSS + (CHIP_TONE[s.tone] || CHIP_TONE.neutral);
  }
  function applyCardStatus(card, lot) { renderChip(card.querySelector('[data-chip]'), lot); }
  // #7: standard tri-state primary bid button — Place Bid (blue) / Winning (green) /
  // Outbid (red, pulsing). Shared by initial render and live in-place updates. The
  // button NEVER becomes "Increase Max"; the max raise stays the input's own hint.
  function applyBidBtnState(btn, lot) {
    if (!btn || !window.BidStatus) return;
    const s = BidStatus.deriveBidderStatus(lot);
    btn.textContent = s.winning ? 'Winning' : (s.hasBid ? 'Bid Again' : 'Place Bid');
    btn.classList.toggle('is-winning', !!s.winning);
    btn.classList.toggle('is-outbid', !s.winning && !!s.hasBid);
  }
  // Socket fast-path: a targeted winning/outbid event flips the badge instantly;
  // the debounced poll then reconciles the full status (incl. the viewer's max).
  function setCardChipState(card, key) {
    const chip = card && card.querySelector('[data-chip]');
    if (!chip) return;
    chip.setAttribute('data-state', key);
    chip.textContent = key === 'winning' ? '✓ Winning' : 'Outbid';
    chip.style.cssText = CHIP_CSS + (key === 'winning' ? CHIP_TONE.win : CHIP_TONE.lose);
  }
  function cssEsc(s) { return (window.CSS && CSS.escape) ? CSS.escape(s) : String(s).replace(/"/g, '\\"'); }
  function cardFor(lotId) { return lotId ? grid.querySelector('[data-lot-id="' + cssEsc(lotId) + '"]') : null; }

  // ── #1 catalog polling fallback (always on, independent of the socket) ───────
  function computeGridKey(state, lots) {
    return state + '|' + lots.map(l => l.id + ':' + l.state + ':' + (l.extended_until || l.closes_at || '')).join(',');
  }
  function bidInputDirty() {
    return Array.from(document.querySelectorAll('.card-bidform input')).some(i => i.value.trim() !== '');
  }
  async function pollGrid() {
    if (document.hidden || !auctionId || bidInputDirty()) return;
    try {
      const authH = token ? { headers: { Authorization: 'Bearer ' + token } } : {};
      const [lotsRes, meta] = await Promise.all([
        fetch('/api/lots/auction/' + auctionId, authH).then(r => r.json()),
        fetch('/api/auctions/' + auctionId + '/summary').then(r => r.json()).catch(() => null),
      ]);
      if (!lotsRes || !lotsRes.success) return;
      const newState = (meta && meta.success && meta.data) ? meta.data.state : auctionState;
      const allLots  = lotsRes.data || [];
      const lots     = (newState === 'active') ? allLots.filter(lotIsOpen) : allLots;
      const key = computeGridKey(newState, lots);
      if (newState !== auctionState || key !== gridKey) {
        auctionState = newState;
        await loadAuction();   // structural change → rebuild (lot closed / results / new lot)
        return;
      }
      for (const lot of lots) {
        const card = cardFor(lot.id);
        if (card) applyLotToCard(card, lot);
      }
    } catch { /* ignore poll blip */ }
  }

  // ── #1 socket.io push (accelerates the poll; never the sole source) ──────────
  function startRealtime() {
    if (typeof io !== 'function') return;  // client failed to load → polling only
    let socket;
    try { socket = io({ auth: { token: token || undefined } }); } catch (e) { return; }
    let t = null;
    const soon = () => { clearTimeout(t); t = setTimeout(pollGrid, 200); };
    socket.on('connect', () => socket.emit('joinAuction', auctionId));
    socket.on('lot:update', soon);
    socket.on('lot:winning', m => { const c = cardFor(m && m.lot_id); if (c) setCardChipState(c, 'winning'); if (window.BuyerChime) BuyerChime.play('bid'); soon(); });
    socket.on('lot:outbid',  m => { const c = cardFor(m && m.lot_id); if (c) setCardChipState(c, 'outbid'); if (window.BuyerChime) BuyerChime.play('outbid'); soon(); });
    socket.on('auction:update', () => loadAuction());
  }

  function buildCard(lot, imgInfo) {
    const url       = imgInfo?.url      || null;
    const enhanced  = imgInfo?.enhanced || false;
    const lotId     = lot.id;
    const open      = lotIsOpen(lot);
    const detailsUrl = '/lot.html?lotId=' + encodeURIComponent(lotId);

    const card = document.createElement('div');
    card.className = 'lot-card';
    card.setAttribute('data-lot-id', lotId);

    // Image (links to full details)
    const imgLink = document.createElement('a');
    imgLink.className = 'card-img-link';
    imgLink.href = detailsUrl;
    const imgWrap = document.createElement('div');
    imgWrap.className = 'card-img';
    if (url) {
      const img   = document.createElement('img');
      img.alt     = lot.title || 'Lot image';
      img.loading = 'lazy';
      img.onload  = () => img.classList.add('loaded');
      img.onerror = () => { img.style.display = 'none'; showPlaceholder(imgWrap); };
      img.src     = url;
      imgWrap.appendChild(img);
      if (enhanced) {
        const badge = document.createElement('div');
        badge.className   = 'enhanced-badge';
        badge.textContent = '✦ Enhanced';
        imgWrap.appendChild(badge);
      }
    } else {
      showPlaceholder(imgWrap);
    }
    const st = (lot.state || 'open').toLowerCase();
    const soldLike = (st === 'closed') && Number(lot.bid_count) > 0;
    const sbadge = document.createElement('div');
    sbadge.className   = 'status-badge ' + (st === 'open' ? 'status-open' : soldLike ? 'status-sold' : st === 'closed' ? 'status-closed' : 'status-withdrawn');
    sbadge.textContent = st === 'open' ? 'Live' : soldLike ? 'SOLD' : st === 'closed' ? 'Closed' : 'Withdrawn';
    imgWrap.appendChild(sbadge);
    imgLink.appendChild(imgWrap);
    card.appendChild(imgLink);

    // #19: urgency progress bar directly beneath the image - only once the
    // auction is actively closing. Driven by the lot's closes_at (same source
    // as the numeric timer), so it tracks anti-snipe extensions automatically.
    let progressFill = null;
    if (open && auctionState === 'active') {
      const bar = document.createElement('div');
      bar.className = 'lot-progress';
      progressFill = document.createElement('div');
      progressFill.className = 'lot-progress-fill lp-idle';
      bar.appendChild(progressFill);
      card.appendChild(bar);
    }

    // Body
    const body = document.createElement('div');
    body.className = 'card-body';

    const titleEl = document.createElement('a');
    titleEl.className = 'card-title';
    titleEl.href = detailsUrl;
    titleEl.style.textDecoration = 'none';
    const numPrefix = (lot.lot_number != null) ? ('Lot #' + lot.lot_number + ' · ') : '';
    titleEl.textContent = numPrefix + (lot.title || 'Untitled');
    // #2 winning/outbid chip - initial state from the per-viewer serializer flag.
    const chip = document.createElement('span');
    chip.setAttribute('data-chip', '');
    // #5: the chip now carries the OUTBID status on its own (the button says "Bid
    // Again"), and a socket event can flip it while the page is idle — announce it.
    chip.setAttribute('role', 'status');
    chip.style.display = 'none';
    titleEl.appendChild(chip);
    renderChip(chip, lot);
    body.appendChild(titleEl);

    if (lot.category) {
      const catEl = document.createElement('div');
      catEl.className   = 'card-category';
      catEl.textContent = lot.category;
      body.appendChild(catEl);
    }

    // Bid-activity metric on closed/sold lots (bid_count is not a realized price, so it
    // stays visible to anonymous users per the #20.1 privacy rule).
    if (st === 'closed' && Number(lot.bid_count) > 0) {
      const bidsEl = document.createElement('div');
      bidsEl.className   = 'card-bids';
      bidsEl.textContent = lot.bid_count + (Number(lot.bid_count) === 1 ? ' bid' : ' bids') + ' · Sold';
      body.appendChild(bidsEl);
    }

    // Current bid + next-min (server-authoritative)
    const cents     = Number(lot.current_bid_cents) > 0 ? Number(lot.current_bid_cents) : 0;
    const starting  = Number(lot.starting_bid_cents) > 0 ? Number(lot.starting_bid_cents) : 100;
    const increment = Number(lot.effective_bid_increment_cents) > 0 ? Number(lot.effective_bid_increment_cents)
                    : (Number(lot.bid_increment_cents) > 0 ? Number(lot.bid_increment_cents) : 500);
    const nextMin   = Number(lot.next_min_bid_cents) > 0 ? Number(lot.next_min_bid_cents)
                    : BidUtils.nextMinCents(starting, cents, increment);

    if (isHistoricalAuction) {
      // Historical archive lots carry no price/bid data (estimates, realized prices,
      // and bids are deliberately not imported) — render no price line.
    } else if (lot.realized_price_hidden) {
      // #20.1: realized/sold price gated for anonymous users on closed lots.
      const prompt = document.createElement('div');
      prompt.className = 'card-realized-prompt';
      const a = document.createElement('a');
      a.href = '/login.html?next=' + encodeURIComponent(location.pathname + location.search);
      a.textContent = 'Log in or create an account to view realized prices';
      prompt.appendChild(a);
      body.appendChild(prompt);
    } else {
      const bidRow = document.createElement('div');
      bidRow.className = 'card-bid';
      const bidLabel = document.createElement('span');
      bidLabel.className   = 'bid-label';
      bidLabel.textContent = (lot.state === 'closed') ? 'Sold for' : 'Current bid';
      const bidAmt = document.createElement('span');
      bidAmt.className   = cents > 0 ? 'bid-amount' : 'bid-amount no-bids';
      bidAmt.textContent = cents > 0 ? BidUtils.formatUSD(cents) : 'No bids - starts ' + BidUtils.formatUSD(starting);
      bidRow.appendChild(bidLabel);
      bidRow.appendChild(bidAmt);
      body.appendChild(bidRow);
    }

    if (open) {
      const nm = document.createElement('div');
      nm.className = 'card-nextmin';
      nm.innerHTML = 'Next min: <strong>' + BidUtils.formatUSD(nextMin) + '</strong>';
      body.appendChild(nm);

      const cd = document.createElement('div');
      cd.className = 'card-countdown';
      const cdIcon = document.createElement('span'); cdIcon.textContent = '⏱';
      const cdVal  = document.createElement('span');
      cd.appendChild(cdIcon); cd.appendChild(cdVal);
      body.appendChild(cd);
      startCardCountdown(lotId, cd, cdVal, progressFill, lotCloseTime(lot));
    }

    // #20 gate-aware bid area: sign-in / accept-terms / register-to-bid / bid form.
    if (open) {
      renderCardBidArea(card, body, lot, lotId, nextMin);
    }

    // View details (always)
    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const vd = document.createElement('a');
    vd.className = 'view-details';
    vd.href = detailsUrl;
    vd.textContent = 'View details →';
    actions.appendChild(vd);
    body.appendChild(actions);

    card.appendChild(body);
    return card;
  }

  // #20: choose the bid CTA for an open lot based on the bidder gate.
  function renderCardBidArea(card, body, lot, lotId, nextMin) {
    if (!token || !bidGate.logged_in) {
      const signin = document.createElement('div');
      signin.className = 'card-signin';
      const nextUrl = encodeURIComponent(location.pathname + location.search);
      signin.innerHTML = '<a href="/login.html?next=' + nextUrl + '">Sign in or create an account to bid →</a>';
      body.appendChild(signin);
      return;
    }
    if (!bidGate.terms_accepted_current) {
      const el = document.createElement('div');
      el.className = 'card-signin';
      el.innerHTML = '<a href="/buyer-terms.html?next=' + encodeURIComponent(location.pathname + location.search) + '">Accept Buyer Terms to bid →</a>';
      body.appendChild(el);
      return;
    }
    if (!bidGate.card_on_file) {
      const el = document.createElement('div');
      el.className = 'card-signin';
      const nextUrl = encodeURIComponent(location.pathname + location.search);
      el.innerHTML = '<a href="/add-card.html?next=' + nextUrl + '">Add a payment method to bid →</a>';
      body.appendChild(el);
      return;
    }
    if (!bidGate.can_bid) {
      const reg = document.createElement('div');
      reg.className = 'card-register';
      const btn = document.createElement('button');
      btn.type = 'button'; btn.className = 'btn-register'; btn.textContent = 'Register to Bid';
      const status = document.createElement('div'); status.className = 'cbf-status';
      reg.appendChild(btn); reg.appendChild(status);
      body.appendChild(reg);
      btn.addEventListener('click', () => showCardRegisterPanel(reg, lot.auction_id));
      return;
    }
    renderCardBidForm(card, body, lotId, nextMin, lot);
  }

  // Pickup-acknowledgement panel → register, then refresh the grid so bid forms show.
  function showCardRegisterPanel(reg, auctionId) {
    reg.innerHTML = '';
    const txt = document.createElement('div');
    txt.className = 'register-ack-text';
    txt.innerHTML = 'By registering you accept the <a href="/buyer-terms.html">Buyer Terms</a> and acknowledge you must collect won lots during the scheduled pickup window.';
    const lbl = document.createElement('label');
    lbl.className = 'register-ack';
    const cb = document.createElement('input'); cb.type = 'checkbox';
    const span = document.createElement('span'); span.textContent = ' I acknowledge the pickup obligations.';
    lbl.appendChild(cb); lbl.appendChild(span);
    const confirm = document.createElement('button');
    confirm.type = 'button'; confirm.className = 'btn-register'; confirm.textContent = 'Confirm & Register';
    const st = document.createElement('div'); st.className = 'cbf-status';
    reg.appendChild(txt); reg.appendChild(lbl); reg.appendChild(confirm); reg.appendChild(st);
    confirm.addEventListener('click', async () => {
      if (!cb.checked) { st.className = 'cbf-status err'; st.textContent = 'Please acknowledge the pickup obligations.'; return; }
      confirm.disabled = true; confirm.textContent = 'Registering…';
      const r = await BidUtils.registerForAuction(auctionId, token, true);
      if (r.unauthorized) { localStorage.removeItem('token'); window.location.href = '/login.html?next=' + encodeURIComponent(location.pathname + location.search); return; }
      if (r.ok) { bidGate.can_bid = true; bidGate.registered = true; loadAuction(); }
      else { confirm.disabled = false; confirm.textContent = 'Confirm & Register'; st.className = 'cbf-status err'; st.textContent = r.message; }
    });
  }

  function renderCardBidForm(card, body, lotId, nextMin, lot) {
    const winning = !!(lot && lot.viewer_is_high_bidder); // #10
    const form = document.createElement('div');
    form.className = 'card-bidform';
    const row = document.createElement('div');
    row.className = 'cbf-row';
    const input = document.createElement('input');
    input.type = 'text';
    input.setAttribute('inputmode', 'decimal');
    input.setAttribute('autocomplete', 'off');
    input.placeholder = winning ? ('New max (≥ ' + BidUtils.formatUSD(nextMin) + ')') : (BidUtils.formatUSD(nextMin) + ' or more');
    const btn = document.createElement('button');
    btn.type = 'button';
    // #5: primary button reflects the ACTION (Place Bid / Winning / Bid Again); the raise-max
    // hint lives in the input placeholder above, not in the button label.
    applyBidBtnState(btn, lot);
    row.appendChild(input); row.appendChild(btn);
    const status = document.createElement('div');
    status.className = 'cbf-status';
    form.appendChild(row); form.appendChild(status);
    body.appendChild(form);

    async function submitBid() {
      const built = BidUtils.buildBidPayload(input.value, null);
      if (built.error) { status.className = 'cbf-status err'; status.textContent = built.error; return; }
      btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Placing…';
      status.className = 'cbf-status'; status.textContent = '';
      const r = await BidUtils.placeBid(lotId, built.payload, token);
      if (r.unauthorized) { localStorage.removeItem('token'); window.location.href = '/login.html?next=' + encodeURIComponent(location.pathname + location.search); return; }
      btn.disabled = false; btn.textContent = orig;
      if (r.ok) {
        status.className = 'cbf-status ok';
        status.textContent = 'Your Max Bid: ' + BidUtils.formatUSD(Math.round(built.amount * 100)); // #16
        input.value = '';
        await patchCardBids(card, lotId);
      } else {
        status.className = 'cbf-status err';
        status.textContent = r.message;
      }
    }
    btn.addEventListener('click', submitBid);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') submitBid(); });
  }

  function showPlaceholder(wrap) {
    const ph = document.createElement('div');
    ph.className   = 'img-placeholder';
    ph.textContent = 'No image';
    wrap.appendChild(ph);
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  // ── Auction header tabs ─────────────────────────────────────────────────────
  function tabMapsUrl() {
    if (!auctionSummary) return '#';
    var q = [auctionSummary.pickup_street, auctionSummary.city, auctionSummary.address_state, auctionSummary.zip].filter(Boolean).join(', ');
    return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(q || 'auction pickup');
  }
  function tabLocationText() {
    var d = auctionSummary || {};
    var loc = [d.pickup_street, [d.city, d.address_state].filter(Boolean).join(', '), d.zip].filter(Boolean).join(' · ');
    return loc || 'Location provided after registration';
  }
  function populatePickupTab() {
    var el = document.getElementById('panel-pickup'); if (!el) return;
    var d = auctionSummary || {};
    var date = d.pickup_window_start ? fmtDate(d.pickup_window_start) : 'To be announced';
    var PT = window.PickupTiers || null;
    // Pickup Time A/B/C are the overall pickup window split into 3 EQUAL parts —
    // computed, never hardcoded. Times are shown in the AUCTION'S timezone
    // (auction.timezone; fallback America/New_York), never the viewer's browser tz.
    var tz = d.timezone || (PT && PT.DEFAULT_TZ) || 'America/New_York';
    var tzNames = { 'America/New_York': 'Eastern', 'America/Chicago': 'Central', 'America/Denver': 'Mountain', 'America/Los_Angeles': 'Pacific' };
    var tzLabel = tzNames[tz] ? (tzNames[tz] + ' Time') : tz;
    var win = (PT && d.pickup_window_start && d.pickup_window_end) ? PT.splitWindow(d.pickup_window_start, d.pickup_window_end) : null;
    var windowText = (PT && d.pickup_window_start && d.pickup_window_end)
      ? (PT.fmtTime(d.pickup_window_start, tz) + ' to ' + PT.fmtTime(d.pickup_window_end, tz)) : 'To be announced';
    function tierRow(letter, label) {
      var t = (win && win[letter]) ? PT.windowLabel(win[letter], tz) : 'To be announced';
      return '<div class="info-row"><strong>Pickup Time ' + letter + ' - ' + label + ':</strong> ' + esc(t) + '</div>';
    }
    el.innerHTML =
      '<h3>Pickup Information</h3>' +
      '<div class="info-row"><strong>Pickup date:</strong> ' + esc(date) + '</div>' +
      '<div class="info-row"><strong>Pickup window:</strong> ' + esc(windowText) + (win ? (' <span style="color:#64748b">(' + esc(tzLabel) + ')</span>') : '') + '</div>' +
      (win ? (tierRow('A', 'Small Items') + tierRow('B', 'Medium Items') + tierRow('C', 'Large Items')) : '') +
      '<div class="info-row"><strong>Location:</strong> ' + esc(tabLocationText()) +
        ' &nbsp;<a class="map-link" href="' + tabMapsUrl() + '" target="_blank" rel="noopener">View Map ↗</a></div>' +
      // P5: public copy kept concise + confidence-inspiring. You get a recommended
      // arrival window (based on your largest item) but may come any time in the
      // published window. The detailed pickup-scheduling rationale lives in the
      // Buyer FAQ (/buyer-faq.html#pickup) and on the paid invoice / pickup packet.
      '<div class="tab-note">You’ll receive a recommended arrival window based on the largest item you win, and you may arrive any time during the published pickup window. Please bring a valid photo ID.</div>' +
      '<div class="tab-note">For your privacy, the exact street number is shown after your payment is verified.</div>';
  }
  function populateTermsTab() {
    var el = document.getElementById('panel-terms'); if (!el) return;
    var d = auctionSummary || {};
    var bp = (d.buyer_premium_bps != null ? (d.buyer_premium_bps / 100) : 18);
    el.innerHTML =
      '<h3>Auction Terms &amp; Conditions</h3>' +
      '<div class="info-row"><strong>Bidding starts:</strong> ' + esc(d.start_time ? fmtDate(d.start_time) : 'To be announced') + '</div>' +
      '<div class="info-row"><strong>Bidding ends:</strong> ' + esc(d.end_time ? fmtDate(d.end_time) : 'To be announced') + ' - lots close in sequence, about 1 minute apart.</div>' +
      '<div class="info-row"><strong>Extended bidding:</strong> a bid placed in the final 2 minutes extends that lot by 2 minutes (anti-snipe), repeating until bidding settles.</div>' +
      '<div class="info-row"><strong>Buyer’s premium:</strong> ' + esc(bp) + '% added to the hammer price of each lot won.</div>' +
      '<div class="info-row"><strong>Additional fees &amp; full terms:</strong> see the <a class="map-link" href="/terms.html" target="_blank" rel="noopener">full Terms &amp; Conditions</a>.</div>' +
      '<div class="info-row"><strong>Pickup:</strong> ' + esc(tabLocationText()) +
        ' &nbsp;<a class="map-link" href="' + tabMapsUrl() + '" target="_blank" rel="noopener">View Map ↗</a> · See the Pickup Information tab for dates and your recommended arrival window.</div>' +
      '<div class="tab-note">Please review these terms before registering to bid. Full marketplace policy: <a href="/terms.html" target="_blank" rel="noopener">Terms of Use</a>.</div>';
  }
  function loadWatchlistTab() {
    var el = document.getElementById('panel-watchlist'); if (!el) return;
    if (!token) { el.innerHTML = '<h3>Watchlist Favorites</h3><div class="empty-tab">Log in to see the lots you’ve watched or bid on in this auction.</div>'; return; }
    el.innerHTML = '<h3>Watchlist Favorites</h3><div class="empty-tab">Loading…</div>';
    fetch('/api/watchlist', { headers: { Authorization: 'Bearer ' + token } })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var rows = ((data && data.data) || []).filter(function (l) { return String(l.auction_id) === String(auctionId); });
        if (!rows.length) { el.innerHTML = '<h3>Watchlist Favorites</h3><div class="empty-tab">No watched or bid-on lots in this auction yet. Bidding on a lot adds it here automatically.</div>'; return; }
        el.innerHTML = '<h3>Watchlist Favorites (' + rows.length + ')</h3><div class="wl-grid">' + rows.map(function (l) {
          var price = (l.current_bid_cents != null && l.current_bid_cents > 0) ? BidUtils.formatUSD(l.current_bid_cents) : 'No bids yet'; // #3 whole-dollar
          var img = '<img src="' + (l.thumbnail_url ? esc(l.thumbnail_url) : '/img/lot-placeholder.svg') + '" alt="" style="width:100%;aspect-ratio:4/3;object-fit:cover" onerror="this.onerror=null;this.src=\'/img/lot-placeholder.svg\'">'; // #13 professional fallback
          return '<a class="wl-card" href="/lot.html?lotId=' + encodeURIComponent(l.id) + '">' + img +
            '<div class="b"><div class="t">Lot #' + esc(l.lot_number) + ' · ' + esc(l.title || '') + '</div>' +
            '<div class="s">' + esc(price) + ' · ' + esc(l.state) + '</div></div></a>';
        }).join('') + '</div>';
      })
      .catch(function () { el.innerHTML = '<h3>Watchlist Favorites</h3><div class="empty-tab">Could not load your watchlist. Please refresh.</div>'; });
  }
  function showTab(name) {
    document.querySelectorAll('.atab').forEach(function (b) { b.classList.toggle('active', b.dataset.tab === name); });
    var gw = document.getElementById('grid-wrap'); if (gw) gw.style.display = (name === 'gallery') ? '' : 'none';
    ['pickup', 'terms', 'watchlist'].forEach(function (p) { var el = document.getElementById('panel-' + p); if (el) el.style.display = (name === p) ? '' : 'none'; });
    if (name === 'watchlist') loadWatchlistTab();
  }
  document.querySelectorAll('.atab').forEach(function (b) { b.addEventListener('click', function () { showTab(b.dataset.tab); }); });

  function esc(str) {
    return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function fmtDate(iso) {
    try {
      return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    } catch { return ''; }
  }
</script>
