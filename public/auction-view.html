<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auction — Advantage Auction</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f4f4f5;
      color: #111;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #111;
      padding: 0.9rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand { color: #fff; font-weight: 700; font-size: 1rem; }
    .header-right { display: flex; align-items: center; gap: 1.25rem; }
    .lot-count { color: #888; font-size: 0.8rem; }

    /* ── Auction banner ── */
    .auction-banner {
      background: #fff;
      border-bottom: 1px solid #e4e4e7;
    }

    /* Optional banner image hero */
    .banner-hero {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      display: block;
    }

    .banner-body {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.25rem 1.5rem 1rem;
    }

    .auction-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .auction-title-group { flex: 1; min-width: 0; }
    .auction-title { font-size: 1.3rem; font-weight: 700; color: #111; }
    .auction-subtitle {
      font-size: 0.88rem;
      color: #52525b;
      margin-top: 0.2rem;
    }
    .auction-meta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 0.4rem;
      font-size: 0.78rem;
      color: #71717a;
    }
    .auction-meta span::before { content: '· '; }
    .auction-meta span:first-child::before { content: ''; }

    /* Walkthrough CTA */
    .btn-walkthrough {
      display: none;
      align-items: center;
      gap: 0.45rem;
      padding: 0.5rem 1rem;
      border: 1.5px solid #3f3f46;
      border-radius: 6px;
      background: #111;
      color: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s;
      flex-shrink: 0;
    }
    .btn-walkthrough:hover { background: #3f3f46; }
    .btn-walkthrough.visible { display: flex; }
    .play-icon {
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .play-icon::after {
      content: '';
      border-style: solid;
      border-width: 4px 0 4px 8px;
      border-color: transparent transparent transparent #111;
      margin-left: 1px;
    }

    /* ── Seller bar ── */
    .seller-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.7rem;
      font-size: 0.8rem;
      color: #71717a;
    }
    .btn-follow {
      padding: 0.25rem 0.75rem;
      font-size: 0.78rem;
      font-weight: 600;
      border-radius: 6px;
      border: 1.5px solid #2563eb;
      background: #fff;
      color: #2563eb;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .btn-follow:hover { background: #eff6ff; }
    .btn-follow.following { background: #2563eb; color: #fff; }
    .btn-follow.following:hover { background: #1d4ed8; }
    .btn-follow:disabled { opacity: 0.5; cursor: default; }

    /* ── Grid wrapper ── */
    .grid-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    /* ── Lot grid ── */
    .lot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.25rem;
    }

    /* ── Lot card ── */
    .lot-card {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e4e4e7;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.15s, transform 0.1s;
    }
    .lot-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
      transform: translateY(-2px);
    }

    /* Image area */
    .card-img {
      width: 100%;
      aspect-ratio: 4/3;
      background: #e4e4e7;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .card-img img.loaded { opacity: 1; }
    .card-img .img-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #a1a1aa;
      font-size: 0.8rem;
    }

    /* Enhanced badge */
    .enhanced-badge {
      position: absolute;
      bottom: 0.5rem;
      left: 0.5rem;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    /* Status badge */
    .status-badge {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      padding: 0.2rem 0.55rem;
      border-radius: 99px;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .status-open      { background: #dcfce7; color: #15803d; }
    .status-closed    { background: #fee2e2; color: #b91c1c; }
    .status-withdrawn { background: #f4f4f5; color: #71717a; }

    /* Card body */
    .card-body {
      padding: 0.9rem 1rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      flex: 1;
    }
    .card-title {
      font-size: 0.92rem;
      font-weight: 700;
      color: #111;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-category {
      font-size: 0.72rem;
      color: #a1a1aa;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .card-bid {
      margin-top: auto;
      padding-top: 0.65rem;
      border-top: 1px solid #f4f4f5;
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
    }
    .bid-label { font-size: 0.72rem; color: #a1a1aa; }
    .bid-amount { font-size: 1.05rem; font-weight: 800; color: #111; }
    .bid-amount.no-bids { color: #a1a1aa; font-weight: 500; font-size: 0.85rem; }

    /* ── #17: inline card bidding ── */
    .card-nextmin { font-size: 0.74rem; color: #6b7280; margin-top: 0.2rem; }
    .card-nextmin strong { color: #111; font-weight: 700; }
    .card-countdown {
      display: flex; align-items: center; gap: 0.3rem;
      font-size: 0.78rem; font-weight: 600; color: #b45309;
      margin-top: 0.35rem;
    }
    .card-countdown.urgent { color: #b91c1c; }
    .card-countdown.ended  { color: #71717a; }

    /* ── #19: per-lot countdown progress bar (final 60s urgency) ── */
    .lot-progress {
      position: relative;
      height: 9px;
      width: 100%;
      background: #eef0f3;
      overflow: hidden;
    }
    .lot-progress-fill {
      height: 100%;
      width: 100%;
      transform-origin: left center;
      border-radius: 0 6px 6px 0;
      transition: width 1s linear, background 0.4s ease, box-shadow 0.4s ease;
      background: linear-gradient(90deg, #34d399, #10b981);
    }
    /* >60s remaining — subtle, calm */
    .lot-progress-fill.lp-idle  { background: linear-gradient(90deg, #a7f3d0, #6ee7b7); opacity: 0.5; }
    /* 60–31s */
    .lot-progress-fill.lp-green { background: linear-gradient(90deg, #34d399, #059669); opacity: 1; }
    /* 30–16s */
    .lot-progress-fill.lp-amber { background: linear-gradient(90deg, #fbbf24, #f97316); opacity: 1; }
    /* 15–1s — urgent, with a soft glow */
    .lot-progress-fill.lp-red   { background: linear-gradient(90deg, #fb7185, #dc2626); opacity: 1;
                                  box-shadow: 0 0 10px rgba(220, 38, 38, 0.55); }
    /* closed */
    .lot-progress-fill.lp-closed { background: #27272a; opacity: 1; width: 0 !important; }
    .card-bidform { margin-top: 0.6rem; display: flex; flex-direction: column; gap: 0.4rem; }
    .card-bidform .cbf-row { display: flex; gap: 0.4rem; }
    .card-bidform input {
      flex: 1; min-width: 0; padding: 0.45rem 0.55rem; font-size: 0.85rem;
      border: 1.5px solid #e2e8f0; border-radius: 6px; color: #111;
    }
    .card-bidform button {
      padding: 0.45rem 0.8rem; font-size: 0.82rem; font-weight: 700;
      background: #1d4ed8; color: #fff; border: none; border-radius: 6px; cursor: pointer;
      white-space: nowrap;
    }
    .card-bidform button:disabled { opacity: 0.6; cursor: default; }
    .cbf-status { font-size: 0.76rem; min-height: 1em; }
    .cbf-status.ok  { color: #15803d; }
    .cbf-status.err { color: #b91c1c; }
    .card-signin { margin-top: 0.55rem; font-size: 0.8rem; }
    .card-signin a { color: #1d4ed8; text-decoration: none; font-weight: 600; }
    .card-register { margin-top: 0.6rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .btn-register {
      padding: 0.5rem 0.9rem; font-size: 0.85rem; font-weight: 700;
      background: #047857; color: #fff; border: none; border-radius: 7px; cursor: pointer;
    }
    .btn-register:disabled { opacity: 0.6; cursor: default; }
    .register-ack-text { font-size: 0.76rem; color: #4b5563; line-height: 1.35; }
    .register-ack-text a { color: #1d4ed8; text-decoration: none; font-weight: 600; }
    .register-ack { font-size: 0.78rem; color: #374151; display: flex; align-items: flex-start; gap: 0.35rem; }
    .card-actions { margin-top: 0.55rem; display: flex; justify-content: flex-end; }
    .view-details { font-size: 0.8rem; color: #1d4ed8; text-decoration: none; font-weight: 600; }
    .view-details:hover { text-decoration: underline; }
    .card-realized-prompt {
      margin-top: auto; padding-top: 0.65rem; border-top: 1px solid #f4f4f5;
      font-size: 0.82rem; line-height: 1.35;
    }
    .card-realized-prompt a { color: #1d4ed8; text-decoration: none; font-weight: 600; }
    .card-realized-prompt a:hover { text-decoration: underline; }
    .card-img-link { display: block; }

    /* ── States ── */
    .state-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: #71717a;
      font-size: 0.9rem;
    }
    .state-msg strong { display: block; font-size: 1.1rem; color: #3f3f46; margin-bottom: 0.4rem; }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #e4e4e7 25%, #f4f4f5 50%, #e4e4e7 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
    .card-skeleton .card-img { background: #e4e4e7; }
    .card-skeleton .sk-line  { height: 12px; margin: 4px 0; border-radius: 4px; }

    /* ── Video modal ── */
    #video-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 900;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    #video-modal.open { display: flex; }
    .video-modal-inner {
      position: relative;
      width: 100%;
      max-width: 900px;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
    }
    .video-modal-inner video {
      width: 100%;
      display: block;
      max-height: 80vh;
      object-fit: contain;
    }
    .video-modal-close {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      width: 32px;
      height: 32px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .video-modal-close:hover { background: rgba(0,0,0,0.85); }
    .video-title {
      padding: 0.75rem 1rem;
      background: #111;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

<header>
  <span class="brand">Advantage Auction</span>
  <div class="header-right">
    <span class="lot-count" id="lot-count"></span>
    <button onclick="localStorage.removeItem('token');sessionStorage.clear();window.location.href='/demo.html';"
            style="font-size:0.8rem;color:#ef4444;background:none;border:none;cursor:pointer;padding:0;">Log out</button>
  </div>
</header>

<div class="auction-banner" id="auction-banner">
  <img class="banner-hero" id="banner-hero" style="display:none" alt="Auction banner" />
  <div class="banner-body">
    <div class="auction-title-row">
      <div class="auction-title-group">
        <div class="auction-title" id="auction-title">Loading auction…</div>
        <div class="auction-subtitle" id="auction-subtitle" style="display:none"></div>
        <div class="auction-meta" id="auction-meta"></div>
      </div>
      <button class="btn-walkthrough" id="btn-walkthrough" aria-label="Watch auction walkthrough">
        <span class="play-icon"></span>
        Watch Walkthrough
      </button>
    </div>
    <div class="seller-bar" id="seller-bar" style="display:none"></div>
  </div>
</div>

<div class="grid-wrap" id="grid-wrap">
  <div class="lot-grid" id="lot-grid">
    <div class="lot-card card-skeleton">
      <div class="card-img"></div>
      <div class="card-body">
        <div class="skeleton sk-line" style="width:80%"></div>
        <div class="skeleton sk-line" style="width:50%"></div>
      </div>
    </div>
    <div class="lot-card card-skeleton">
      <div class="card-img"></div>
      <div class="card-body">
        <div class="skeleton sk-line" style="width:70%"></div>
        <div class="skeleton sk-line" style="width:40%"></div>
      </div>
    </div>
    <div class="lot-card card-skeleton">
      <div class="card-img"></div>
      <div class="card-body">
        <div class="skeleton sk-line" style="width:90%"></div>
        <div class="skeleton sk-line" style="width:55%"></div>
      </div>
    </div>
  </div>
</div>

<!-- Marketplace seller acquisition CTA — Advantage.Bid marketplace only -->
<div id="marketplace-seller-cta-mount"></div>

<!-- Walkthrough video modal -->
<div id="video-modal" role="dialog" aria-modal="true">
  <div class="video-modal-inner">
    <button class="video-modal-close" id="video-close" aria-label="Close video">✕</button>
    <video id="walkthrough-video" controls playsinline preload="metadata"></video>
    <div class="video-title" id="video-title"></div>
  </div>
</div>

<script src="/widgets/shared/auth-refresh.js"></script>
<script src="/widgets/shared/analytics.js"></script>
<script src="/widgets/shared/marketplace-seller-cta.js"></script>
<script src="/widgets/shared/bid-utils.js"></script>
<script>
  const params    = new URLSearchParams(location.search);
  // Accept ?auctionId= (canonical) or ?id= (legacy/marketplace card links) so
  // older or externally-shared links don't dead-end on "No auction selected".
  const auctionId = params.get('auctionId') || params.get('id');
  const grid      = document.getElementById('lot-grid');
  const token     = localStorage.getItem('token');
  let   auctionState = null;   // #5/#19: 'published' | 'active' | 'closed' | …
  let   bidGate = { logged_in: false, terms_accepted_current: false, registered: false, can_bid: false }; // #20

  if (!auctionId) {
    grid.innerHTML = '<div class="state-msg"><strong>No auction selected.</strong>Check the URL and try again.</div>';
    document.getElementById('auction-title').textContent = 'No auction ID';
  } else {
    loadAuction();
    loadSellerInfo();
    loadWalkthroughVideo();
    initSellerAcquisitionCta();

    // #8: refresh lot/bid state automatically when returning to the page
    // (bfcache restore or tab re-focus). Skip if a bid is half-typed so we
    // never wipe a buyer's in-progress entry.
    function anyBidInputDirty() {
      return Array.from(document.querySelectorAll('.card-bidform input')).some(i => i.value.trim() !== '');
    }
    window.addEventListener('pageshow', e => { if (e.persisted && !anyBidInputDirty()) loadAuction(); });
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && !anyBidInputDirty()) loadAuction();
    });
  }

  function initSellerAcquisitionCta() {
    var mount = document.getElementById('marketplace-seller-cta-mount');
    if (!mount || typeof window.AAPMarketplaceSellerCta === 'undefined') return;
    window.AAPMarketplaceSellerCta.init(mount, {
      context: { auction_id: auctionId || null }
    });
  }

  // ── Seller / auction info ─────────────────────────────────────────────────
  let currentSellerId = null;
  let isFollowing     = false;

  async function loadSellerInfo() {
    try {
      const res  = await fetch('/api/auctions/' + auctionId + '/summary');
      const data = await res.json();
      if (!data.success || !data.data) return;

      const d = data.data;
      currentSellerId = d.seller_id;

      // Title
      document.getElementById('auction-title').textContent = d.title || 'Auction';
      document.title = (d.title || 'Auction') + ' — Advantage Auction';

      // Subtitle
      if (d.subtitle) {
        const sub = document.getElementById('auction-subtitle');
        sub.textContent    = d.subtitle;
        sub.style.display  = 'block';
      }

      // Meta row: location + dates
      const meta = document.getElementById('auction-meta');
      const parts = [];
      if (d.city && d.address_state) parts.push(d.city + ', ' + d.address_state);
      else if (d.city)               parts.push(d.city);
      // #7: soft timed-auction language — avoid a single hard "auction end time".
      if (d.state === 'closed') {
        parts.push('Auction ended — sale results below');
      } else if (d.start_time) {
        parts.push('Auction starts ' + fmtDate(d.start_time));
        parts.push('Lots begin closing then, about 1 min apart');
      }
      if (d.shipping_available) parts.push('Shipping available');
      meta.innerHTML = parts.map(p => '<span>' + esc(p) + '</span>').join('');

      // Banner hero image
      if (d.banner_image_url) {
        const hero = document.getElementById('banner-hero');
        hero.src = d.banner_image_url;
        hero.style.display = 'block';
      }

      // Follow state
      if (token) {
        try {
          const fRes  = await fetch('/api/sellers/following', { headers: { Authorization: 'Bearer ' + token } });
          if (fRes.status === 401) { localStorage.removeItem('token'); }
          else {
            const fData = await fRes.json();
            if (fData.success) isFollowing = fData.data.some(s => s.seller_id === d.seller_id);
          }
        } catch { /* ignore */ }
      }

      renderSellerBar(d.follower_count);
    } catch { /* summary failed — banner stays minimal */ }
  }

  function renderSellerBar(followerCount) {
    const bar = document.getElementById('seller-bar');
    bar.innerHTML = '';
    const countEl = document.createElement('span');
    countEl.id          = 'follower-count-display';
    countEl.textContent = followerCount + ' follower' + (followerCount === 1 ? '' : 's');
    bar.appendChild(countEl);

    if (token) {
      const btn = document.createElement('button');
      btn.className   = 'btn-follow' + (isFollowing ? ' following' : '');
      btn.textContent = isFollowing ? 'Following' : 'Follow Seller';
      btn.addEventListener('click', () => toggleFollow(btn));
      bar.appendChild(btn);
    }
    bar.style.display = 'flex';
  }

  async function toggleFollow(btn) {
    if (!currentSellerId) return;
    const wasFollowing = isFollowing;
    isFollowing = !wasFollowing;
    applyFollowState(btn);

    const countEl   = document.getElementById('follower-count-display');
    const prevCount = parseInt(countEl.textContent, 10) || 0;
    const newCount  = wasFollowing ? Math.max(0, prevCount - 1) : prevCount + 1;
    countEl.textContent = newCount + ' follower' + (newCount === 1 ? '' : 's');

    btn.disabled = true;
    try {
      const res = await fetch('/api/sellers/' + currentSellerId + '/follow', {
        method: wasFollowing ? 'DELETE' : 'POST',
        headers: { Authorization: 'Bearer ' + token },
      });
      if (res.status === 401) { localStorage.removeItem('token'); window.location.href = '/login.html'; return; }
      if (!res.ok) throw new Error();
    } catch {
      isFollowing = wasFollowing;
      applyFollowState(btn);
      countEl.textContent = prevCount + ' follower' + (prevCount === 1 ? '' : 's');
    } finally {
      btn.disabled = false;
    }
  }

  function applyFollowState(btn) {
    btn.textContent = isFollowing ? 'Following' : 'Follow Seller';
    btn.className   = 'btn-follow' + (isFollowing ? ' following' : '');
  }

  // ── Walkthrough video ─────────────────────────────────────────────────────
  let walkthroughVideoUrl   = null;
  let walkthroughVideoTitle = null;

  async function loadWalkthroughVideo() {
    try {
      const res  = await fetch('/api/auctions/' + auctionId + '/public-video');
      const data = await res.json();
      if (!data.success || !data.data) return;
      walkthroughVideoUrl   = data.data.video_url;
      walkthroughVideoTitle = data.data.title || 'Auction Walkthrough';
      const btn = document.getElementById('btn-walkthrough');
      btn.classList.add('visible');
    } catch { /* video unavailable — no CTA shown */ }
  }

  document.getElementById('btn-walkthrough').addEventListener('click', () => {
    if (!walkthroughVideoUrl) return;
    const vid = document.getElementById('walkthrough-video');
    vid.src = walkthroughVideoUrl;
    document.getElementById('video-title').textContent = walkthroughVideoTitle;
    document.getElementById('video-modal').classList.add('open');
    vid.play().catch(() => {});
  });

  function closeVideoModal() {
    const modal = document.getElementById('video-modal');
    const vid   = document.getElementById('walkthrough-video');
    modal.classList.remove('open');
    vid.pause();
    vid.src = '';
  }

  document.getElementById('video-close').addEventListener('click', closeVideoModal);
  document.getElementById('video-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('video-modal')) closeVideoModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeVideoModal();
  });

  // ── Lot grid ──────────────────────────────────────────────────────────────
  async function loadAuction() {
    try {
      // Pull lots + auction state together; state drives #5 visibility.
      // Send the token (when present) so logged-in users receive realized/sold
      // prices on closed lots; anonymous callers get them gated server-side (#20.1).
      const authH = token ? { headers: { Authorization: 'Bearer ' + token } } : {};
      const [lotsRes, meta] = await Promise.all([
        fetch('/api/lots/auction/' + auctionId, authH).then(r => r.json()),
        fetch('/api/auctions/' + auctionId + '/summary').then(r => r.json()).catch(() => null),
      ]);
      if (!lotsRes.success) throw new Error(lotsRes.message || 'Failed to load lots');
      auctionState = (meta && meta.success && meta.data) ? meta.data.state : auctionState;

      // #20: refresh the bidder gate (logged in? terms? registered?) for this auction.
      bidGate = await BidUtils.getBidGate(auctionId, token);

      const allLots = lotsRes.data;
      // #5: while the auction is actively closing, show only lots still open so
      // bidders see what's available. 'published' (not started) shows all (none
      // closed yet); 'closed' shows ALL lots — the sale-results view.
      const lots = (auctionState === 'active') ? allLots.filter(lotIsOpen) : allLots;

      const resultsMode = (auctionState === 'closed');
      const label = !allLots.length ? ''
        : auctionState === 'active' ? (lots.length + ' lot' + (lots.length === 1 ? '' : 's') + ' open')
        : resultsMode               ? (allLots.length + ' lot' + (allLots.length === 1 ? '' : 's') + ' · sale results')
        : (allLots.length + ' lot' + (allLots.length === 1 ? '' : 's'));
      document.getElementById('lot-count').textContent = label;

      if (!allLots.length) {
        grid.innerHTML = '<div class="state-msg"><strong>No lots listed yet.</strong>Check back soon.</div>';
        return;
      }
      if (!lots.length) {
        // Active auction with everything already closed (between last close and
        // the auction-level close transition).
        clearAllCardTimers();
        grid.innerHTML = '<div class="state-msg"><strong>All lots have closed.</strong>Final results will appear shortly.</div>';
        return;
      }

      const imageMap = await fetchFirstImages(lots.map(l => l.id));

      clearAllCardTimers();
      grid.innerHTML = '';
      lots.forEach(lot => grid.appendChild(buildCard(lot, imageMap[lot.id])));

    } catch (err) {
      grid.innerHTML = '<div class="state-msg"><strong>Could not load auction.</strong>' + esc(err.message) + '</div>';
    }
  }

  async function fetchFirstImages(lotIds) {
    const results = await Promise.all(
      lotIds.map(id =>
        fetch('/api/lots/' + id + '/images')
          .then(r => r.json())
          .then(d => {
            if (!d.success || !d.data.length) return { id, url: null, enhanced: false };
            const row = d.data[0];
            return {
              id,
              url: row.best_image_url || row.image_url || null,
              enhanced: row.processing_status === 'complete' && !!row.processed_image_url,
            };
          })
          .catch(() => ({ id, url: null, enhanced: false }))
      )
    );
    const map = {};
    results.forEach(r => { map[r.id] = r; });
    return map;
  }

  // ── #17: per-card countdown timers (cleared on every re-render) ─────────────
  const cardTimers = {};
  function clearAllCardTimers() {
    Object.keys(cardTimers).forEach(id => { clearInterval(cardTimers[id]); delete cardTimers[id]; });
  }
  function lotCloseTime(lot) { return lot.extended_until || lot.closes_at || null; }
  function lotIsOpen(lot) {
    if ((lot.state || 'open').toLowerCase() !== 'open') return false;
    const close = lotCloseTime(lot);
    return !(close && Date.now() > new Date(close).getTime());
  }
  // #19: drive the urgency bar from the SAME closes_at as the numeric timer.
  // Bands: >60s idle/subtle · 60–31s green · 30–16s amber · 15–1s red · 0 closed.
  function updateProgressBar(fill, remaining) {
    if (!fill) return;
    if (remaining <= 0) { fill.className = 'lot-progress-fill lp-closed'; fill.style.width = '0%'; return; }
    if (remaining > 60000) { fill.className = 'lot-progress-fill lp-idle'; fill.style.width = '100%'; return; }
    const pct = Math.max(0, Math.min(100, (remaining / 60000) * 100));
    let cls = 'lp-green';
    if (remaining <= 15000)      cls = 'lp-red';
    else if (remaining <= 30000) cls = 'lp-amber';
    fill.className = 'lot-progress-fill ' + cls;
    fill.style.width = pct + '%';
  }

  // span = numeric timer; fill = progress-bar fill (may be null when not active).
  function startCardCountdown(lotId, wrap, span, fill, closesAt) {
    if (cardTimers[lotId]) { clearInterval(cardTimers[lotId]); delete cardTimers[lotId]; }
    if (!closesAt) { wrap.style.display = 'none'; updateProgressBar(fill, 0); return; }
    const end = new Date(closesAt).getTime();
    function tick() {
      const remaining = end - Date.now();
      updateProgressBar(fill, remaining);
      if (remaining <= 0) {
        span.textContent = 'Ended';
        wrap.classList.add('ended'); wrap.classList.remove('urgent');
        clearInterval(cardTimers[lotId]); delete cardTimers[lotId];
        return;
      }
      const h = Math.floor(remaining / 3600000);
      const m = Math.floor((remaining % 3600000) / 60000);
      const s = Math.floor((remaining % 60000) / 1000);
      span.textContent = h > 0 ? (h + 'h ' + String(m).padStart(2, '0') + 'm')
                       : m > 0 ? (m + 'm ' + String(s).padStart(2, '0') + 's')
                       : (s + 's');
      wrap.classList.toggle('urgent', remaining < 60000);
    }
    tick();
    cardTimers[lotId] = setInterval(tick, 1000);
  }

  // After a bid, refresh just this card's bid figures in place (keeps the
  // success message + the buyer's place in the grid). Uses the single-lot
  // endpoint which returns server-authoritative next_min_bid_cents.
  async function patchCardBids(card, lotId) {
    try {
      const authH = token ? { headers: { Authorization: 'Bearer ' + token } } : {};
      const res  = await fetch('/api/lots/' + lotId, authH);
      const data = await res.json();
      if (!data.success || !data.data) return;
      const lot      = data.data;
      const cents    = Number(lot.current_bid_cents) > 0 ? Number(lot.current_bid_cents) : 0;
      const starting = Number(lot.starting_bid_cents) > 0 ? Number(lot.starting_bid_cents) : 100;
      const nextMin  = Number(lot.next_min_bid_cents) > 0 ? Number(lot.next_min_bid_cents)
                     : BidUtils.nextMinCents(starting, cents, lot.effective_bid_increment_cents);
      const amtEl = card.querySelector('.bid-amount');
      if (amtEl) {
        amtEl.className   = cents > 0 ? 'bid-amount' : 'bid-amount no-bids';
        amtEl.textContent = cents > 0 ? BidUtils.formatUSD(cents) : 'No bids — starts ' + BidUtils.formatUSD(starting);
      }
      const nmEl = card.querySelector('.card-nextmin strong');
      if (nmEl) nmEl.textContent = BidUtils.formatUSD(nextMin);
      const inp = card.querySelector('.card-bidform input');
      if (inp) inp.placeholder = BidUtils.formatUSD(nextMin) + ' or more';
      // #19.7: if anti-snipe extended this lot, reset the countdown + bar to the
      // fresh close time (same source as the initial render).
      const cdWrap = card.querySelector('.card-countdown');
      const cdVal  = cdWrap ? cdWrap.querySelector('span:last-child') : null;
      const fill   = card.querySelector('.lot-progress-fill');
      if (cdWrap && cdVal) startCardCountdown(lotId, cdWrap, cdVal, fill, lot.extended_until || lot.closes_at);
    } catch { /* ignore refresh blip */ }
  }

  function buildCard(lot, imgInfo) {
    const url       = imgInfo?.url      || null;
    const enhanced  = imgInfo?.enhanced || false;
    const lotId     = lot.id;
    const open      = lotIsOpen(lot);
    const detailsUrl = '/lot.html?lotId=' + encodeURIComponent(lotId);

    const card = document.createElement('div');
    card.className = 'lot-card';
    card.setAttribute('data-lot-id', lotId);

    // Image (links to full details)
    const imgLink = document.createElement('a');
    imgLink.className = 'card-img-link';
    imgLink.href = detailsUrl;
    const imgWrap = document.createElement('div');
    imgWrap.className = 'card-img';
    if (url) {
      const img   = document.createElement('img');
      img.alt     = lot.title || 'Lot image';
      img.loading = 'lazy';
      img.onload  = () => img.classList.add('loaded');
      img.onerror = () => { img.style.display = 'none'; showPlaceholder(imgWrap); };
      img.src     = url;
      imgWrap.appendChild(img);
      if (enhanced) {
        const badge = document.createElement('div');
        badge.className   = 'enhanced-badge';
        badge.textContent = '✦ Enhanced';
        imgWrap.appendChild(badge);
      }
    } else {
      showPlaceholder(imgWrap);
    }
    const st = (lot.state || 'open').toLowerCase();
    const sbadge = document.createElement('div');
    sbadge.className   = 'status-badge status-' + (st === 'open' ? 'open' : st === 'closed' ? 'closed' : 'withdrawn');
    sbadge.textContent = st === 'open' ? 'Live' : st === 'closed' ? 'Closed' : 'Withdrawn';
    imgWrap.appendChild(sbadge);
    imgLink.appendChild(imgWrap);
    card.appendChild(imgLink);

    // #19: urgency progress bar directly beneath the image — only once the
    // auction is actively closing. Driven by the lot's closes_at (same source
    // as the numeric timer), so it tracks anti-snipe extensions automatically.
    let progressFill = null;
    if (open && auctionState === 'active') {
      const bar = document.createElement('div');
      bar.className = 'lot-progress';
      progressFill = document.createElement('div');
      progressFill.className = 'lot-progress-fill lp-idle';
      bar.appendChild(progressFill);
      card.appendChild(bar);
    }

    // Body
    const body = document.createElement('div');
    body.className = 'card-body';

    const titleEl = document.createElement('a');
    titleEl.className = 'card-title';
    titleEl.href = detailsUrl;
    titleEl.style.textDecoration = 'none';
    const numPrefix = (lot.lot_number != null) ? ('Lot #' + lot.lot_number + ' · ') : '';
    titleEl.textContent = numPrefix + (lot.title || 'Untitled');
    body.appendChild(titleEl);

    if (lot.category) {
      const catEl = document.createElement('div');
      catEl.className   = 'card-category';
      catEl.textContent = lot.category;
      body.appendChild(catEl);
    }

    // Current bid + next-min (server-authoritative)
    const cents     = Number(lot.current_bid_cents) > 0 ? Number(lot.current_bid_cents) : 0;
    const starting  = Number(lot.starting_bid_cents) > 0 ? Number(lot.starting_bid_cents) : 100;
    const increment = Number(lot.effective_bid_increment_cents) > 0 ? Number(lot.effective_bid_increment_cents)
                    : (Number(lot.bid_increment_cents) > 0 ? Number(lot.bid_increment_cents) : 500);
    const nextMin   = Number(lot.next_min_bid_cents) > 0 ? Number(lot.next_min_bid_cents)
                    : BidUtils.nextMinCents(starting, cents, increment);

    if (lot.realized_price_hidden) {
      // #20.1: realized/sold price gated for anonymous users on closed lots.
      const prompt = document.createElement('div');
      prompt.className = 'card-realized-prompt';
      const a = document.createElement('a');
      a.href = '/login.html?next=' + encodeURIComponent(location.pathname + location.search);
      a.textContent = 'Log in or create an account to view realized prices';
      prompt.appendChild(a);
      body.appendChild(prompt);
    } else {
      const bidRow = document.createElement('div');
      bidRow.className = 'card-bid';
      const bidLabel = document.createElement('span');
      bidLabel.className   = 'bid-label';
      bidLabel.textContent = (lot.state === 'closed') ? 'Sold for' : 'Current bid';
      const bidAmt = document.createElement('span');
      bidAmt.className   = cents > 0 ? 'bid-amount' : 'bid-amount no-bids';
      bidAmt.textContent = cents > 0 ? BidUtils.formatUSD(cents) : 'No bids — starts ' + BidUtils.formatUSD(starting);
      bidRow.appendChild(bidLabel);
      bidRow.appendChild(bidAmt);
      body.appendChild(bidRow);
    }

    if (open) {
      const nm = document.createElement('div');
      nm.className = 'card-nextmin';
      nm.innerHTML = 'Next min: <strong>' + BidUtils.formatUSD(nextMin) + '</strong>';
      body.appendChild(nm);

      const cd = document.createElement('div');
      cd.className = 'card-countdown';
      const cdIcon = document.createElement('span'); cdIcon.textContent = '⏱';
      const cdVal  = document.createElement('span');
      cd.appendChild(cdIcon); cd.appendChild(cdVal);
      body.appendChild(cd);
      startCardCountdown(lotId, cd, cdVal, progressFill, lotCloseTime(lot));
    }

    // #20 gate-aware bid area: sign-in / accept-terms / register-to-bid / bid form.
    if (open) {
      renderCardBidArea(card, body, lot, lotId, nextMin);
    }

    // View details (always)
    const actions = document.createElement('div');
    actions.className = 'card-actions';
    const vd = document.createElement('a');
    vd.className = 'view-details';
    vd.href = detailsUrl;
    vd.textContent = 'View details →';
    actions.appendChild(vd);
    body.appendChild(actions);

    card.appendChild(body);
    return card;
  }

  // #20: choose the bid CTA for an open lot based on the bidder gate.
  function renderCardBidArea(card, body, lot, lotId, nextMin) {
    if (!token || !bidGate.logged_in) {
      const signin = document.createElement('div');
      signin.className = 'card-signin';
      const nextUrl = encodeURIComponent(location.pathname + location.search);
      signin.innerHTML = '<a href="/login.html?next=' + nextUrl + '">Sign in or create an account to bid →</a>';
      body.appendChild(signin);
      return;
    }
    if (!bidGate.terms_accepted_current) {
      const el = document.createElement('div');
      el.className = 'card-signin';
      el.innerHTML = '<a href="/buyer-terms.html">Accept Buyer Terms to bid →</a>';
      body.appendChild(el);
      return;
    }
    if (!bidGate.card_on_file) {
      const el = document.createElement('div');
      el.className = 'card-signin';
      const nextUrl = encodeURIComponent(location.pathname + location.search);
      el.innerHTML = '<a href="/add-card.html?next=' + nextUrl + '">Add a payment method to bid →</a>';
      body.appendChild(el);
      return;
    }
    if (!bidGate.can_bid) {
      const reg = document.createElement('div');
      reg.className = 'card-register';
      const btn = document.createElement('button');
      btn.type = 'button'; btn.className = 'btn-register'; btn.textContent = 'Register to Bid';
      const status = document.createElement('div'); status.className = 'cbf-status';
      reg.appendChild(btn); reg.appendChild(status);
      body.appendChild(reg);
      btn.addEventListener('click', () => showCardRegisterPanel(reg, lot.auction_id));
      return;
    }
    renderCardBidForm(card, body, lotId, nextMin);
  }

  // Pickup-acknowledgement panel → register, then refresh the grid so bid forms show.
  function showCardRegisterPanel(reg, auctionId) {
    reg.innerHTML = '';
    const txt = document.createElement('div');
    txt.className = 'register-ack-text';
    txt.innerHTML = 'By registering you accept the <a href="/buyer-terms.html">Buyer Terms</a> and acknowledge you must collect won lots during the scheduled pickup window.';
    const lbl = document.createElement('label');
    lbl.className = 'register-ack';
    const cb = document.createElement('input'); cb.type = 'checkbox';
    const span = document.createElement('span'); span.textContent = ' I acknowledge the pickup obligations.';
    lbl.appendChild(cb); lbl.appendChild(span);
    const confirm = document.createElement('button');
    confirm.type = 'button'; confirm.className = 'btn-register'; confirm.textContent = 'Confirm & Register';
    const st = document.createElement('div'); st.className = 'cbf-status';
    reg.appendChild(txt); reg.appendChild(lbl); reg.appendChild(confirm); reg.appendChild(st);
    confirm.addEventListener('click', async () => {
      if (!cb.checked) { st.className = 'cbf-status err'; st.textContent = 'Please acknowledge the pickup obligations.'; return; }
      confirm.disabled = true; confirm.textContent = 'Registering…';
      const r = await BidUtils.registerForAuction(auctionId, token, true);
      if (r.unauthorized) { localStorage.removeItem('token'); window.location.href = '/login.html'; return; }
      if (r.ok) { bidGate.can_bid = true; bidGate.registered = true; loadAuction(); }
      else { confirm.disabled = false; confirm.textContent = 'Confirm & Register'; st.className = 'cbf-status err'; st.textContent = r.message; }
    });
  }

  function renderCardBidForm(card, body, lotId, nextMin) {
    const form = document.createElement('div');
    form.className = 'card-bidform';
    const row = document.createElement('div');
    row.className = 'cbf-row';
    const input = document.createElement('input');
    input.type = 'text';
    input.setAttribute('inputmode', 'decimal');
    input.setAttribute('autocomplete', 'off');
    input.placeholder = BidUtils.formatUSD(nextMin) + ' or more';
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = 'Place Bid';
    row.appendChild(input); row.appendChild(btn);
    const status = document.createElement('div');
    status.className = 'cbf-status';
    form.appendChild(row); form.appendChild(status);
    body.appendChild(form);

    async function submitBid() {
      const built = BidUtils.buildBidPayload(input.value, null);
      if (built.error) { status.className = 'cbf-status err'; status.textContent = built.error; return; }
      btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Placing…';
      status.className = 'cbf-status'; status.textContent = '';
      const r = await BidUtils.placeBid(lotId, built.payload, token);
      if (r.unauthorized) { localStorage.removeItem('token'); window.location.href = '/login.html'; return; }
      btn.disabled = false; btn.textContent = orig;
      if (r.ok) {
        status.className = 'cbf-status ok';
        status.textContent = 'Bid placed: ' + BidUtils.formatUSD(Math.round(built.amount * 100));
        input.value = '';
        await patchCardBids(card, lotId);
      } else {
        status.className = 'cbf-status err';
        status.textContent = r.message;
      }
    }
    btn.addEventListener('click', submitBid);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') submitBid(); });
  }

  function showPlaceholder(wrap) {
    const ph = document.createElement('div');
    ph.className   = 'img-placeholder';
    ph.textContent = 'No image';
    wrap.appendChild(ph);
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function fmtDate(iso) {
    try {
      return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    } catch { return ''; }
  }
</script>
