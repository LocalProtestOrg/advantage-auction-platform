<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add a Payment Method - Advantage Auction</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    :root { color-scheme: light; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #1f2937; }
    .wrap { max-width: 460px; margin: 0 auto; padding: 2.5rem 1.25rem; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1.6rem 1.6rem 1.8rem; }
    h1 { font-size: 1.3rem; margin: 0 0 0.35rem; }
    .sub { color: #6b7280; font-size: 0.88rem; line-height: 1.45; margin-bottom: 1.25rem; }
    #payment-element { margin-bottom: 1.1rem; }
    button { width: 100%; background: #1d4ed8; color: #fff; border: none; border-radius: 8px; padding: 0.85rem 1rem; font-size: 0.98rem; font-weight: 700; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: default; }
    .msg { font-size: 0.85rem; margin-top: 0.9rem; min-height: 1em; }
    .msg.err { color: #b91c1c; } .msg.ok { color: #15803d; }
    .note { font-size: 0.76rem; color: #9ca3af; margin-top: 1rem; line-height: 1.4; }
    .center { text-align: center; padding: 2rem; color: #6b7280; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Add a Payment Method</h1>
      <div class="sub">Your card is securely saved for auction settlement. <strong>You will not be charged now.</strong></div>
      <div id="loading" class="center">Loading secure card form…</div>
      <form id="pay-form" style="display:none">
        <div id="payment-element"></div>
        <button id="submit" type="submit">Save Card</button>
        <div id="msg" class="msg"></div>
      </form>
      <div class="note">Test mode - use a Stripe test card (e.g. 4242 4242 4242 4242, any future expiry/CVC). No real charge is made.</div>
    </div>
  </div>

  <script src="/widgets/shared/auth-refresh.js"></script>
  <script src="/widgets/shared/buyer-nav.js"></script>
  <script>
    const token = localStorage.getItem('token');
    const params = new URLSearchParams(location.search);
    const next = params.get('next') || '/';
    const loading = document.getElementById('loading');
    const form = document.getElementById('pay-form');
    const msg = document.getElementById('msg');
    const submitBtn = document.getElementById('submit');

    if (!token) {
      location.href = '/login.html?next=' + encodeURIComponent('/add-card.html?next=' + encodeURIComponent(next));
    }

    let stripe, elements;

    async function init() {
      try {
        const res = await fetch('/api/payments/setup-intent', { method: 'POST', headers: { Authorization: 'Bearer ' + token } });
        if (res.status === 401) { localStorage.removeItem('token'); location.href = '/login.html?next=' + encodeURIComponent(location.pathname + location.search); return; }
        const data = await res.json();
        if (!data.success || !data.data.client_secret || !data.data.publishable_key) {
          loading.textContent = 'Could not start card setup. Please try again later.'; return;
        }
        stripe = Stripe(data.data.publishable_key);
        elements = stripe.elements({ clientSecret: data.data.client_secret });
        const paymentElement = elements.create('payment');
        paymentElement.mount('#payment-element');
        loading.style.display = 'none';
        form.style.display = 'block';
      } catch (e) {
        loading.textContent = 'Could not load the card form. Please refresh.';
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true; submitBtn.textContent = 'Saving…'; msg.className = 'msg'; msg.textContent = '';
      const { error, setupIntent } = await stripe.confirmSetup({
        elements,
        confirmParams: { return_url: location.origin + '/add-card.html?next=' + encodeURIComponent(next) },
        redirect: 'if_required',
      });
      if (error) {
        submitBtn.disabled = false; submitBtn.textContent = 'Save Card';
        msg.className = 'msg err'; msg.textContent = error.message || 'Could not save card. Please try again.';
        return;
      }
      if (setupIntent && setupIntent.status === 'succeeded') {
        try {
          const r = await fetch('/api/payments/card-on-file', { method: 'POST', headers: { Authorization: 'Bearer ' + token } });
          const d = await r.json();
          if (d.success) {
            msg.className = 'msg ok'; msg.textContent = '✓ Card saved. Returning…';
            setTimeout(() => { location.href = next; }, 800);
            return;
          }
          msg.className = 'msg err'; msg.textContent = d.message || 'Card saved but could not be confirmed. Please try again.';
        } catch {
          msg.className = 'msg err'; msg.textContent = 'Card saved but confirmation failed. Please try again.';
        }
        submitBtn.disabled = false; submitBtn.textContent = 'Save Card';
      } else {
        submitBtn.disabled = false; submitBtn.textContent = 'Save Card';
        msg.className = 'msg err'; msg.textContent = 'Card setup did not complete. Please try again.';
      }
    });

    init();
  </script>
</body>
</html>
