<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Auctions — Advantage Auction</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 2rem 1rem 4rem;
    }

    /* ── Header ── */
    header {
      max-width: 800px;
      margin: 0 auto 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header .brand { font-weight: 700; font-size: 1.1rem; color: #2563eb; }
    header .nav { display: flex; gap: 1.25rem; align-items: center; }
    header a { font-size: 0.875rem; color: #555; text-decoration: none; }
    header a:hover { color: #222; }
    #btn-logout { font-size: 0.875rem; color: #ef4444; background: none; border: none; cursor: pointer; padding: 0; }
    #btn-logout:hover { color: #b91c1c; }

    /* ── Summary bar ── */
    .summary {
      max-width: 800px;
      margin: 0 auto 1.5rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .summary-chip {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
    }
    .summary-chip span { color: #2563eb; margin-right: 0.35rem; font-size: 1rem; }

    /* ── Page heading ── */
    .page-header {
      max-width: 800px;
      margin: 0 auto 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .page-header h1 { font-size: 1.4rem; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.55rem 1.1rem;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary  { background: #2563eb; color: #fff; }
    .btn-primary:not(:disabled):hover  { background: #1d4ed8; }
    .btn-secondary { background: #fff; color: #2563eb; border: 1.5px solid #2563eb; }
    .btn-secondary:not(:disabled):hover { background: #eff6ff; }
    .btn-ghost { background: transparent; color: #555; border: 1px solid #d1d5db; }
    .btn-ghost:not(:disabled):hover { background: #f3f4f6; }
    .btn-danger { background: #fff; color: #ef4444; border: 1.5px solid #fca5a5; }
    .btn-danger:not(:disabled):hover { background: #fef2f2; }
    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; }

    /* ── Status banner ── */
    #status-banner {
      display: none;
      max-width: 800px;
      margin: 0 auto 1rem;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
    }
    #status-banner.success { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
    #status-banner.error   { background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; }

    /* ── Auction cards ── */
    .auction-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      max-width: 800px;
      margin: 0 auto 1rem;
      overflow: hidden;
    }

    .auction-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 1.25rem 1.5rem;
      gap: 1rem;
    }
    .auction-meta { flex: 1; min-width: 0; }
    .auction-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .auction-subtitle { font-size: 0.8rem; color: #6b7280; }

    .auction-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    /* ── State badges ── */
    .badge {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge-draft        { background: #f4f4f5; color: #71717a; }
    .badge-submitted    { background: #fefce8; color: #854d0e; }
    .badge-under-review { background: #eff6ff; color: #1d4ed8; }
    .badge-published    { background: #dcfce7; color: #15803d; }
    .badge-closed       { background: #fee2e2; color: #b91c1c; }
    .badge-open         { background: #dcfce7; color: #15803d; }
    .badge-withdrawn    { background: #f4f4f5; color: #9ca3af; }

    /* ── Lots panel ── */
    .lots-panel {
      border-top: 1px solid #f3f4f6;
      background: #fafafa;
      display: none;
    }
    .lots-panel.open { display: block; }

    .lots-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.9rem 1.5rem;
      border-bottom: 1px solid #f0f0f0;
    }
    .lots-panel-header .label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #9ca3af;
    }

    .lot-row {
      display: flex;
      align-items: center;
      padding: 0.8rem 1.5rem;
      gap: 0.75rem;
      border-bottom: 1px solid #f3f4f6;
    }
    .lot-row:last-child { border-bottom: none; }

    .lot-thumb {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      object-fit: cover;
      border: 1px solid #e5e7eb;
      background: #f3f4f6;
      flex-shrink: 0;
    }
    .lot-thumb-placeholder {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
      background: #f3f4f6;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #d1d5db;
    }

    .lot-info { flex: 1; min-width: 0; }
    .lot-title {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lot-detail { font-size: 0.775rem; color: #6b7280; }

    .lot-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }

    /* ── Add/Edit lot inline form ── */
    .lot-form-row {
      padding: 1rem 1.5rem;
      background: #fff;
      border-top: 1px solid #e5e7eb;
    }
    .lot-form-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: #374151;
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
      margin-bottom: 0.65rem;
    }
    .form-grid .full { grid-column: 1 / -1; }
    .form-row { margin-bottom: 0.65rem; }
    label.field-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.2rem;
    }
    input[type="text"], input[type="number"], textarea, select {
      width: 100%;
      padding: 0.5rem 0.65rem;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.875rem;
      font-family: inherit;
      color: #111;
      background: #fff;
    }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #2563eb; }
    textarea { resize: vertical; min-height: 60px; }
    .form-actions { display: flex; gap: 0.5rem; }

    /* ── Audience summary ── */
    .audience-section {
      max-width: 800px;
      margin: 0 auto 1.5rem;
    }
    .audience-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      margin-bottom: 0.5rem;
    }
    .audience-chips {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .audience-chip {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      min-width: 90px;
    }
    .audience-chip .metric {
      font-size: 1.5rem;
      font-weight: 800;
      color: #111;
      line-height: 1;
      margin-bottom: 0.2rem;
    }
    .audience-chip .metric-label {
      font-size: 0.72rem;
      color: #6b7280;
      font-weight: 500;
    }
    .audience-chip.chip-followers .metric { color: #2563eb; }
    .audience-chip.chip-growth {
      border-color: #bbf7d0;
      background: #f0fdf4;
    }
    .audience-chip.chip-growth .metric { color: #15803d; }

    /* ── Empty / loading states ── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #9ca3af;
      font-size: 0.9rem;
    }
    .empty-state h3 { font-size: 1rem; color: #374151; margin-bottom: 0.4rem; }

    .skeleton { background: #e5e7eb; border-radius: 4px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    .no-lots {
      padding: 1.25rem 1.5rem;
      font-size: 0.85rem;
      color: #9ca3af;
      text-align: center;
    }

    @media (max-width: 520px) {
      body { padding: 1.25rem 0.75rem 3rem; }
      header { padding: 0.7rem 0.75rem; }
      .page-header { flex-wrap: wrap; gap: 0.5rem; }
      .page-header h1 { font-size: 1.2rem; }
      .auction-header { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
      .auction-actions { flex-wrap: wrap; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <span class="brand">Advantage Auction</span>
  <div class="nav">
    <a href="/seller-create.html">+ New Auction</a>
    <button id="btn-logout">Log out</button>
  </div>
</header>

<div id="status-banner"></div>

<div id="summary-bar" class="summary" style="display:none">
  <div class="summary-chip"><span id="sum-draft">0</span> Draft</div>
  <div class="summary-chip"><span id="sum-submitted">0</span> Submitted</div>
  <div class="summary-chip"><span id="sum-published">0</span> Live</div>
  <div class="summary-chip"><span id="sum-closed">0</span> Closed</div>
</div>

<div id="audience-section" class="audience-section" style="display:none">
  <div class="audience-label">Your Audience</div>
  <div class="audience-chips">
    <div class="audience-chip chip-followers">
      <div class="metric" id="aud-followers">—</div>
      <div class="metric-label">Followers</div>
    </div>
    <div class="audience-chip chip-growth" id="aud-growth-chip" style="display:none">
      <div class="metric" id="aud-growth">—</div>
      <div class="metric-label">New this week</div>
    </div>
    <div class="audience-chip" id="aud-watchers-chip" style="display:none">
      <div class="metric" id="aud-watchers">—</div>
      <div class="metric-label">Watching now</div>
    </div>
    <div class="audience-chip" id="aud-lots-chip" style="display:none">
      <div class="metric" id="aud-lots">—</div>
      <div class="metric-label">Live lots</div>
    </div>
  </div>
</div>

<div class="page-header">
  <h1>My Auctions</h1>
</div>

<div id="auctions-container"></div>

<!-- ── Add Lot template (cloned per auction) ───────────────────────── -->
<template id="tmpl-add-lot-form">
  <div class="lot-form-row" style="display:none" data-form="add">
    <p class="lot-form-title">Add Lot</p>
    <div class="form-grid">
      <div class="full">
        <label class="field-label">Title *</label>
        <input type="text" name="title" placeholder="e.g. Antique Oak Chair" />
      </div>
      <div class="full">
        <label class="field-label">Description</label>
        <textarea name="description" placeholder="Optional description…"></textarea>
      </div>
      <div>
        <label class="field-label">Size Category</label>
        <select name="size_category">
          <option value="">— Select —</option>
          <option value="A">A — Small (carry by hand)</option>
          <option value="B">B — Medium (2 people)</option>
          <option value="C">C — Large (truck/dolly)</option>
        </select>
      </div>
      <div>
        <label class="field-label">Starting Bid ($)</label>
        <input type="number" name="starting_bid" min="0.01" step="0.01" placeholder="1.00" />
      </div>
    </div>
    <div class="form-actions">
      <button type="button" class="btn btn-primary btn-sm" data-action="submit-add">Add Lot</button>
      <button type="button" class="btn btn-ghost btn-sm"   data-action="cancel-add">Cancel</button>
    </div>
  </div>
</template>

<!-- ── Edit Lot template (cloned per lot) ──────────────────────────── -->
<template id="tmpl-edit-lot-form">
  <div class="lot-form-row" style="display:none" data-form="edit">
    <p class="lot-form-title">Edit Lot</p>
    <div class="form-grid">
      <div class="full">
        <label class="field-label">Title *</label>
        <input type="text" name="title" />
      </div>
      <div class="full">
        <label class="field-label">Description</label>
        <textarea name="description"></textarea>
      </div>
      <div>
        <label class="field-label">Size Category</label>
        <select name="size_category">
          <option value="">— Select —</option>
          <option value="A">A — Small (carry by hand)</option>
          <option value="B">B — Medium (2 people)</option>
          <option value="C">C — Large (truck/dolly)</option>
        </select>
      </div>
      <div>
        <label class="field-label">Starting Bid ($)</label>
        <input type="number" name="starting_bid" min="0.01" step="0.01" />
      </div>
    </div>
    <div class="form-actions">
      <button type="button" class="btn btn-primary btn-sm" data-action="submit-edit">Save Changes</button>
      <button type="button" class="btn btn-ghost btn-sm"   data-action="cancel-edit">Cancel</button>
    </div>
  </div>
</template>

<script>
'use strict';

const token = localStorage.getItem('token');
if (!token) window.location.href = '/login.html';

// Defense-in-depth: if an admin lands here (e.g., via a bookmark from before
// the login.html admin-redirect fix, or by typing the URL directly), bounce
// them to the admin landing page. The seller dashboard requires a seller_profile,
// which admin users correctly do not have — letting them through would only
// produce the "Seller profile not found" blocking error.
try {
  var __payload = JSON.parse(atob(token.split('.')[1]));
  if (__payload && __payload.role === 'admin') {
    window.location.href = '/admin/index.html';
    throw new Error('redirecting admin');
  }
} catch (__e) { /* malformed token → existing 401 flow handles below */ }

const api = (path, opts = {}) =>
  fetch(path, { headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json', ...opts.headers }, ...opts })
    .then(r => {
      if (r.status === 401) {
        localStorage.removeItem('token');
        window.location.href = '/login.html';
        throw new Error('Session expired');
      }
      return r.json();
    });

// ── State ────────────────────────────────────────────────────────────────────
let sellerProfileId = null;

// ── Logout ───────────────────────────────────────────────────────────────────
document.getElementById('btn-logout').addEventListener('click', () => {
  localStorage.removeItem('token');
  sessionStorage.clear();
  window.location.href = '/demo.html';
});

// ── Banner ───────────────────────────────────────────────────────────────────
function showBanner(msg, type) {
  const b = document.getElementById('status-banner');
  b.textContent = msg;
  b.className   = type;
  b.style.display = 'block';
  if (type === 'success') setTimeout(() => { b.style.display = 'none'; }, 3500);
}

// ── State badge HTML ─────────────────────────────────────────────────────────
function stateBadge(state) {
  const map = {
    draft:        ['badge-draft',        'Draft'],
    submitted:    ['badge-submitted',    'Submitted'],
    under_review: ['badge-under-review', 'Under Review'],
    published:    ['badge-published',    'Live'],
    closed:       ['badge-closed',       'Closed'],
    open:         ['badge-open',         'Open'],
    withdrawn:    ['badge-withdrawn',    'Withdrawn'],
  };
  const [cls, label] = map[state] || ['badge-draft', state];
  return `<span class="badge ${cls}">${label}</span>`;
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function fmtCents(cents) {
  if (cents == null) return '—';
  return '$' + (cents / 100).toFixed(2);
}

// ── Load dashboard ───────────────────────────────────────────────────────────
async function loadDashboard() {
  const container = document.getElementById('auctions-container');
  container.innerHTML = `<div style="max-width:800px;margin:0 auto;padding:2rem;text-align:center;color:#9ca3af;font-size:0.9rem;">Loading your auctions…</div>`;

  try {
    const [profileData, dashData] = await Promise.all([
      api('/api/sellers/me'),
      api('/api/sellers/me/dashboard'),
    ]);

    if (!profileData.success) {
      showBanner('Seller profile not found. Contact support.', 'error');
      container.innerHTML = '';
      return;
    }
    sellerProfileId = profileData.data.id;

    const auctions = dashData.data?.auctions || [];

    // Summary
    const counts = { draft: 0, submitted: 0, under_review: 0, published: 0, closed: 0 };
    auctions.forEach(a => {
      if (counts[a.state] !== undefined) counts[a.state]++;
    });
    document.getElementById('sum-draft').textContent     = counts.draft;
    document.getElementById('sum-submitted').textContent = counts.submitted;
    document.getElementById('sum-published').textContent = counts.published;
    document.getElementById('sum-closed').textContent    = counts.closed;
    document.getElementById('summary-bar').style.display = auctions.length ? 'flex' : 'none';

    // Render
    container.innerHTML = '';
    if (auctions.length === 0) {
      container.innerHTML = `
        <div class="empty-state" style="max-width:800px;margin:0 auto">
          <h3>No auctions yet</h3>
          <p>Create your first auction to get started.</p>
          <br/>
          <a href="/seller-create.html" class="btn btn-primary">Create Auction</a>
        </div>`;
      return;
    }

    auctions.forEach(auction => renderAuctionCard(container, auction));

  } catch (err) {
    showBanner('Failed to load dashboard: ' + err.message, 'error');
    container.innerHTML = '';
  }
}

// ── Render auction card ───────────────────────────────────────────────────────
function renderAuctionCard(container, auction) {
  const card = document.createElement('div');
  card.className = 'auction-card';
  card.dataset.auctionId = auction.id;

  const isEditable  = auction.state === 'draft';
  const isSubmitted = auction.state === 'submitted' || auction.state === 'under_review';
  const isPublished = auction.state === 'published';

  const statusCallout = isSubmitted ? `
    <div style="margin:0.75rem 1.25rem 0;padding:0.65rem 0.9rem;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;font-size:0.82rem;color:#1e40af;line-height:1.5">
      <strong>Awaiting review by Advantage Auction.</strong>
      Your auction has been submitted and is locked for editing.
      We typically review within 1–2 business days and will contact you when it's approved or if we have questions.
      Email us at <a href="mailto:advantageauction.bid@gmail.com" style="color:#1d4ed8">advantageauction.bid@gmail.com</a>.
    </div>` : '';

  card.innerHTML = `
    <div class="auction-header">
      <div class="auction-meta">
        <div class="auction-title">${escHtml(auction.title || 'Untitled Auction')}</div>
        <div class="auction-subtitle">
          ${stateBadge(auction.state)}
          <span style="margin-left:0.5rem">Created ${fmtDate(auction.created_at)}</span>
          ${auction.end_time ? `<span style="margin-left:0.5rem">· Ends ${fmtDate(auction.end_time)}</span>` : ''}
        </div>
      </div>
      <div class="auction-actions">
        ${isPublished ? `<a href="/auction-view.html?auctionId=${auction.id}" class="btn btn-ghost btn-sm" target="_blank">View Live</a>` : ''}
        <button class="btn btn-secondary btn-sm" data-toggle-lots="${auction.id}">View Lots</button>
        ${isEditable ? `<a href="/dashboard/lots.html?auctionId=${auction.id}" class="btn btn-primary btn-sm">+ Add Lot</a>` : ''}
        ${isEditable ? `<button class="btn btn-secondary btn-sm" data-submit-auction="${auction.id}" data-auction-title="${escHtml(auction.title || 'Untitled')}">Submit for AAC Review</button>` : ''}
      </div>
    </div>
    ${statusCallout}
    <div class="lots-panel" id="lots-${auction.id}">
      <div class="lots-panel-header">
        <span class="label">Lots</span>
        <span id="lot-count-${auction.id}" style="font-size:0.8rem;color:#6b7280"></span>
      </div>
      <div class="lots-list" id="lots-list-${auction.id}">
        <div class="no-lots">Click "View Lots" to load</div>
      </div>
      <div id="add-lot-form-${auction.id}"></div>
    </div>
  `;

  container.appendChild(card);

  // Toggle lots panel
  card.querySelector(`[data-toggle-lots="${auction.id}"]`).addEventListener('click', function() {
    toggleLots(auction.id, this);
  });

  // Add lot button
  const addBtn = card.querySelector(`[data-add-lot="${auction.id}"]`);
  if (addBtn) {
    addBtn.addEventListener('click', () => showAddLotForm(auction.id));
  }

  // Submit for AAC Review button (only shown on draft auctions)
  const submitBtn = card.querySelector(`[data-submit-auction="${auction.id}"]`);
  if (submitBtn) {
    submitBtn.addEventListener('click', function () {
      const title = submitBtn.dataset.auctionTitle || 'this auction';
      submitAuctionForReview(auction.id, title, submitBtn);
    });
  }
}

// ── Submit auction for AAC Review ─────────────────────────────────────────────
// PATCH /api/auctions/:id with { state: 'submitted' }. After submission, the
// server-side edit-lock (GOV-1) prevents the seller from further mutations
// on this auction or its lots until Advantage returns it to draft.
async function submitAuctionForReview(auctionId, title, btn) {
  const ok = window.confirm(
    'Submit "' + title + '" to Advantage for review?\n\n' +
    'After submission:\n' +
    '  • You will NOT be able to edit this auction or its lots\n' +
    '  • Advantage will review and either publish or contact you with feedback\n' +
    '  • If changes are needed, Advantage can return it to draft\n\n' +
    'Submit only after you have added all your lots and reviewed everything.\n' +
    'Continue?'
  );
  if (!ok) return;

  btn.disabled = true;
  const originalLabel = btn.textContent;
  btn.textContent = 'Submitting…';

  try {
    const r = await api('/api/auctions/' + auctionId, {
      method: 'PATCH',
      body:   JSON.stringify({ state: 'submitted' }),
    });
    if (r && r.success) {
      showBanner('Auction submitted for Advantage review. Editing is now locked until review completes.', 'success');
      // Reload to refresh card state, hide submit/edit CTAs, show submitted callout
      setTimeout(function () { window.location.reload(); }, 1500);
    } else {
      btn.disabled = false;
      btn.textContent = originalLabel;
      showBanner('Submit failed: ' + (r && r.message ? r.message : 'unknown error'), 'error');
    }
  } catch (err) {
    btn.disabled = false;
    btn.textContent = originalLabel;
    showBanner('Submit failed: ' + (err && err.message ? err.message : 'network error'), 'error');
  }
}

// ── Toggle lots panel ─────────────────────────────────────────────────────────
async function toggleLots(auctionId, btn) {
  const panel = document.getElementById(`lots-${auctionId}`);
  const isOpen = panel.classList.contains('open');

  if (isOpen) {
    panel.classList.remove('open');
    btn.textContent = 'View Lots';
    return;
  }

  panel.classList.add('open');
  btn.textContent = 'Hide Lots';
  await loadLots(auctionId);
}

// ── Load lots for an auction ───────────────────────────────────────────────────
async function loadLots(auctionId) {
  const list = document.getElementById(`lots-list-${auctionId}`);
  const countEl = document.getElementById(`lot-count-${auctionId}`);
  list.innerHTML = `<div class="no-lots">Loading…</div>`;

  try {
    const data = await api(`/api/lots/auction/${auctionId}/seller`);
    if (!data.success) throw new Error(data.message || 'Failed to load lots');

    const lots = data.data;
    countEl.textContent = lots.length + ' lot' + (lots.length !== 1 ? 's' : '');

    if (lots.length === 0) {
      list.innerHTML = `<div class="no-lots">No lots yet. Add your first lot above.</div>`;
      return;
    }

    list.innerHTML = '';
    lots.forEach(lot => list.appendChild(renderLotRow(lot, auctionId)));

  } catch (err) {
    list.innerHTML = `<div class="no-lots" style="color:#b91c1c">Failed to load lots: ${escHtml(err.message)}</div>`;
  }
}

// ── Render a lot row ───────────────────────────────────────────────────────────
function renderLotRow(lot, auctionId) {
  const frag = document.createDocumentFragment();

  const row = document.createElement('div');
  row.className = 'lot-row';
  row.id = `lot-row-${lot.id}`;
  row.dataset.lotId = lot.id;

  const canEdit   = lot.state !== 'withdrawn';
  const canRemove = lot.bid_count === 0 && lot.state !== 'withdrawn';

  const thumb = lot.first_image_url
    ? `<img class="lot-thumb" src="${escHtml(lot.first_image_url)}" alt="" loading="lazy" />`
    : `<div class="lot-thumb-placeholder">📦</div>`;

  const startingBid = fmtCents(lot.starting_bid_cents);
  const currentBid  = lot.current_bid_cents ? fmtCents(lot.current_bid_cents) : null;

  row.innerHTML = `
    ${thumb}
    <div class="lot-info">
      <div class="lot-title">${escHtml(lot.title || 'Untitled Lot')}</div>
      <div class="lot-detail">
        ${stateBadge(lot.state)}
        <span style="margin-left:0.4rem">Start: ${startingBid}</span>
        ${currentBid ? `<span style="margin-left:0.4rem">· Current: ${currentBid}</span>` : ''}
        ${lot.bid_count > 0 ? `<span style="margin-left:0.4rem">· ${lot.bid_count} bid${lot.bid_count !== 1 ? 's' : ''}</span>` : ''}
      </div>
    </div>
    <div class="lot-actions">
      <a href="/lot.html?lotId=${lot.id}" class="btn btn-ghost btn-sm" target="_blank">View</a>
      ${canEdit   ? `<button class="btn btn-ghost btn-sm"   data-edit-lot="${lot.id}">Edit</button>` : ''}
      ${canRemove ? `<button class="btn btn-danger btn-sm" data-remove-lot="${lot.id}">Remove</button>` : ''}
    </div>
  `;

  frag.appendChild(row);

  // Edit form placeholder
  const editHolder = document.createElement('div');
  editHolder.id = `edit-form-${lot.id}`;
  frag.appendChild(editHolder);

  // Wire events after appending
  setTimeout(() => {
    const editBtn = document.querySelector(`[data-edit-lot="${lot.id}"]`);
    if (editBtn) editBtn.addEventListener('click', () => showEditLotForm(lot, auctionId));

    const removeBtn = document.querySelector(`[data-remove-lot="${lot.id}"]`);
    if (removeBtn) removeBtn.addEventListener('click', () => removeLot(lot.id, auctionId));
  }, 0);

  return frag;
}

// ── Show add lot form ──────────────────────────────────────────────────────────
function showAddLotForm(auctionId) {
  // Ensure lots panel is open so the form is visible
  const panel = document.getElementById(`lots-${auctionId}`);
  if (!panel.classList.contains('open')) {
    panel.classList.add('open');
    const toggleBtn = document.querySelector(`[data-toggle-lots="${auctionId}"]`);
    if (toggleBtn) toggleBtn.textContent = 'Hide Lots';
    loadLots(auctionId);
  }

  const container = document.getElementById(`add-lot-form-${auctionId}`);
  if (container.querySelector('[data-form="add"]')) {
    // Already open — toggle
    container.innerHTML = '';
    return;
  }
  const tmpl = document.getElementById('tmpl-add-lot-form').content.cloneNode(true);
  const form = tmpl.querySelector('[data-form="add"]');
  form.style.display = 'block';

  form.querySelector('[data-action="submit-add"]').addEventListener('click', () => submitAddLot(form, auctionId));
  form.querySelector('[data-action="cancel-add"]').addEventListener('click', () => { container.innerHTML = ''; });

  container.appendChild(tmpl);
  form.querySelector('input[name="title"]').focus();
}

// ── Submit add lot ─────────────────────────────────────────────────────────────
async function submitAddLot(form, auctionId) {
  const title       = form.querySelector('input[name="title"]').value.trim();
  const description = form.querySelector('textarea[name="description"]').value.trim();
  const sizeCategory = form.querySelector('select[name="size_category"]').value;
  const startingBidRaw = form.querySelector('input[name="starting_bid"]').value;

  if (!title) { showBanner('Lot title is required.', 'error'); return; }

  const startingBidCents = startingBidRaw ? Math.round(parseFloat(startingBidRaw) * 100) : 100;

  const btn = form.querySelector('[data-action="submit-add"]');
  btn.disabled = true;
  btn.textContent = 'Adding…';

  try {
    const data = await api('/api/lots', {
      method: 'POST',
      body: JSON.stringify({
        auctionId,
        title,
        description:       description || undefined,
        size_category:     sizeCategory || undefined,
        starting_bid_cents: startingBidCents,
      }),
    });
    if (!data.success) throw new Error(data.message || 'Failed to add lot');

    showBanner('Lot added.', 'success');
    document.getElementById(`add-lot-form-${auctionId}`).innerHTML = '';
    await loadLots(auctionId);

  } catch (err) {
    showBanner('Error: ' + err.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Add Lot';
  }
}

// ── Show edit lot form ─────────────────────────────────────────────────────────
function showEditLotForm(lot, auctionId) {
  const holder = document.getElementById(`edit-form-${lot.id}`);
  if (holder.querySelector('[data-form="edit"]')) {
    holder.innerHTML = '';
    return;
  }

  const tmpl = document.getElementById('tmpl-edit-lot-form').content.cloneNode(true);
  const form = tmpl.querySelector('[data-form="edit"]');
  form.style.display = 'block';

  form.querySelector('input[name="title"]').value      = lot.title || '';
  form.querySelector('textarea[name="description"]').value = lot.description || '';
  form.querySelector('select[name="size_category"]').value = lot.size_category || '';
  const startingBidEl = form.querySelector('input[name="starting_bid"]');
  startingBidEl.value = lot.starting_bid_cents ? (lot.starting_bid_cents / 100).toFixed(2) : '';

  form.querySelector('[data-action="submit-edit"]').addEventListener('click', () => submitEditLot(form, lot, auctionId));
  form.querySelector('[data-action="cancel-edit"]').addEventListener('click', () => { holder.innerHTML = ''; });

  holder.appendChild(tmpl);
}

// ── Submit edit lot ────────────────────────────────────────────────────────────
async function submitEditLot(form, lot, auctionId) {
  const title          = form.querySelector('input[name="title"]').value.trim();
  const description    = form.querySelector('textarea[name="description"]').value.trim();
  const sizeCategory   = form.querySelector('select[name="size_category"]').value;
  const startingBidRaw = form.querySelector('input[name="starting_bid"]').value;

  if (!title) { showBanner('Title is required.', 'error'); return; }

  const startingBidCents = startingBidRaw ? Math.round(parseFloat(startingBidRaw) * 100) : lot.starting_bid_cents;

  const btn = form.querySelector('[data-action="submit-edit"]');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    const data = await api(`/api/lots/${lot.id}`, {
      method: 'PUT',
      body: JSON.stringify({
        title,
        description:        description || null,
        size_category:      sizeCategory || null,
        starting_bid_cents: startingBidCents,
      }),
    });
    if (!data.success) throw new Error(data.message || 'Failed to update lot');

    showBanner('Lot updated.', 'success');
    document.getElementById(`edit-form-${lot.id}`).innerHTML = '';
    await loadLots(auctionId);

  } catch (err) {
    showBanner('Error: ' + err.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Save Changes';
  }
}

// ── Remove lot ─────────────────────────────────────────────────────────────────
async function removeLot(lotId, auctionId) {
  if (!confirm('Remove this lot? It will be marked as withdrawn and removed from the auction.')) return;

  try {
    const data = await api(`/api/lots/${lotId}`, { method: 'DELETE' });
    if (!data.success) throw new Error(data.message || 'Failed to remove lot');

    showBanner('Lot removed.', 'success');
    await loadLots(auctionId);

  } catch (err) {
    showBanner('Error: ' + err.message, 'error');
  }
}

// ── XSS helper ────────────────────────────────────────────────────────────────
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Audience summary ─────────────────────────────────────────────────────────
async function loadAudience() {
  try {
    const data = await api('/api/sellers/me/audience');
    if (!data.success) return;

    const { followers_total, followers_7d, active_watchers, active_lot_count } = data.data;

    document.getElementById('aud-followers').textContent = followers_total;

    // Growth chip: only shown when there is positive growth
    if (followers_7d > 0) {
      document.getElementById('aud-growth').textContent = '+' + followers_7d;
      document.getElementById('aud-growth-chip').style.display = '';
    }

    // Watcher and live-lot chips: only meaningful when there are active auctions
    if (active_lot_count > 0) {
      document.getElementById('aud-lots').textContent   = active_lot_count;
      document.getElementById('aud-lots-chip').style.display = '';
      document.getElementById('aud-watchers').textContent = active_watchers;
      document.getElementById('aud-watchers-chip').style.display = '';
    }

    document.getElementById('audience-section').style.display = '';
  } catch { /* audience load failure is non-fatal */ }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadDashboard();
loadAudience();
</script>
