<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Bids - Advantage Auction</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#1f2937}
    .wrap{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 4rem}
    h1{font-size:1.4rem;margin:0 0 1rem}
    .loading,.empty{padding:2rem;text-align:center;color:#64748b}
    .empty a{color:#2563eb;font-weight:700;text-decoration:none}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
    .mb-card{display:flex;background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;text-decoration:none;color:inherit}
    .mb-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .mb-img{width:92px;min-width:92px;background:#eef2f7;display:flex;align-items:center;justify-content:center}
    .mb-img img{width:100%;height:100%;object-fit:cover}
    .mb-img .ph{width:100%;height:100%;background:linear-gradient(135deg,#e2e8f0,#f1f5f9)}
    .mb-body{padding:10px 12px;flex:1;min-width:0}
    .mb-title{font-weight:700;font-size:.92rem;margin-bottom:6px;line-height:1.25}
    .mb-badge{display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;margin-bottom:8px}
    .mb-rows{display:grid;grid-template-columns:auto 1fr;gap:2px 8px;font-size:12.5px}
    .mb-rows span{color:#64748b}.mb-rows strong{text-align:right}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>My Bids</h1>
    <div id="content" class="loading">Loading…</div>
  </div>
  <script src="/widgets/shared/auth-refresh.js"></script>
  <script src="/widgets/shared/bid-increment.js"></script>
  <script src="/widgets/shared/bid-status.js"></script>
  <script src="/widgets/shared/bid-utils.js"></script>
  <script src="/widgets/shared/buyer-nav.js"></script>
  <script>
    const token = localStorage.getItem('token');
    const content = document.getElementById('content');
    const TONE = { win:['#dcfce7','#166534'], lose:['#fee2e2','#991b1b'], neutral:['#f1f5f9','#475569'] };
    function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
    function fmtRemaining(c){ if(!c) return '-'; const r=new Date(c).getTime()-Date.now(); if(r<=0) return 'Ended';
      const h=Math.floor(r/3600000),m=Math.floor((r%3600000)/60000),s=Math.floor((r%60000)/1000);
      return h>0?(h+'h '+String(m).padStart(2,'0')+'m'):m>0?(m+'m '+String(s).padStart(2,'0')+'s'):(s+'s'); }
    function card(lot){
      const s = BidStatus.deriveBidderStatus(lot);
      const c = TONE[s.tone]||TONE.neutral;
      const closesAt = lot.extended_until || lot.closes_at || null;
      const img = lot.thumbnail_url ? '<img src="'+esc(lot.thumbnail_url)+'" alt="" loading="lazy">' : '<div class="ph"></div>';
      const cur = (lot.current_bid_cents!=null) ? BidUtils.formatUSD(lot.current_bid_cents) : '-';
      const mx  = (s.maxBidCents!=null) ? BidUtils.formatUSD(s.maxBidCents) : '-';
      const num = (lot.lot_number!=null) ? ('Lot #'+lot.lot_number+' · ') : '';
      return '<a class="mb-card" href="/lot.html?lotId='+encodeURIComponent(lot.id)+'">'
        +'<div class="mb-img">'+img+'</div>'
        +'<div class="mb-body">'
          +'<div class="mb-title">'+num+esc(lot.title||'')+'</div>'
          +'<span class="mb-badge" style="background:'+c[0]+';color:'+c[1]+'">'+s.label+'</span>'
          +'<div class="mb-rows">'
            +'<span>Current bid</span><strong>'+cur+'</strong>'
            +'<span>Your max bid</span><strong>'+mx+'</strong>'
            +(s.isOpen?('<span>Time left</span><strong data-close="'+(closesAt||'')+'">'+fmtRemaining(closesAt)+'</strong>'):'')
          +'</div>'
        +'</div></a>';
    }
    async function load(){
      if(!token){ content.className='empty'; content.innerHTML='Please <a href="/login.html?next=%2Fmy-bids.html">log in</a> to view your bids.'; return; }
      try{
        const r = await fetch('/api/lots/my-bids', { headers:{ Authorization:'Bearer '+token } });
        if(r.status===401){ content.className='empty'; content.innerHTML='Please <a href="/login.html?next=%2Fmy-bids.html">log in</a> to view your bids.'; return; }
        const d = await r.json();
        const lots = (d.success && d.data) || [];
        if(!lots.length){ content.className='empty'; content.innerHTML='You haven\'t placed any bids yet. <a href="/">Browse auctions →</a>'; return; }
        content.className='grid'; content.innerHTML = lots.map(card).join('');
      }catch(e){ content.className='empty'; content.textContent='Could not load your bids. Please try again.'; }
    }
    setInterval(() => { document.querySelectorAll('[data-close]').forEach(el => { const c=el.getAttribute('data-close'); if(c) el.textContent=fmtRemaining(c); }); }, 1000);
    load();
  </script>
</body>
</html>
